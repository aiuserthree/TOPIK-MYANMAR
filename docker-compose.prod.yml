# Self-hosted production stack (customer VPS). See docs/DEPLOY.md §셀프호스팅.
#
#   cp api/.env.production.example api/.env.production   # edit secrets; never commit
#   echo 'POSTGRES_PASSWORD=<strong-password>' >> .env    # compose-only (gitignored)
#   docker compose -f docker-compose.prod.yml up -d --build
#
# First admin (one-off, from host with psql reachable or exec into api):
#   docker compose -f docker-compose.prod.yml exec api npm run create-admin -- --email ... --name "..."

services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: topik
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in repo-root .env}
      POSTGRES_DB: topik_mm_prod
    volumes:
      - topik_pgdata_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U topik -d topik_mm_prod"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal
    # No host port publish — Postgres stays on the internal network only.

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - api/.env.production
    environment:
      APP_ENV: production
      NODE_ENV: production
      # Override file URL so the container talks to compose postgres (not localhost).
      DATABASE_URL: postgresql://topik:${POSTGRES_PASSWORD}@postgres:5432/topik_mm_prod
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      # Bind loopback only; put Caddy/nginx in front for TLS on 443.
      - "127.0.0.1:3000:3000"
    networks:
      - internal
      - edge

  # --- Optional TLS reverse proxy (uncomment + set domain) ---
  # caddy:
  #   image: caddy:2-alpine
  #   restart: unless-stopped
  #   ports:
  #     - "80:80"
  #     - "443:443"
  #   volumes:
  #     - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
  #     - caddy_data:/data
  #     - caddy_config:/config
  #   networks:
  #     - edge
  #   depends_on:
  #     - api
  #
  # Example Caddyfile (./deploy/Caddyfile):
  #   api.example.com {
  #     reverse_proxy api:3000
  #   }
  #
  # nginx alternative: map 443 → proxy_pass http://api:3000; see nginx docs.

networks:
  internal:
  edge:

volumes:
  topik_pgdata_prod:
  # caddy_data:
  # caddy_config:
