<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TOPIK Myanmar · 사용 가이드</title>
  <style>
    :root {
      --bg: #F0EEE6;
      --ink: #262420;
      --ink-soft: #54514A;
      --ink-faint: #8C887E;
      --line: #E3DFD3;
      --coral: #CC785C;
      --coral-wash: #F6EAE2;
      --shadow: 0 18px 50px -24px rgba(60, 48, 38, .45);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(120% 90% at 85% 10%, var(--coral-wash) 0%, rgba(246, 234, 226, 0) 55%), var(--bg);
      color: var(--ink);
      font-family: "Malgun Gothic", "맑은 고딕", "Apple SD Gothic Neo", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      -webkit-font-smoothing: antialiased;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }
    main {
      width: min(720px, 100%);
      background: #FBFAF7;
      border: 1px solid var(--line);
      border-radius: 20px;
      box-shadow: var(--shadow);
      padding: clamp(32px, 6vw, 56px);
    }
    .mark { font-size: 40px; color: var(--coral); margin-bottom: 18px; }
    h1 {
      font-size: clamp(28px, 5vw, 42px);
      line-height: 1.08;
      letter-spacing: -.02em;
      font-weight: 600;
    }
    h1 em { font-style: normal; color: var(--coral); }
    .rule { width: 56px; height: 4px; background: var(--coral); border-radius: 3px; margin: 22px 0; }
    .lede { font-size: 16px; color: var(--ink-soft); line-height: 1.6; }
    .cards { display: grid; gap: 14px; margin-top: 32px; }
    a.card {
      display: block;
      text-decoration: none;
      color: inherit;
      border: 1px solid var(--line);
      border-radius: 14px;
      padding: 20px 22px;
      background: #fff;
      transition: border-color .2s ease, transform .2s ease, box-shadow .2s ease;
    }
    a.card:hover {
      border-color: var(--coral);
      transform: translateY(-2px);
      box-shadow: 0 10px 28px -18px rgba(204, 120, 92, .55);
    }
    .card b { display: block; font-size: 18px; margin-bottom: 6px; color: var(--coral); }
    .card span { font-size: 14px; color: var(--ink-soft); line-height: 1.5; }
    .meta { margin-top: 28px; font-size: 13px; color: var(--ink-faint); }
  </style>
</head>
<body>
  <main>
    <div class="mark">✳</div>
    <h1>TOPIK <em>Myanmar</em><br>사용 가이드</h1>
    <div class="rule"></div>
    <p class="lede">미얀마 TOPIK 온라인 접수 시스템의 사용자(FO)·관리자(BO) 화면 안내입니다. 화살표 키·스크롤로 슬라이드를 이동할 수 있습니다.</p>
    <div class="cards">
      <a class="card" href="/fo">
        <b>사용자 화면 (FO) 가이드</b>
        <span>응시자용 — 회원가입, 시험 접수, 마이페이지, 수험표, FAQ 등</span>
      </a>
      <a class="card" href="/bo">
        <b>관리자 화면 (BO) 가이드</b>
        <span>운영자용 — 접수자 처리, 회차·시험장, 공지, 환불, 권한 등</span>
      </a>
    </div>
    <p class="meta">작성 기준 2026-06-11 (정책·i18n) · TOPIK Myanmar</p>
  </main>
</body>
</html>
