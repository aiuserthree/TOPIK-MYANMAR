<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>시험장 위치 문의 — BO LP 캡처</title>
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/fo-styles.css">
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/admin.css">
<link rel="stylesheet" href="lp-capture.css">
</head>
<body class="admin">
<div class="lp-capture-page lp-capture-wrap">
  <p class="capture-label"><strong>●</strong> 문의 게시판 → 상세 LP</p>
  
<div class="lp-backdrop open"></div>
<div class="lp open lp-wide" role="dialog">
  <div class="lp-head">
    <div style="flex:1">
      <h2>시험장 위치 문의</h2>
      <div class="sub" style="margin-top:2px">작성자 user01@example.com · 작성일 2026-05-18 · 일반글</div>
    </div>
    <button class="lp-close" aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>
  
  <div class="lp-body">
      <fieldset class="fs"><legend>문의 내용</legend><div class="fs-body"><div class="fs-grid ">
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">카테고리</div><div style="font-size:14px;color:var(--text);font-weight:500"><span class="pill" style="background:var(--bg-3)">시험</span></div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">본문</div><div style="font-size:14px;color:var(--text);font-weight:500"><pre style="background:var(--bg-2);padding:10px;border-radius:6px;font-size:13;white-space:pre-wrap;font-family:inherit;color:var(--text)">양곤대학교 흘라잉캠퍼스 시험장의 정확한 위치와 당일 입실 시간을 알려주세요.</pre></div></div>
      </div></div></fieldset>
      <fieldset class="fs"><legend>답변 이력 (0)</legend><div class="fs-body"><div class="fs-grid ">
        <div class="empty" style="padding:12px 0">등록된 답변이 없습니다</div>
      </div></div></fieldset>
      <fieldset class="fs"><legend>답변 작성</legend><div class="fs-body"><div class="fs-grid ">
        <div class="form-row"><label class="label">답변 내용<span class="req">*</span></label><textarea class="textarea" rows="5" placeholder="답변 내용을 입력하세요.">흘라잉캠퍼스 정문 기준 1층 강의실 A·B입니다. 입실은 08:30~09:00입니다.</textarea></div>
      </div></div></fieldset>
      <fieldset class="fs"><legend>댓글/대댓글 (0)</legend><div class="fs-body"><div class="fs-grid ">
        <div style="padding:12px;background:var(--bg-2);border-radius:6px;font-size:13;color:var(--text-3)">댓글이 없습니다. 일반글은 「공개」 체크로 댓글 공개 여부를 선택할 수 있습니다.</div>
      </div></div></fieldset></div>
  <div class="lp-foot">
      <button class="btn btn-secondary">닫기</button>
      <button class="btn btn-primary">답변 등록 · 완료 처리</button></div>
</div>
</div>
</body>
</html>
