<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>처리 이력 상세 — BO LP 캡처</title>
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/fo-styles.css">
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/admin.css">
<link rel="stylesheet" href="lp-capture.css">
</head>
<body class="admin">
<div class="lp-capture-page lp-capture-wrap">
  <p class="capture-label"><strong>●</strong> 처리 이력 → 상세 LP</p>
  
<div class="lp-backdrop open"></div>
<div class="lp open lp-sm" role="dialog">
  <div class="lp-head">
    <div style="flex:1">
      <h2>처리 이력 상세</h2>
      <div class="sub" style="margin-top:2px">이력 ID <code class="code-id">aud-20260529-0042</code></div>
    </div>
    <button class="lp-close" aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>
  
  <div class="lp-body">
      <fieldset class="fs"><legend>기본</legend><div class="fs-body"><div class="fs-grid ">
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">처리 시각</div><div style="font-size:14px;color:var(--text);font-weight:500"><span class="code-id">2026-05-29 10:05:32</span></div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">처리자</div><div style="font-size:14px;color:var(--text);font-weight:500">admin-dev@topik-mm.local</div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">IP</div><div style="font-size:14px;color:var(--text);font-weight:500">127.0.0.1</div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">유형</div><div style="font-size:14px;color:var(--text);font-weight:500">사진</div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">대상 ID</div><div style="font-size:14px;color:var(--text);font-weight:500"><code class="code-id">app-2026-00142</code></div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">액션</div><div style="font-size:14px;color:var(--text);font-weight:500"><span class="pill pill-approved">승인</span></div></div>
      </div></div></fieldset>
      <fieldset class="fs"><legend>변경 내용</legend><div class="fs-body"><div class="fs-grid ">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;font-size:13">
          <div style="padding:10px;background:var(--bg-2);border-radius:6px">
            <div style="font-size:11.5;color:var(--text-3);margin-bottom:6px">변경 전</div>
            <code>photoStatus: pending</code>
          </div>
          <div style="padding:10px;background:var(--st-approved-bg);border-radius:6px">
            <div style="font-size:11.5;color:var(--text-3);margin-bottom:6px">변경 후</div>
            <code>photoStatus: approved</code>
          </div>
        </div>
      </div></div></fieldset>
      <fieldset class="fs"><legend>메모</legend><div class="fs-body"><div class="fs-grid ">
        <pre style="background:var(--bg-2);padding:10px;border-radius:6px;font-size:13;font-family:inherit;color:var(--text-2)">사진 심사 승인</pre>
      </div></div></fieldset></div>
  <div class="lp-foot"><button class="btn btn-secondary">닫기</button></div>
</div>
</div>
</body>
</html>
