<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>접수자 반려 처리 — BO LP 캡처</title>
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/fo-styles.css">
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/admin.css">
<link rel="stylesheet" href="lp-capture.css">
</head>
<body class="admin">
<div class="lp-capture-page lp-capture-modal">
  <p class="capture-label"><strong>●</strong> 일괄 처리 바 → 반려 모달</p>
  
<div class="modal-backdrop open">
  <div class="modal" role="dialog">
    <div class="modal-head" style="display:flex;align-items:center;justify-content:space-between">
      <h3 style="color:var(--danger)">접수자 반려 처리</h3>
      <button class="lp-close" aria-label="닫기" style="margin-right:-8px"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
    </div>
    <div class="modal-body">
      <div style="font-size:13;color:var(--text-2);margin-bottom:10px">
        대상 <b>1</b>건 · 반려 사유는 응시자 이메일/마이페이지에 안내됩니다.
      </div>
      <div class="form-row"><label class="label">반려 사유<span class="req">*</span></label><select class="select"><option selected>정보 불일치</option><option>중복 접수</option><option>기타</option></select></div>
      <div class="form-row"><label class="label">추가 안내 (선택)</label><textarea class="textarea" rows="3" placeholder="예) 정면 사진이 아닙니다.">생년월일이 신분증과 일치하지 않습니다.</textarea></div></div>
    <div class="modal-foot">
      <button class="btn btn-secondary">취소</button>
      <button class="btn btn-danger">반려 처리</button></div>
  </div>
</div>
</div>
</body>
</html>
