<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>사진 심사 — 김민수 — BO LP 캡처</title>
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/fo-styles.css">
<link rel="stylesheet" href="../../../html/C안/BO(admin)/project/assets/admin.css">
<link rel="stylesheet" href="lp-capture.css">
</head>
<body class="admin">
<div class="lp-capture-page lp-capture-wrap">
  <p class="capture-label"><strong>●</strong> 접수자 목록 → 사진 심사 LP</p>
  
<div class="lp-backdrop open"></div>
<div class="lp open lp-sm" role="dialog">
  <div class="lp-head">
    <div style="flex:1">
      <h2>사진 심사 — 김민수</h2>
      <div class="sub" style="margin-top:2px">접수ID <code class="code-id">app-2026-00142</code> · 현재 <span class="pill pill-photo">미심사</span></div>
    </div>
    <button class="lp-close" aria-label="닫기"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
  </div>
  
  <div class="lp-body">
      <div class="photo-lg" style="background:linear-gradient(160deg,hsl(210 35% 86%),hsl(210 30% 70%));color:#fff;font-size:80px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-bottom:12px">김</div>
      <div style="display:flex;gap:6px;margin-bottom:14px">
        <button class="ibtn" style="flex:1">원본 받기</button>
        <button class="ibtn" style="flex:1">회전 보정</button>
      </div>
      <fieldset class="fs"><legend>응시자 확인</legend><div class="fs-body"><div class="fs-grid ">
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">한글 성명</div><div style="font-size:14px;color:var(--text);font-weight:500">김민수</div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">영문 성명</div><div style="font-size:14px;color:var(--text);font-weight:500">Kim Minsu</div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">생년월일</div><div style="font-size:14px;color:var(--text);font-weight:500"><code class="code-id">19980512</code></div></div>
        <div class="form-row" style="margin-bottom:0"><div class="label" style="font-size:11.5px;color:var(--text-3);margin-bottom:2px">시험장</div><div style="font-size:14px;color:var(--text);font-weight:500">양곤대학교 흘라잉캠퍼스 · TOPIK Ⅰ</div></div>
      </div></div></fieldset>
      <div style="padding:10px;background:var(--st-photo-bg);color:var(--st-photo);border-radius:6px;font-size:12.5;margin-top:8px">
        ※ 사진을 확대·회전하여 확인한 뒤 승인 또는 반려하세요.
      </div></div>
  <div class="lp-foot">
      <button class="btn btn-secondary">닫기</button>
      <button class="btn btn-danger">반려</button>
      <button class="btn btn-primary">사진 승인</button></div>
</div>
</div>
</body>
</html>
