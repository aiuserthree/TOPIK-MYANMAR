# TOPIK Myanmar — Web VPS (115.68.222.58)
# FO: www.topik-myanmar.com  |  BO: admin.topik-myanmar.com
# API: /api/ → FastAPI :8000

upstream topik_api {
    server 127.0.0.1:8000;
    keepalive 16;
}

# FO — www
server {
    listen 80;
    listen [::]:80;
    server_name www.topik-myanmar.com topik-myanmar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://www.topik-myanmar.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.topik-myanmar.com topik-myanmar.com;

    # certbot — replace after: certbot certonly --nginx -d www.topik-myanmar.com -d topik-myanmar.com
    ssl_certificate     /etc/letsencrypt/live/www.topik-myanmar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.topik-myanmar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/topik-myanmar/public;
    index index.html;

    location /api/ {
        proxy_pass http://topik_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10m;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}

# BO — admin subdomain
server {
    listen 80;
    listen [::]:80;
    server_name admin.topik-myanmar.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://admin.topik-myanmar.com$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.topik-myanmar.com;

    ssl_certificate     /etc/letsencrypt/live/www.topik-myanmar.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/www.topik-myanmar.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /opt/topik-myanmar/public-bo;
    index admin-login.html;

    location /api/ {
        proxy_pass http://topik_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        client_max_body_size 10m;
    }

    location / {
        try_files $uri $uri/ /admin-login.html;
    }
}
