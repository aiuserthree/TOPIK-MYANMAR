      actor: pick(['admin01','admin02','editor01','editor02']),

      type: t,

    });
  }
  AUDIT.sort((a, b) => b.ts.localeCompare(a.ts));

  // ---- Consent log (약관 동의 이력) ----
  const CONSENTS = [];
  for (let i = 1; i <= 36; i++) {
    CONSENTS.push({
      id: 'c' + pad(i, 3),

      photoWait: apps.filter(a => a.photoStatus === 'pending' && a.status !== 'cancel').length,

  }
  function venueName(id) {
    const v = state.venues.find(x => x.id === id);

  }

  function getAdminSession() {
    try { return JSON.parse(sessionStorage.getItem('tpkm_bo_admin') || 'null'); } catch (e) { return null; }
  }

  window.DataStore = {
    state, subscribe, notify, addAudit, setSession, getAdminSession,
    badges, fmtNum, fmtCurrency, statusLabel, levelLabel, roleLabel, venueName, pad,
    permSections: PERM_SECTIONS, permActions: PERM_ACTIONS, recommendedPerms,
  };
})();

// ----- LP (Layer Popup, right slide-in panel) -----
function LP({ open, title, sub, onClose, size, children, footer }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  return (
    <>
      <div className={`lp-backdrop ${open ? 'open' : ''}`} onClick={onClose}></div>
      <div className={`lp ${open ? 'open' : ''} ${size === 'wide' ? 'lp-wide' : size === 'sm' ? 'lp-sm' : ''}`} role="dialog" aria-modal="true">
        <div className="lp-head">
          <div style={{ flex: 1 }}>
            <h2>{title}</h2>
            {sub && <div className="sub" style={{ marginTop: 2 }}>{sub}</div>}
          </div>
          <button className="lp-close" onClick={onClose} aria-label="닫기"><I.X/></button>
        </div>
        <div className="lp-body">{children}</div>
        {footer && <div className="lp-foot">{footer}</div>}
      </div>
    </>
  );
}

// ----- Modal (centered, smaller) -----
function Modal({ open, title, onClose, children, footer, danger }) {
  useEffect(() => {
    if (!open) return;
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    document.addEventListener('keydown', onKey);
    return () => document.removeEventListener('keydown', onKey);
  }, [open, onClose]);
  if (!open) return null;
  return (
    <div className="modal-backdrop open" onClick={(e) => { if (e.target === e.currentTarget) onClose(); }} style={{ zIndex: 320 }}>
      <div className="modal" role="dialog" aria-modal="true">
        <div className="modal-head" style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <h3 style={{ color: danger ? 'var(--danger)' : undefined }}>{title}</h3>
          <button className="lp-close" onClick={onClose} aria-label="닫기" style={{ marginRight: -8 }}><I.X/></button>
        </div>
        <div className="modal-body">{children}</div>
        {footer && <div className="modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

// ----- Confirm helper (returns promise via callback prop) -----
function ConfirmModal({ open, title, message, danger, confirmText, onConfirm, onClose, needReason, reasonOptions }) {
  const [reason, setReason] = useState('');
  const [reasonOther, setReasonOther] = useState('');
  useEffect(() => { if (open) { setReason(reasonOptions ? reasonOptions[0] : ''); setReasonOther(''); } }, [open, reasonOptions]);
  if (!open) return null;
  const finalReason = reason === '기타' ? reasonOther : reason;
  const canConfirm = !needReason || (reason && (reason !== '기타' || reasonOther.trim()));
  return (
    <Modal open={open} onClose={onClose} title={title} danger={danger}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className={`btn ${danger ? 'btn-danger' : 'btn-primary'}`} disabled={!canConfirm}
          onClick={() => onConfirm(finalReason)}>{confirmText || '확인'}</button>
      </>}>
      <div>{message}</div>
      {needReason && (
        <div style={{ marginTop: 14 }}>
          {reasonOptions ? (
            <div className="form-row" style={{ marginBottom: 8 }}>
              <label className="label">사유 <span className="req">*</span></label>
              <select className="select" value={reason} onChange={e => setReason(e.target.value)}>
                {reasonOptions.map(r => <option key={r}>{r}</option>)}
              </select>
            </div>
          ) : null}
          {(!reasonOptions || reason === '기타') && (
            <div className="form-row" style={{ marginBottom: 0 }}>
              <label className="label">{reasonOptions ? '상세 사유' : '사유'} <span className="req">*</span></label>
              <textarea className="textarea" rows="3" value={reasonOther} onChange={e => setReasonOther(e.target.value)} placeholder="상세 사유를 입력하세요"></textarea>
            </div>
          )}
        </div>
      )}
    </Modal>
  );
}

// ----- Toast manager -----
const ToastBus = {
  listeners: new Set(),
  push(t) { this.listeners.forEach(fn => fn(t)); },
};
function ToastHost() {
  const [items, setItems] = useState([]);
  useEffect(() => {
    const fn = (t) => {
      const item = { id: Date.now() + Math.random(), ...t };
      setItems(prev => [...prev, item]);
      setTimeout(() => setItems(prev => prev.filter(x => x.id !== item.id)), t.duration || 3000);
    };
    ToastBus.listeners.add(fn);
    return () => ToastBus.listeners.delete(fn);
  }, []);
  return (
    <div className="toasts">
      {items.map(t => (
        <div key={t.id} className={`toast ${t.type || ''}`}>
          {t.title && <div className="ttl">{t.title}</div>}
          <div className="msg">{t.msg || t.message}</div>
        </div>
      ))}
    </div>
  );
}
function toast(msg, opts = {}) { ToastBus.push({ msg, ...opts }); }
function toastOk(msg, opts = {}) { ToastBus.push({ msg, type: 'success', ...opts }); }
function toastErr(msg, opts = {}) { ToastBus.push({ msg, type: 'error', ...opts }); }

// ----- Form helpers -----
function FormRow({ label, required, hint, error, children, span }) {
  return (
    <div className={`form-row ${error ? 'has-error' : ''}`} style={span ? { gridColumn: `span ${span}` } : null}>
      {label && (
        <label className="label">
          {label}
          {required && <span className="req">*</span>}
        </label>
      )}
      {children}
      {error ? <div className="err">{error}</div> : (hint && <div className="hint">{hint}</div>)}
    </div>
  );
}
function FieldSet({ legend, children, cols }) {
  return (
    <fieldset className="fs">
      {legend && <legend>{legend}</legend>}
      <div className="fs-body">
        <div className={`fs-grid ${cols === 2 ? 'cols-2' : cols === 3 ? 'cols-3' : ''}`}>
          {children}
        </div>
      </div>
    </fieldset>
  );
}

// ----- Pager -----
function Pager({ page, total, onPage }) {
  if (total <= 1) return null;
  const max = total;
  const start = Math.max(1, page - 3);
  const end = Math.min(max, start + 6);
  const pages = [];
  for (let i = start; i <= end; i++) pages.push(i);
  return (
    <div className="pager">
      <a className={page === 1 ? 'disabled' : ''} onClick={() => page > 1 && onPage(page - 1)}>‹</a>
      {start > 1 && <a onClick={() => onPage(1)}>1</a>}
      {start > 2 && <span>…</span>}
      {pages.map(p => (
        <a key={p} className={p === page ? 'current' : ''} onClick={() => onPage(p)}>{p}</a>
      ))}
      {end < max - 1 && <span>…</span>}
      {end < max && <a onClick={() => onPage(max)}>{max}</a>}
      <a className={page === max ? 'disabled' : ''} onClick={() => page < max && onPage(page + 1)}>›</a>
    </div>
  );
}

// ----- Section status pill -----
function Pill({ kind, children }) {
  return <span className={`pill pill-${kind}`}>{children}</span>;
}

// ----- Bulk action bar -----
function BulkBar({ count, children, onClear }) {
  if (!count) return null;
  return (
    <div className="bulkbar">
      <span><b className="cnt">{count}</b>건 선택됨</span>
      <span className="sep">·</span>
      <a onClick={onClear} style={{ color: 'var(--primary)', cursor: 'pointer', fontSize: 12 }}>선택 해제</a>
      <div className="actions">{children}</div>
    </div>
  );
}

// Export to window
Object.assign(window, { useStore, useState, useEffect, useMemo, useCallback, useRef, Fragment, h,
  LP, Modal, ConfirmModal, ToastHost, toast, toastOk, toastErr,
  FormRow, FieldSet, Pager, Pill, BulkBar, I });

</script>

</script>

<script type="text/babel">
/* ============================================================
   panels/applicants.jsx — 접수자 관리
   IDs from docs/02_apply.md:
     TPKM_BO_2_1_1  필터+검색 (상태칩7/시험장/급수/검색)
     TPKM_BO_2_1_2  데이터 그리드 (연명부 컬럼 정합)
     TPKM_BO_2_1_3  오프라인 수납(+사진/기본정보 동시 확인, 다중 처리, 수납취소→환불자)
     TPKM_BO_2_1_4  승인 처리 (사진 미심사 가드)
     TPKM_BO_2_1_5  반려 처리 (사유 필수)
     TPKM_BO_2_1_6  상세 보기 LP (프로필+사진+메모+처리 이력)
     TPKM_BO_2_1_7  수험번호 13자리 일괄 부여
     TPKM_BO_2_1_8  엑셀(연명부 양식) 내보내기
     TPKM_BO_2_1_9  사진 zip 다운로드(폴더 구조)
     TPKM_BO_2_1_10 인쇄
   ============================================================ */

const STATUS_CHIPS = [
  { id: 'all',      label: '전체' },
  { id: 'applied',  label: '접수완료' },
  { id: 'photo',    label: '사진심사중' },
  { id: 'pay',      label: '수납대기' },
  { id: 'approved', label: '승인완료' },
  { id: 'rejected', label: '반려' },
  { id: 'cancel',   label: '취소' },
  { id: 'refund',   label: '환불자' },
];

const REJECT_REASONS = ['사진 부적합', '정보 불일치', '중복 접수', '기타'];

function ApplicantsPanel() {
  const state = useStore();
  const sessionId = state.activeSessionId;
  const apps = useMemo(() => state.applicants.filter(a => a.sessionId === sessionId), [state.applicants, sessionId]);

  // ---- Filter / search ----
  const [statusF, setStatusF] = useState('all');
  const [venueF, setVenueF] = useState('all');
  const [levelF, setLevelF] = useState('all');
  const [q, setQ] = useState('');
  const [sort, setSort] = useState({ k: 'no', dir: 'asc' });
  const [page, setPage] = useState(1);
  const PER_PAGE = 12;

  // URL sync (북마크 가능)
  useEffect(() => {
    const params = new URLSearchParams(location.hash.split('?')[1] || '');
    if (params.has('s')) setStatusF(params.get('s'));
    if (params.has('v')) setVenueF(params.get('v'));
    if (params.has('l')) setLevelF(params.get('l'));
    if (params.has('q')) setQ(params.get('q'));
  }, []);

  const filtered = useMemo(() => {
    let r = apps;
    if (statusF !== 'all') r = r.filter(a => a.status === statusF);
    if (venueF !== 'all')  r = r.filter(a => a.venueId === venueF);
    if (levelF !== 'all')  r = r.filter(a => a.level === levelF);
    if (q) {
      const qq = q.trim().toLowerCase();
      r = r.filter(a => a.nameKo.includes(qq) || a.nameEn.toLowerCase().includes(qq) || a.dob.includes(qq) || (a.exam && a.exam.includes(qq)));
    }
    // sort
    r = r.slice().sort((a, b) => {
      const va = a[sort.k], vb = b[sort.k];
      const cmp = String(va).localeCompare(String(vb), 'ko');
      return sort.dir === 'asc' ? cmp : -cmp;
    });
    return r;
  }, [apps, statusF, venueF, levelF, q, sort]);

  useEffect(() => { setPage(1); setSelected(new Set()); }, [statusF, venueF, levelF, q, sessionId]);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER_PAGE));
  const pageRows = filtered.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  // status counts (for chip badges)
  const counts = useMemo(() => {
    const c = { all: apps.length };
    STATUS_CHIPS.forEach(x => { if (x.id !== 'all') c[x.id] = 0; });
    apps.forEach(a => { c[a.status] = (c[a.status] || 0) + 1; });
    return c;
  }, [apps]);

  // ---- Selection ----
  const [selected, setSelected] = useState(() => new Set());
  const allOnPage = pageRows.every(r => selected.has(r.id)) && pageRows.length > 0;
  const toggleAllOnPage = () => {
    const next = new Set(selected);
    if (allOnPage) pageRows.forEach(r => next.delete(r.id));
    else pageRows.forEach(r => next.add(r.id));
    setSelected(next);
  };
  const toggleOne = (id) => {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
  };

  // ---- Modals ----
  const [detailId, setDetailId] = useState(null);
  const [payModal, setPayModal] = useState(null);          // { ids:[], mode:'pay'|'cancel' }
  const [approveModal, setApproveModal] = useState(null);  // { ids:[] }
  const [rejectModal, setRejectModal] = useState(null);    // { ids:[] }
  const [examModal, setExamModal] = useState(false);
  const [excelModal, setExcelModal] = useState(false);
  const [zipModal, setZipModal] = useState(false);
  const [photoLP, setPhotoLP] = useState(null);   // 사진 심사 인라인 패널 id (TPKM_BO_2_1_3)

  // expose detail open to other panels (Dashboard 'Recent')
  useEffect(() => { window.openApplicantDetail = (id) => setDetailId(id); }, []);

  // ---- 사진 심사 (인라인) handlers — TPKM_BO_2_1_3 ----
  const doPhotoApprove = (id) => {
    const a = state.applicants.find(x => x.id === id);
    if (!a) return;
    const before = { photoStatus: a.photoStatus, status: a.status };
    a.photoStatus = 'approved';
    a.photoOk = true;
    // 사진 승인으로 후속 상태 진행
    if (a.status === 'photo') a.status = a.paid ? 'approved' : 'pay';
    DataStore.addAudit({ type: '사진', targetId: id, action: '승인', before, after: { photoStatus: 'approved', status: a.status }, memo: '' });
    DataStore.notify();
    toastOk('사진이 승인되었습니다.', { title: '사진 심사', type: 'success' });
  };
  const doPhotoReject = (id, reason) => {
    const a = state.applicants.find(x => x.id === id);
    if (!a) return;
    if (!reason || !reason.trim()) { toastErr('반려 사유를 입력해주세요.'); return; }
    const before = { photoStatus: a.photoStatus, status: a.status, rejectReason: a.rejectReason };
    a.photoStatus = 'rejected';
    a.photoOk = false;
    a.status = 'rejected';
    a.rejectReason = reason;
    DataStore.addAudit({ type: '사진', targetId: id, action: '반려', before, after: { photoStatus: 'rejected', status: 'rejected', rejectReason: reason }, memo: reason });
    DataStore.notify();
    toastOk('사진이 반려되었습니다. 응시자에게 이메일이 발송됩니다.', { title: '사진 심사', type: 'success' });
  };
  const doBulkPhotoApprove = (ids) => {
    let n = 0;
    ids.forEach(id => {
      const a = state.applicants.find(x => x.id === id);
      if (!a || a.photoStatus === 'approved') return;
      const before = { photoStatus: a.photoStatus, status: a.status };
      a.photoStatus = 'approved';
      a.photoOk = true;
      if (a.status === 'photo') a.status = a.paid ? 'approved' : 'pay';
      n++;
      DataStore.addAudit({ type: '사진', targetId: id, action: '승인', before, after: { photoStatus: 'approved', status: a.status }, memo: '일괄 사진 승인' });
    });
    DataStore.notify();
    if (n) toastOk(`${n}건의 사진을 일괄 승인했습니다.`, { title: '사진 심사', type: 'success' });
    else toastErr('이미 모두 승인된 상태입니다.');
    setSelected(new Set());
  };
  const doApprove = (ids) => {
    // 사진 미심사 행 가드 — 사진 승인 완료 건만 승인 가능
    const blocked = ids.filter(id => {
      const a = state.applicants.find(x => x.id === id);
      return a && a.photoStatus !== 'approved';
    });
    if (blocked.length) {
      toastErr(`사진 미심사 ${blocked.length}건이 포함되어 있습니다. 상세보기에서 사진심사를 먼저 진행해주세요.`, { title: '승인 불가' });
      return;
    }
    let n = 0;
    ids.forEach(id => {
      const a = state.applicants.find(x => x.id === id);
      if (!a) return;
      const before = { status: a.status };
      a.status = 'approved';
      n++;
      DataStore.addAudit({ type: '접수자', targetId: id, action: '승인', before, after: { status: 'approved' }, memo: '' });
    });
    DataStore.notify();
    toastOk(`${n}건이 승인되었습니다. (이메일 통지 전송)`, { title: '승인 완료', type: 'success' });
    setApproveModal(null);
    setSelected(new Set());
  };

  const doReject = (ids, reason) => {
    if (!reason || !reason.trim()) { toastErr('반려 사유를 입력해주세요.'); return; }
    let n = 0;
    ids.forEach(id => {
      const a = state.applicants.find(x => x.id === id);
      if (!a) return;
      const before = { status: a.status, rejectReason: a.rejectReason };
      a.status = 'rejected';
      a.rejectReason = reason;
      n++;
      DataStore.addAudit({ type: '접수자', targetId: id, action: '반려', before, after: { status: 'rejected', rejectReason: reason }, memo: reason });
    });
    DataStore.notify();
    toastOk(`${n}건이 반려되었습니다. (이메일 통지)`, { title: '반려 완료', type: 'success' });
    setRejectModal(null);
    setSelected(new Set());
  };

  const doPay = (ids, info) => {
    let n = 0;
    ids.forEach(id => {
      const a = state.applicants.find(x => x.id === id);
      if (!a || a.paid) return;
      const before = { paid: a.paid, status: a.status };
      a.paid = true;
      a.paidAt = new Date().toISOString().replace('T', ' ').slice(0, 16);
      a.receipt = info.receipt || `R-${Math.floor(10000 + Math.random() * 89999)}`;
      a.memo = (a.memo || '') + (info.memo ? `[수납] ${info.memo}\n` : '');
      // 사진 OK 이면 자동 승인 후보, 아닐 시 photo 상태 유지
      if (a.photoOk && a.status === 'pay') a.status = 'approved';
      else if (a.status === 'applied') a.status = a.photoOk ? 'approved' : 'photo';
      n++;
      DataStore.addAudit({ type: '접수자', targetId: id, action: '수납', before, after: { paid: true, status: a.status }, memo: info.memo || '' });
    });
    DataStore.notify();
    toastOk(`${n}건 수납 처리되었습니다.`, { title: '수납 완료', type: 'success' });
    setPayModal(null);
    setSelected(new Set());
  };

  const doCancelPay = (ids, reason) => {
    if (!reason || !reason.trim()) { toastErr('수납 취소(환불) 사유를 입력해주세요.'); return; }
    let n = 0;
    ids.forEach(id => {
      const a = state.applicants.find(x => x.id === id);
      if (!a || !a.paid) return;
      const before = { paid: a.paid, status: a.status };
      a.paid = false;
      a.status = 'refund';                 // 환불자 상태로 분류 (수험번호는 유지)
      a.memo = (a.memo || '') + `[환불] ${reason}\n`;
      n++;
      DataStore.addAudit({ type: '접수자', targetId: id, action: '수납취소', before, after: { paid: false, status: 'refund' }, memo: reason });
    });
    DataStore.notify();
    toastOk(`${n}건 수납 취소(환불자 분류) 처리되었습니다.`, { title: '수납 취소', type: 'success' });
    setPayModal(null);
    setSelected(new Set());
  };

  // 수험번호 13자리 일괄 부여
  const doAssignExam = (preview = false) => {
    const session = state.sessions.find(s => s.id === sessionId);
    // 대상: paid && photoOk && status NOT IN (cancel, rejected) && exam 비어있음
    const targets = state.applicants
      .filter(a => a.sessionId === sessionId)
      .filter(a => a.paid && a.photoOk && !['cancel', 'rejected'].includes(a.status) && !a.exam);
    // 같은 시험장에서 동시접수(Ⅰ+Ⅱ) 강제: 본 데모에서는 lvl=동시 동일 처리
    // 알파벳 오름차순(영문)
    const sorted = targets.slice().sort((a, b) => a.nameEn.localeCompare(b.nameEn));

    // 그룹: 시험장×수준(7/8)
    const seqs = {}; // key: venueCode|lvlCode → 0001 시작
    const result = [];
    for (const a of sorted) {
      const v = state.venues.find(x => x.id === a.venueId);
      const venueCode = v ? v.code : '01';
      const regionCode = v ? v.regionCode : '001';
      const lvlCodes = a.level === '동시' ? ['7', '8'] : [a.level === 'Ⅰ' ? '7' : '8'];
      const assigned = [];
      for (const lc of lvlCodes) {
        const key = venueCode + '|' + lc;
        seqs[key] = (seqs[key] || 0) + 1;
        const num = `025${regionCode}${lc}${venueCode}${String(seqs[key]).padStart(4, '0')}`;
        assigned.push(num);
      }
      result.push({ id: a.id, name: a.nameEn, nameKo: a.nameKo, exam: assigned.join(' / '), level: a.level });
    }

    if (preview) return { result, targets: targets.length, skipped: state.applicants.filter(a => a.sessionId === sessionId).length - targets.length };

    // 확정
    for (const r of result) {
      const a = state.applicants.find(x => x.id === r.id);
      a.exam = r.exam;
      DataStore.addAudit({ type: '접수자', targetId: r.id, action: '수험번호부여', after: { exam: a.exam }, memo: `회차 ${session?.no} 알파벳순 부여` });
    }
    DataStore.notify();
    toastOk(`${result.length}건에 수험번호가 일괄 부여되었습니다.`, { title: '수험번호 부여 완료' });
    return { result, targets: targets.length };
  };

  const myRole = state.me?.role || 'super';
  const canAssignExam = myRole === 'super';                 // 슈퍼 관리자만
  const canDownload = myRole !== 'viewer';                  // 조회자는 불가

  // bulk action helpers
  const bulkIds = Array.from(selected);

  // sort helper
  const sortBy = (k) => setSort(s => s.k === k ? { k, dir: s.dir === 'asc' ? 'desc' : 'asc' } : { k, dir: 'asc' });

  return (
    <>
      <div className="panel-head">
        <div>
          <h1>접수자 관리</h1>
          <div className="sub">사진 심사·수납·승인·반려·수험번호 부여를 단일 메뉴에서 동시에 진행합니다.</div>
        </div>
        <div className="actions">
          <button className="btn btn-secondary" onClick={() => setExcelModal(true)} disabled={!canDownload}>
            <I.Download style={{ width: 14, height: 14 }}/> 연명부 엑셀
          </button>
          <button className="btn btn-secondary" onClick={() => setZipModal(true)} disabled={!canDownload}>
            <I.Download style={{ width: 14, height: 14 }}/> 사진 zip
          </button>
          <button className="btn btn-secondary" onClick={() => window.print()}>
            <I.Printer style={{ width: 14, height: 14 }}/> 인쇄
          </button>
          <button className="btn btn-primary" disabled={!canAssignExam} onClick={() => setExamModal(true)}>
            <I.Hash style={{ width: 14, height: 14 }}/> 수험번호 일괄 부여
          </button>
        </div>
      </div>

      {/* Filter bar — TPKM_BO_2_1_1 */}
      <div className="filterbar no-print">
        <div className="chips">
          {STATUS_CHIPS.map(c => (
            <button key={c.id}
              className={`chip ${statusF === c.id ? 'active' : ''}`}
              onClick={() => setStatusF(c.id)}>
              {c.label}<span className="cnt">{DataStore.fmtNum(counts[c.id] || 0)}</span>
            </button>
          ))}
        </div>
        <div className="controls">
          <select className="select" value={venueF} onChange={e => setVenueF(e.target.value)}>
            <option value="all">전체 시험장</option>
            {state.venues.filter(v => v.active).map(v => <option key={v.id} value={v.id}>{v.nameKo}</option>)}
          </select>
          <select className="select" value={levelF} onChange={e => setLevelF(e.target.value)}>
            <option value="all">전체 급수</option>
            <option value="Ⅰ">TOPIK Ⅰ</option>
            <option value="Ⅱ">TOPIK Ⅱ</option>
            <option value="동시">동시(Ⅰ+Ⅱ)</option>
          </select>
          <input className="input search" type="text" placeholder="한글·영문 성명/생년월일/수험번호"
            value={q} onChange={e => setQ(e.target.value)}/>
          {(statusF !== 'all' || venueF !== 'all' || levelF !== 'all' || q) && (
            <button className="ibtn ghost" onClick={() => { setStatusF('all'); setVenueF('all'); setLevelF('all'); setQ(''); }}>
              조건 초기화
            </button>
          )}
        </div>
      </div>

      {/* Bulk action bar */}
      <BulkBar count={bulkIds.length} onClear={() => setSelected(new Set())}>
        <button className="ibtn" onClick={() => doBulkPhotoApprove(bulkIds)}>사진 일괄 승인</button>
        <button className="ibtn" onClick={() => setPayModal({ ids: bulkIds, mode: 'pay' })}>오프라인 수납</button>
        <button className="ibtn" onClick={() => setApproveModal({ ids: bulkIds })}>승인</button>
        <button className="ibtn danger" onClick={() => setRejectModal({ ids: bulkIds })}>반려</button>
        <button className="ibtn" onClick={() => setPayModal({ ids: bulkIds.filter(id => state.applicants.find(a => a.id === id)?.paid), mode: 'cancel' })}>수납취소</button>
      </BulkBar>

      {/* Data grid — TPKM_BO_2_1_2 연명부 컬럼 정합 */}
      <div className="dg-wrap">
        <div className="dg-scroll">
          <table className="dg" id="applicants-grid">
            <thead>
              <tr>
                <th className="cb"><input type="checkbox" checked={allOnPage} onChange={toggleAllOnPage}/></th>
                <th className="sortable num" onClick={() => sortBy('no')}>번호</th>
                <th>사진</th>
                <th className="sortable" onClick={() => sortBy('nameKo')}>한글성명</th>
                <th className="sortable" onClick={() => sortBy('nameEn')}>영문성명</th>
                <th>급수</th>
                <th className="sortable" onClick={() => sortBy('appliedAt')}>접수일</th>
                <th>수험번호</th>
                <th>사진심사</th>
                <th>수납</th>
                <th>상태</th>
                <th className="no-print">관리</th>
              </tr>
            </thead>
            <tbody>
              {pageRows.map(a => (
                <tr key={a.id} className={selected.has(a.id) ? 'sel' : ''}>
                  <td className="cb"><input type="checkbox" checked={selected.has(a.id)} onChange={() => toggleOne(a.id)}/></td>
                  <td className="num">{a.no}</td>
                  <td>
                    <PhotoThumb status={a.photoStatus} name={a.nameKo} seed={a.id}/>
                  </td>
                  <td>{a.nameKo}</td>
                  <td>{a.nameEn}</td>
                  <td><span className="code-id">{a.level}</span></td>
                  <td className="code muted">{a.appliedAt}</td>
                  <td className="code"><b style={{ color: a.exam ? 'var(--st-number)' : 'var(--text-4)' }}>{a.exam || '—'}</b></td>
                  <td><PhotoStatusPill status={a.photoStatus}/></td>
                  <td>{a.paid ? <Pill kind="approved">수납완료</Pill> : <Pill kind="pay">미수납</Pill>}</td>
                  <td><Pill kind={a.status}>{DataStore.statusLabel(a.status)}</Pill></td>
                  <td className="no-print">
                    <button className="ibtn" title="상세 보기" onClick={() => setDetailId(a.id)}>
                      <I.Eye style={{ width: 13, height: 13 }}/> 상세보기
                    </button>
                  </td>
                </tr>
              ))}
              {!pageRows.length && (
                <tr><td colSpan="12">
                  <div className="empty">
                    <div className="icon"><I.Search/></div>
                    <div className="ttl">조건에 맞는 접수자가 없습니다</div>
                    <div className="sub">필터/검색 조건을 변경해 보세요.</div>
                  </div>
                </td></tr>
              )}
            </tbody>
          </table>
        </div>
        <div className="dg-foot no-print">
          <div className="info">총 <b style={{ color: 'var(--text)', fontFamily: 'Inter' }}>{DataStore.fmtNum(filtered.length)}</b>건 · 페이지 {page} / {totalPages}</div>
          <Pager page={page} total={totalPages} onPage={setPage}/>
        </div>
      </div>

      {/* 노출시점 설정 — 고객사 수정 0527 */}
      <div className="acard no-print" style={{ marginTop: 16 }}>
        <div className="acard-head">
          <h3>수험번호 / 수험표 노출 시점 설정 (FO 접수확인)</h3>
          <div className="meta">고객사 수정 0527 — 부여 즉시 노출 안 함, 정해진 날짜에 FO에서 노출</div>
        </div>
        <div className="acard-body" style={{ display: 'flex', gap: 12, alignItems: 'flex-end', flexWrap: 'wrap' }}>
          <FormRow label="노출 시작일" hint="이 날짜 이전에는 FO에서 수험번호 미노출">
            <input type="date" className="input" style={{ height: 38, width: 200 }} defaultValue="2026-08-15"/>
          </FormRow>
          <FormRow label="노출 시작 시각">
            <input type="time" className="input" style={{ height: 38, width: 140 }} defaultValue="09:00"/>
          </FormRow>
          <button className="btn btn-primary" onClick={() => { DataStore.addAudit({ type: '회차', targetId: sessionId, action: '수정', memo: '수험번호 노출 시점 변경' }); toastOk('노출 시점이 저장되었습니다.'); }}>
            노출 시점 저장
          </button>
        </div>
      </div>

      {/* Detail LP (TPKM_BO_2_1_6) */}
      {detailId && <ApplicantDetailLP id={detailId} onClose={() => setDetailId(null)}
        onApprove={() => { setApproveModal({ ids: [detailId] }); }}
        onReject={() => { setRejectModal({ ids: [detailId] }); }}
        onPay={() => { const a = state.applicants.find(x => x.id === detailId); setPayModal({ ids: [detailId], mode: a?.paid ? 'cancel' : 'pay' }); }}
        onPhotoReview={() => setPhotoLP(detailId)}
      />}

      {/* Modals */}
      {photoLP && <PhotoReviewLP id={photoLP} onClose={() => setPhotoLP(null)} onApprove={doPhotoApprove} onReject={doPhotoReject}/>}
      {payModal && <PayModal modal={payModal} onClose={() => setPayModal(null)} onPay={doPay} onCancel={doCancelPay} onPhotoApprove={doPhotoApprove}/>}
      {approveModal && <ApproveModal modal={approveModal} onClose={() => setApproveModal(null)} onConfirm={() => doApprove(approveModal.ids)}/>}
      {rejectModal && <RejectModal modal={rejectModal} onClose={() => setRejectModal(null)} onConfirm={(reason) => doReject(rejectModal.ids, reason)}/>}
      {examModal && <ExamAssignModal onClose={() => setExamModal(false)} doAssign={doAssignExam}/>}
      {excelModal && <ExcelExportModal onClose={() => setExcelModal(false)} rows={filtered}/>}
      {zipModal && <ZipExportModal onClose={() => setZipModal(false)} rows={filtered}/>}

      <style>{`
        @media print {
          .no-print { display: none !important; }
          .sb, .tb, .panel-head .actions { display: none !important; }
          .app { display: block !important; }
          .mn { padding: 0 !important; }
          .dg-wrap { border: 0 !important; box-shadow: none !important; }
        }
      `}</style>
    </>
  );
}

// ---- thumb (initial-based avatar with subtle gradient) ----
function PhotoThumb({ status, name, seed }) {
  if (status === 'pending') return <div className="photo" style={{ background: 'var(--st-photo-bg)', color: 'var(--st-photo)' }}>미심사</div>;
  if (status === 'rejected') return <div className="photo" style={{ background: 'var(--st-rejected-bg)', color: 'var(--st-rejected)' }}>반려</div>;
  const hue = (seed.charCodeAt(seed.length - 1) * 17) % 360;
  return (
    <div className="photo" style={{ background: `linear-gradient(160deg, hsl(${hue} 35% 88%), hsl(${hue} 30% 78%))`, color: '#fff', fontSize: 13, fontWeight: 700 }}>
      {name.slice(0, 1)}
    </div>
  );
}

// ---- 사진 심사 상태 렀 (미심사 · 승인 · 반려) ----
function PhotoStatusPill({ status }) {
  if (status === 'approved') return <Pill kind="approved">승인</Pill>;
  if (status === 'rejected') return <Pill kind="rejected">반려</Pill>;
  return <Pill kind="photo">미심사</Pill>;
}

// ===== 사진 심사 인라인 슬라이드 패널 (TPKM_BO_2_1_3) =====
const PHOTO_REJECT_REASONS = ['정면 아님', '모자·선글라스', '흑백', '흐림', '본인 아님', '기타'];
function PhotoReviewLP({ id, onClose, onApprove, onReject }) {
  const state = useStore();
  const a = state.applicants.find(x => x.id === id);
  const [mode, setMode] = useState(null); // null | 'reject'
  const [reason, setReason] = useState(PHOTO_REJECT_REASONS[0]);
  const [other, setOther] = useState('');
  const [zoom, setZoom] = useState(false);
  if (!a) return null;
  const venue = state.venues.find(v => v.id === a.venueId);
  const hue = (a.id.charCodeAt(a.id.length - 1) * 17) % 360;
  const finalReason = reason === '기타' ? other : (other ? `${reason} — ${other}` : reason);
  const approve = () => { onApprove(id); onClose(); };
  const reject = () => {
    if (reason === '기타' && !other.trim()) { toastErr('상세 사유를 입력해주세요.'); return; }
    onReject(id, finalReason); onClose();
  };
  return (
    <LP open size="sm" onClose={onClose}
      title={`사진 심사 — ${a.nameKo}`}
      sub={<span>접수ID <code className="code-id">{a.id}</code> · 현재 <PhotoStatusPill status={a.photoStatus}/></span>}
      footer={mode === 'reject'
        ? <>
            <button className="btn btn-secondary" onClick={() => setMode(null)}>뒤로</button>
            <button className="btn btn-danger" onClick={reject} disabled={reason === '기타' && !other.trim()}>반려 처리</button>
          </>
        : <>
            <button className="btn btn-secondary" onClick={onClose}>닫기</button>
            <button className="btn btn-secondary" onClick={() => setMode('reject')}>반려</button>
            <button className="btn btn-primary" onClick={approve}>승인</button>
          </>}>
      <div style={{ display: 'flex', gap: 16 }}>
        <div style={{ flex: '0 0 150px' }}>
          {a.photoStatus === 'rejected'
            ? <div className="photo-lg" style={{ background: 'var(--st-rejected-bg)', color: 'var(--st-rejected)' }}>반려된 사진</div>
            : <div className="photo-lg" onClick={() => setZoom(true)} style={{ cursor: 'zoom-in', background: `linear-gradient(160deg, hsl(${hue} 40% 84%), hsl(${hue} 35% 58%))`, color: '#fff', fontSize: 64, fontWeight: 700 }}>{a.nameKo.slice(0,1)}</div>}
          <div style={{ marginTop: 8, display: 'flex', gap: 6 }}>
            <button className="ibtn" style={{ flex: 1 }} onClick={() => setZoom(true)}><I.Eye style={{ width: 12, height: 12 }}/> 원본</button>
            <button className="ibtn" style={{ flex: 1 }}><I.Download style={{ width: 12, height: 12 }}/> 받기</button>
          </div>
        </div>
        <div style={{ flex: 1 }}>
          <dl className="dl" style={{ gridTemplateColumns: '78px 1fr' }}>
            <dt>한글성명</dt><dd>{a.nameKo}</dd>
            <dt>영문성명</dt><dd>{a.nameEn}</dd>
            <dt>생년월일</dt><dd><code>{a.dob}</code></dd>
            <dt>성별</dt><dd>{a.sx === 1 ? '남(1)' : '여(2)'}</dd>
            <dt>국적</dt><dd>{a.nation}</dd>
            <dt>급수</dt><dd>TOPIK {a.level}</dd>
            <dt>시험장</dt><dd>{venue?.nameKo}</dd>
          </dl>
        </div>
      </div>

      {mode === 'reject' && (
        <div style={{ marginTop: 16, paddingTop: 14, borderTop: '1px solid var(--border)' }}>
          <FormRow label="반려 사유" required hint="사유는 응시자 이메일·마이페이지에 안내됩니다(사진 재등록 요청).">
            <select className="select" value={reason} onChange={e => setReason(e.target.value)}>
              {PHOTO_REJECT_REASONS.map(r => <option key={r}>{r}</option>)}
            </select>
          </FormRow>
          <FormRow label={reason === '기타' ? '상세 사유' : '추가 안내(선택)'} required={reason === '기타'}>
            <textarea className="textarea" rows="2" value={other} onChange={e => setOther(e.target.value)} placeholder="예) 정면 사진이 아닙니다. 사진을 다시 등록해주세요."></textarea>
          </FormRow>
        </div>
      )}

      <div style={{ marginTop: 14, fontSize: 11.5, color: 'var(--text-3)', background: 'var(--bg-2)', padding: 8, borderRadius: 6 }}>
        ⓘ 동시 작업 충돌 방지(낙관적 잠금) · 이미 다른 관리자가 처리한 경우 안내 후 새로고침됩니다. 처리 즉시 처리 이력에 기록됩니다.
      </div>

      {zoom && (
        <div className="modal-backdrop open" style={{ zIndex: 340 }} onClick={() => setZoom(false)}>
          <div style={{ width: 'min(420px, 90vw)', aspectRatio: '3/4', borderRadius: 10, background: `linear-gradient(160deg, hsl(${hue} 40% 80%), hsl(${hue} 35% 48%))`, display: 'flex', alignItems: 'center', justifyContent: 'center', color: '#fff', fontSize: 160, fontWeight: 700 }}>{a.nameKo.slice(0,1)}</div>
        </div>
      )}
    </LP>
  );
}

// ===== Detail LP =====
function ApplicantDetailLP({ id, onClose, onApprove, onReject, onPay, onPhotoReview }) {
  const state = useStore();
  const a = state.applicants.find(x => x.id === id);
  const [tab, setTab] = useState('profile');
  const [memo, setMemo] = useState('');
  if (!a) return null;
  const venue = state.venues.find(v => v.id === a.venueId);
  const session = state.sessions.find(s => s.id === a.sessionId);
  const log = state.audit.filter(l => l.targetId === id);

  const addMemo = () => {
    if (!memo.trim()) return;
    a.memo = (a.memo || '') + `[${new Date().toISOString().slice(0,16).replace('T',' ')}/${state.me?.id}] ${memo}\n`;
    DataStore.addAudit({ type: '접수자', targetId: id, action: '수정', memo: '관리자 메모 추가' });
    DataStore.notify();
    setMemo('');
    toastOk('메모가 추가되었습니다.');
  };

  return (
    <LP open={true} size="wide" onClose={onClose}
      title={`접수자 상세 — ${a.nameKo} (${a.nameEn})`}
      sub={<span>회차 {session?.name || '—'} · 접수번호 <code className="code-id">{a.no}</code> · 접수ID <code className="code-id">{a.id}</code> · 상태 <Pill kind={a.status}>{DataStore.statusLabel(a.status)}</Pill></span>}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>닫기</button>
        <button className="btn btn-secondary" onClick={onPhotoReview}><I.Image style={{ width: 14, height: 14 }}/> 사진심사</button>
        <button className="btn btn-secondary" onClick={onPay}>{a.paid ? '수납 취소' : '수납'}</button>
        <button className="btn btn-secondary" onClick={onReject} disabled={a.status === 'rejected'}>반려</button>
        <button className="btn btn-primary" onClick={onApprove} disabled={a.status === 'approved'}>승인</button>
      </>}>
      <div className="lp-tabs">
        <button className={tab === 'profile' ? 'active' : ''} onClick={() => setTab('profile')}>기본 정보</button>
        <button className={tab === 'memo' ? 'active' : ''} onClick={() => setTab('memo')}>메모</button>
        <button className={tab === 'log' ? 'active' : ''} onClick={() => setTab('log')}>처리 이력 ({log.length})</button>
      </div>

      {tab === 'profile' && (
        <div style={{ display: 'grid', gridTemplateColumns: '240px 1fr', gap: 24 }}>
          <div>
            <PhotoLarge status={a.photoStatus} name={a.nameKo} seed={a.id}/>
            <div style={{ marginTop: 10, display: 'flex', gap: 6 }}>
              <button className="ibtn" style={{ flex: 1 }}><I.Download style={{ width: 12, height: 12 }}/> 원본 받기</button>
              <button className="ibtn" style={{ flex: 1 }} onClick={onPhotoReview}>사진심사</button>
            </div>
            {a.photoStatus !== 'approved' && <div style={{ marginTop: 8, padding: 8, background: 'var(--st-photo-bg)', color: 'var(--st-photo)', borderRadius: 6, fontSize: 12 }}>사진 {a.photoStatus === 'rejected' ? '반려' : '미심사'} 상태입니다. 하단 ‘사진심사’ 버튼으로 처리하세요.</div>}
          </div>
          <div>
            <FieldSet legend="응시자 정보" cols={2}>
              <KV k="접수번호" v={<code className="code-id">{a.no}</code>}/>
              <KV k="한글 성명" v={a.nameKo}/>
              <KV k="영문 성명" v={a.nameEn}/>
              <KV k="생년월일" v={<code className="code-id">{a.dob}</code>}/>
              <KV k="성별" v={a.sx === 1 ? '남(1)' : '여(2)'}/>
              <KV k="국적" v={a.nation}/>
              <KV k="제1언어" v={a.l1}/>
              <KV k="직업" v={a.job}/>
              <KV k="응시동기" v={a.motive}/>
              <KV k="응시목적" v={a.purpose}/>
              <KV k="이메일" v={a.email}/>
              <KV k="전화" v={a.tel}/>
              <KV k="편의지원" v={a.accommodation ? '신청' : '미신청'}/>
            </FieldSet>

            <FieldSet legend="시험·접수 정보" cols={2}>
              <KV k="회차" v={session?.name || '—'}/>
              <KV k="급수" v={`TOPIK ${a.level}`}/>
              <KV k="시험장" v={venue?.nameKo || '—'}/>
              <KV k="접수일시" v={a.appliedAt}/>
              <KV k="사진 심사" v={<PhotoStatusPill status={a.photoStatus}/>}/>
              <KV k="수납 상태" v={a.paid ? <Pill kind="approved">수납완료</Pill> : <Pill kind="pay">미수납</Pill>}/>
              <KV k="수납 일시" v={a.paidAt || '—'}/>
              <KV k="영수증" v={a.receipt || '—'}/>
              <KV k="수험번호" v={a.exam ? <code className="code-id" style={{ color: 'var(--st-number)', fontWeight: 700 }}>{a.exam}</code> : '미부여'}/>
              <KV k="처리 상태" v={<Pill kind={a.status}>{DataStore.statusLabel(a.status)}</Pill>}/>
              <KV k="반려 사유" v={a.rejectReason || '—'}/>
            </FieldSet>
          </div>
        </div>
      )}

      {tab === 'memo' && (
        <div>
          <FormRow label="새 메모 추가">
            <textarea className="textarea" rows="3" value={memo} onChange={e => setMemo(e.target.value)} placeholder="이 응시자에 대한 관리자 메모를 입력하세요"></textarea>
          </FormRow>
          <button className="btn btn-primary" onClick={addMemo} disabled={!memo.trim()}>메모 추가</button>
          <hr style={{ margin: '20px 0', border: 'none', borderTop: '1px solid var(--border)' }}/>
          <div>
            <div className="label" style={{ fontWeight: 600, color: 'var(--text-2)', marginBottom: 6 }}>지난 메모</div>
            <pre style={{ background: 'var(--bg-2)', padding: 12, borderRadius: 6, fontSize: 12.5, whiteSpace: 'pre-wrap', fontFamily: 'inherit', color: 'var(--text-2)', maxHeight: 280, overflow: 'auto' }}>{a.memo || '메모 없음'}</pre>
          </div>
        </div>
      )}

      {tab === 'log' && (
        <div className="timeline">
          {log.length === 0 && <div className="empty">처리 이력이 없습니다</div>}
          {log.map(l => (
            <div key={l.id} className={`ev ${l.action === '승인' ? 'approved' : l.action === '반려' ? 'rejected' : ''}`}>
              <div className="when">{l.ts}</div>
              <div className="what">{l.type} · <b>{l.action}</b></div>
              <div className="who">처리자 <code className="code-id">{l.actor}</code> · IP {l.ip}</div>
              {l.memo && <div className="note">{l.memo}</div>}
            </div>
          ))}
        </div>
      )}
    </LP>
  );
}

function KV({ k, v }) {
  return (
    <div className="form-row" style={{ marginBottom: 0 }}>
      <div className="label" style={{ fontSize: 11.5, color: 'var(--text-3)', marginBottom: 2 }}>{k}</div>
      <div style={{ fontSize: 14, color: 'var(--text)', fontWeight: 500 }}>{v}</div>
    </div>
  );
}

function PhotoLarge({ status, name, seed }) {
  if (status === 'pending') return <div className="photo-lg" style={{ background: 'var(--st-photo-bg)', color: 'var(--st-photo)' }}>사진 미심사</div>;
  if (status === 'rejected') return <div className="photo-lg" style={{ background: 'var(--st-rejected-bg)', color: 'var(--st-rejected)' }}>사진 반려</div>;
  const hue = (seed.charCodeAt(seed.length - 1) * 17) % 360;
  return (
    <div className="photo-lg" style={{ background: `linear-gradient(160deg, hsl(${hue} 35% 86%), hsl(${hue} 30% 70%))`, color: '#fff', fontSize: 80, fontWeight: 700 }}>
      {name.slice(0, 1)}
    </div>
  );
}

// ===== Pay modal (TPKM_BO_2_1_3) — 수납 / 수납취소(환불자) =====
function PayModal({ modal, onClose, onPay, onCancel, onPhotoApprove }) {
  const state = useStore();
  const [memo, setMemo] = useState('');
  const [receipt, setReceipt] = useState('');
  const [reason, setReason] = useState('본인 요청');
  const [reasonOther, setReasonOther] = useState('');
  const ids = modal.ids || [];
  const rows = ids.map(id => state.applicants.find(a => a.id === id)).filter(Boolean);
  if (!rows.length) return (
    <Modal open onClose={onClose} title="오프라인 수납 처리"
      footer={<button className="btn btn-primary" onClick={onClose}>확인</button>}>
      <div>처리 가능한 대상이 없습니다.</div>
    </Modal>
  );
  const session = state.sessions.find(s => s.id === rows[0].sessionId);
  const totalFee = rows.reduce((sum, a) => {
    if (a.level === 'Ⅰ') return sum + session.feeI;
    if (a.level === 'Ⅱ') return sum + session.feeII;
    return sum + session.feeI + session.feeII;
  }, 0);
  const cancelMode = modal.mode === 'cancel';
  const finalReason = reason === '기타' ? reasonOther : reason;

  return (
    <Modal open onClose={onClose} title={cancelMode ? '수납 취소(환불자 분류)' : '오프라인 수납 처리'} danger={cancelMode}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>취소</button>
        {cancelMode ? (
          <button className="btn btn-danger" onClick={() => onCancel(ids, finalReason)} disabled={!finalReason.trim()}>수납 취소</button>
        ) : (
          <button className="btn btn-primary" onClick={() => onPay(ids, { memo, receipt })}>수납 완료 처리</button>
        )}
      </>}>
      <div style={{ marginBottom: 14, fontSize: 13, color: 'var(--text-2)' }}>
        대상 <b>{rows.length}</b>건 · 합계 응시료 <b style={{ color: 'var(--primary)' }}>{DataStore.fmtCurrency(totalFee)}</b>
        <div style={{ fontSize: 12, color: 'var(--text-3)', marginTop: 2 }}>
          {cancelMode
            ? '※ 수납 취소 시 응시자는 환불자로 분류되며, 수험번호는 유지됩니다.'
            : '※ 행 단위 낙관적 잠금 · 처리 즉시 관리자 처리 이력에 기록됩니다.'}
        </div>
      </div>

      {/* 사진/기본정보 동시 확인 (고객사 수정 0526) — 사진 미심사 건은 모달 내 사진 승인 가능 */}
      <div style={{ maxHeight: 240, overflow: 'auto', border: '1px solid var(--border)', borderRadius: 6, marginBottom: 14 }}>
        <table className="dg" style={{ fontSize: 12 }}>
          <thead><tr><th>사진</th><th>한글성명</th><th>영문성명</th><th>생년월일</th><th>급수</th><th>시험장</th><th>사진심사</th><th>현 상태</th></tr></thead>
          <tbody>
            {rows.map(a => (
              <tr key={a.id}>
                <td><PhotoThumb status={a.photoStatus} name={a.nameKo} seed={a.id}/></td>
                <td>{a.nameKo}</td>
                <td>{a.nameEn}</td>
                <td className="code">{a.dob}</td>
                <td>{a.level}</td>
                <td>{DataStore.venueName(a.venueId)}</td>
                <td>
                  {a.photoStatus === 'pending'
                    ? <button className="ibtn" onClick={() => onPhotoApprove(a.id)}>사진 승인</button>
                    : <PhotoStatusPill status={a.photoStatus}/>}
                </td>
                <td><Pill kind={a.status}>{DataStore.statusLabel(a.status)}</Pill></td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>

      {cancelMode ? (
        <>
          <FormRow label="취소 사유" required>
            <select className="select" value={reason} onChange={e => setReason(e.target.value)}>
              {['본인 요청','중복 접수','정보 오류','기타'].map(r => <option key={r}>{r}</option>)}
            </select>
          </FormRow>
          {reason === '기타' && (
            <FormRow label="상세 사유" required>
              <textarea className="textarea" rows="2" value={reasonOther} onChange={e => setReasonOther(e.target.value)}/>
            </FormRow>

// ===== 엑셀(연명부 양식) 내보내기 (TPKM_BO_2_1_8) =====
function ExcelExportModal({ onClose, rows }) {
  const state = useStore();
  const [mode, setMode] = useState('current'); // current | full
  // group rows by (시험장, 급수)
  const groups = useMemo(() => {
    const m = new Map();
    rows.forEach(a => {
      const venue = state.venues.find(v => v.id === a.venueId);
      const key = `${a.level}_미얀마_${venue?.nameKo || '미지정'}`;
      if (!m.has(key)) m.set(key, []);
      m.get(key).push(a);
    });
    return Array.from(m.entries()).map(([k, v]) => ({ k, n: v.length }));
  }, [rows, state.venues]);
  const session = state.sessions.find(s => s.id === state.activeSessionId);

  const doExport = () => {
    const role = (DataStore.getAdminSession && DataStore.getAdminSession()?.role) || 'super';
    if (window.TOPIKBoBridge && !TOPIKBoBridge.enforcePerm(role, '접수 관리|엑셀·사진 zip 다운로드', 'execute')) return;
    const run = () => {
      DataStore.addAudit({ type: '접수자', targetId: '—', action: '게시', memo: `연명부 엑셀 내보내기(${rows.length}건, ${mode === 'full' ? '회차전체 zip' : '현재 필터'})` });
      toastOk(`${rows.length}건의 연명부 엑셀 파일을 생성했습니다.`, { title: '엑셀 생성 완료' });
      onClose();
    };
    if (window.TOPIKBoBridge) {
      TOPIKBoBridge.exportRosterExcel({ mode, rows, state }).then(run).catch(e => toastErr(e.message || '엑셀 생성 실패'));
      return;
    }
    run();
  };
  return (
    <Modal open onClose={onClose} title="연명부 양식 엑셀 내보내기"
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>취소</button>

      </>}>
      <div style={{ fontSize: 13, color: 'var(--text-2)' }}>
        <b>11컬럼</b>(연락처/이메일 제외): 한글성명 · 영문성명 · 생년월일 · 성별 · 국적 · 제1언어 · 직업 · 응시동기 · 응시목적 · 급수 · 수험번호
      </div>
      <div className="seg" style={{ marginTop: 12 }}>
        <button className={mode === 'current' ? 'active' : ''} onClick={() => setMode('current')}>현재 필터({rows.length})</button>
        <button className={mode === 'full' ? 'active' : ''} onClick={() => setMode('full')}>회차 전체(시험장×수준별 zip)</button>
      </div>
      <div style={{ marginTop: 16 }}>
        <div className="label" style={{ fontWeight: 600, color: 'var(--text-2)', marginBottom: 6 }}>생성될 파일 미리보기</div>
        <div style={{ background: 'var(--bg-2)', borderRadius: 6, padding: 12, fontSize: 12.5, fontFamily: 'Inter, monospace', color: 'var(--text-2)', maxHeight: 200, overflow: 'auto' }}>
          {mode === 'current' ? (
            <div>제{session?.no}회 TOPIK 지원자 연명부(미얀마_혼합).xlsx <span style={{ color: 'var(--text-3)' }}>({rows.length}행)</span></div>
          ) : (
            groups.map(g => (
              <div key={g.k}>제{session?.no}회 TOPIK 지원자 연명부(TOPIK_{g.k}).xlsx <span style={{ color: 'var(--text-3)' }}>({g.n}행)</span></div>
            ))
          )}
        </div>
        <div style={{ marginTop: 10, fontSize: 12, color: 'var(--text-3)' }}>※ 응시자코드 순으로 정렬(연명부 ‘작성된 수험번호 순으로 시험실 배치’ 원칙).</div>
      </div>
    </Modal>
  );
}

<script type="text/babel">
/* ============================================================
   panels/photos.jsx — 사진 심사 (카드 갤러리)
   접수자 목록(applicants.jsx)의 사진 심사 로직(PhotoReviewLP / DataStore)을
   재사용한 카드형 갤러리 뷰. 각 카드에서 인라인 승인/반려(사유 코드) 처리.
   ============================================================ */

const PHOTO_PANEL_REASONS = ['정면 아님', '모자·선글라스', '흑백', '흐림', '본인 아님', '기타'];

function PhotosPanel() {
  const state = useStore();
  const sessionId = state.activeSessionId;
  const apps = useMemo(() => state.applicants.filter(a => a.sessionId === sessionId), [state.applicants, sessionId]);

  const [statusF, setStatusF] = useState('pending'); // pending | approved | rejected | all
  const [q, setQ] = useState('');
  const [lpId, setLpId] = useState(null);            // 상세 심사 LP (applicants.jsx의 PhotoReviewLP 재사용)

  const counts = useMemo(() => ({
    all: apps.length,
    pending: apps.filter(a => a.photoStatus === 'pending').length,
    approved: apps.filter(a => a.photoStatus === 'approved').length,
    rejected: apps.filter(a => a.photoStatus === 'rejected').length,
  }), [apps]);

  const list = useMemo(() => {
    let r = apps;
    if (statusF !== 'all') r = r.filter(a => a.photoStatus === statusF);
    if (q) {
      const qq = q.trim().toLowerCase();
      r = r.filter(a => a.nameKo.includes(qq) || a.nameEn.toLowerCase().includes(qq) || a.dob.includes(qq));
    }
    return r;
  }, [apps, statusF, q]);

  // 사진 심사 로직 — applicants.jsx의 doPhotoApprove / doPhotoReject 와 동일하게 동작
  const approve = (id) => {
    const a = state.applicants.find(x => x.id === id);
    if (!a) return;
    const before = { photoStatus: a.photoStatus, status: a.status };
    a.photoStatus = 'approved';
    a.photoOk = true;
    if (a.status === 'photo') a.status = a.paid ? 'approved' : 'pay';
    DataStore.addAudit({ type: '사진', targetId: id, action: '승인', before, after: { photoStatus: 'approved', status: a.status }, memo: '' });
    DataStore.notify();
    toastOk('사진이 승인되었습니다.', { title: '사진 심사', type: 'success' });
  };
  const reject = (id, reason) => {
    const a = state.applicants.find(x => x.id === id);
    if (!a) return;
    if (!reason || !reason.trim()) { toastErr('반려 사유를 선택해주세요.'); return; }
    const before = { photoStatus: a.photoStatus, status: a.status, rejectReason: a.rejectReason };
    a.photoStatus = 'rejected';
    a.photoOk = false;
    a.status = 'rejected';
    a.rejectReason = reason;
    DataStore.addAudit({ type: '사진', targetId: id, action: '반려', before, after: { photoStatus: 'rejected', status: 'rejected', rejectReason: reason }, memo: reason });
    DataStore.notify();
    toastOk('사진이 반려되었습니다. 응시자에게 이메일이 발송됩니다.', { title: '사진 심사', type: 'success' });
  };

  const CHIPS = [
    { id: 'pending',  label: '미심사' },
    { id: 'approved', label: '승인' },
    { id: 'rejected', label: '반려' },
    { id: 'all',      label: '전체' },
  ];

  return (
    <>
      <div className="panel-head">
        <div>
          <h1>사진 심사</h1>
          <div className="sub">증명사진을 카드 갤러리로 빠르게 검토합니다. 접수자 목록의 사진 심사 로직과 동일하게 처리되며, 처리 즉시 이력에 기록됩니다.</div>
        </div>
        <div className="actions">
          <a className="btn btn-secondary" href="#applicants"><I.Users style={{ width: 14, height: 14 }}/> 접수자 목록</a>
        </div>
      </div>

      <div className="filterbar">
        <div className="chips">
          {CHIPS.map(c => (
            <button key={c.id} className={`chip ${statusF === c.id ? 'active' : ''}`} onClick={() => setStatusF(c.id)}>
              {c.label}<span className="cnt">{DataStore.fmtNum(counts[c.id] || 0)}</span>
            </button>
          ))}
        </div>
        <div className="controls">
          <input className="input search" type="text" placeholder="한글·영문 성명/생년월일" value={q} onChange={e => setQ(e.target.value)}/>
        </div>
      </div>

      <div className="photo-gallery">
        {list.map(a => (
          <PhotoReviewCard key={a.id} a={a} reasons={PHOTO_PANEL_REASONS}
            onApprove={approve} onReject={reject} onOpen={() => setLpId(a.id)}/>
        ))}
        {!list.length && (
          <div className="empty" style={{ gridColumn: '1 / -1' }}>
            <div className="icon"><I.Image/></div>
            <div className="ttl">표시할 사진이 없습니다</div>
            <div className="sub">필터/검색 조건을 변경해 보세요.</div>
          </div>
        )}
      </div>

      {/* 상세 심사 — applicants.jsx의 PhotoReviewLP 재사용 */}
      {lpId && <PhotoReviewLP id={lpId} onClose={() => setLpId(null)} onApprove={approve} onReject={reject}/>}

      <style>{`
        .photo-gallery {
          display: grid;
          grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
          gap: 14px;
        }
        .photo-rc .acard-body { display: flex; flex-direction: column; }
        .photo-rc .pic { width: 130px; align-self: center; }
        .photo-rc .nm { font-size: 15px; font-weight: 700; color: var(--text); margin-top: 12px; }
        .photo-rc .nm small { font-weight: 500; color: var(--text-3); font-size: 12.5px; margin-left: 4px; }
        .photo-rc dl.kv2 { display: grid; grid-template-columns: 64px 1fr; gap: 3px 8px; margin-top: 8px; font-size: 12.5px; align-items: center; }
        .photo-rc dl.kv2 dt { color: var(--text-3); }
        .photo-rc dl.kv2 dd { color: var(--text-2); }
        .photo-rc .rc-actions { margin-top: 12px; display: flex; gap: 6px; align-items: center; }
        .photo-rc .rc-actions .btn { flex: 1; }
        .photo-rc .rc-reject { margin-top: 10px; padding-top: 10px; border-top: 1px dashed var(--border); }
      `}</style>
    </>
  );
}

// ----- 사진 심사 카드 (인라인 승인/반려 + 반려 사유 코드) -----
function PhotoReviewCard({ a, reasons, onApprove, onReject, onOpen }) {
  const [mode, setMode] = useState(null); // null | 'reject'
  const [reason, setReason] = useState(reasons[0]);
  const [other, setOther] = useState('');
  const finalReason = reason === '기타' ? other : (other ? `${reason} — ${other}` : reason);
  const doReject = () => {
    if (reason === '기타' && !other.trim()) { toastErr('상세 사유를 입력해주세요.'); return; }
    onReject(a.id, finalReason);
    setMode(null); setOther('');
  };
  return (
    <div className="acard photo-rc">
      <div className="acard-body">
        <div className="pic">
          <PhotoLarge status={a.photoStatus} name={a.nameKo} seed={a.id}/>
        </div>
        <div className="nm">{a.nameKo} <small>{a.nameEn}</small></div>
        <dl className="kv2">
          <dt>생년월일</dt><dd><code className="code-id">{a.dob}</code></dd>
          <dt>성별</dt><dd>{a.sx === 1 ? '남(1)' : '여(2)'}</dd>
          <dt>국적</dt><dd>{a.nation}</dd>
          <dt>급수</dt><dd>TOPIK {a.level}</dd>
          <dt>심사</dt><dd><PhotoStatusPill status={a.photoStatus}/></dd>
        </dl>

        {mode === 'reject' ? (
          <div className="rc-reject">
            <FormRow label="반려 사유" required hint="사유는 응시자에게 안내됩니다(사진 재등록 요청).">
              <select className="select" value={reason} onChange={e => setReason(e.target.value)}>
                {reasons.map(r => <option key={r}>{r}</option>)}
              </select>
            </FormRow>
            {reason === '기타' && (
              <FormRow label="상세 사유" required>
                <input className="input" value={other} onChange={e => setOther(e.target.value)} placeholder="상세 사유 입력"/>
              </FormRow>
            )}
            <div className="rc-actions">
              <button className="btn btn-secondary" onClick={() => setMode(null)}>뒤로</button>
              <button className="btn btn-danger" onClick={doReject}>반려 처리</button>
            </div>
          </div>
        ) : (
          <div className="rc-actions">
            <button className="ibtn ghost" title="상세 보기" onClick={onOpen}><I.Eye style={{ width: 14, height: 14 }}/></button>
            <button className="btn btn-secondary" onClick={() => setMode('reject')} disabled={a.photoStatus === 'rejected'}>반려</button>
            <button className="btn btn-primary" onClick={() => onApprove(a.id)} disabled={a.photoStatus === 'approved'}>승인</button>
          </div>
        )}
      </div>
    </div>
  );
}

</script>

<script type="text/babel">
/* panels/sessions.jsx — 회차 관리 (TPKM_BO_3_1_*) */

function SessionsPanel() {
  const state = useStore();
  const [edit, setEdit] = useState(null); // {id} or {new:true}
  const [delId, setDelId] = useState(null);

  const sessions = state.sessions.slice().sort((a,b) => (b.examDate || '').localeCompare(a.examDate || ''));

  const save = (data) => {
    const session = data.id ? state.sessions.find(s => s.id === data.id) : null;
    if (session) {
      const before = { ...session };
      Object.assign(session, data);
      DataStore.addAudit({ type: '회차', targetId: session.id, action: '수정', before, after: { ...session }, memo: '회차 수정' });
      toastOk(`${session.name} 정보가 수정되었습니다.`);
    } else {
      const id = 's' + (Math.max(...state.sessions.map(s => parseInt(s.id.slice(1)))) + 1);
      const nw = { id, applicants: 0, ...data };
      state.sessions.push(nw);
      DataStore.addAudit({ type: '회차', targetId: id, action: '생성', after: { ...nw }, memo: '회차 신규 등록' });
      toastOk(`${nw.name} 회차가 등록되었습니다.`);
    }
    DataStore.notify();
    setEdit(null);
  };

  const duplicate = (s) => {
    const id = 's' + (Math.max(...state.sessions.map(x => parseInt(x.id.slice(1)))) + 1);
    const copy = { ...s, id, no: s.no + 1, name: `제${s.no + 1}회 TOPIK(복제)`, status: 'planned', applicants: 0 };
    state.sessions.push(copy);
    DataStore.addAudit({ type: '회차', targetId: id, action: '생성', after: { ...copy }, memo: `복제: ${s.name}` });
    DataStore.notify();
    toastOk('회차가 복제되었습니다.');
  };

  const remove = () => {
    const s = state.sessions.find(x => x.id === delId);
    if (!s) return;
    const idx = state.sessions.indexOf(s);
    state.sessions.splice(idx, 1);
    DataStore.addAudit({ type: '회차', targetId: s.id, action: '삭제', before: { ...s }, memo: '회차 폐지' });
    DataStore.notify();
    setDelId(null);
    toastOk('회차가 폐지되었습니다.');
  };

  return (
    <>
      <div className="panel-head">
        <div>
          <h1>회차 관리</h1>
          <div className="sub">시험 회차를 등록·수정·복제합니다. 모든 변경은 처리 이력에 자동 기록됩니다.</div>
        </div>
        <div className="actions">
          <button className="btn btn-primary" onClick={() => setEdit({ new: true })}><I.Plus style={{ width: 14, height: 14 }}/> 회차 등록</button>
        </div>
      </div>

      <div className="dg-wrap">
        <div className="dg-scroll">
          <table className="dg">
            <thead>
              <tr>
                <th>회차</th><th>회차명</th><th>접수기간</th><th>시험일</th><th>발표일</th>
                <th className="num">정원</th><th className="num">접수자</th><th>응시료(Ⅰ/Ⅱ)</th><th>시험장</th><th>상태</th><th>관리</th>
              </tr>
            </thead>
            <tbody>
              {sessions.map(s => {
                const isOpen = s.status === 'open', isClosed = s.status === 'closed';
                return (
                  <tr key={s.id}>
                    <td className="code-id">{s.no}회</td>
                    <td><b>{s.name}</b></td>
                    <td className="code">{s.applyStart} ~ {s.applyEnd}</td>
                    <td className="code">{s.examDate}</td>
                    <td className="code muted">{s.resultDate}</td>
                    <td className="num">{DataStore.fmtNum(s.cap)}</td>
                    <td className="num">{DataStore.fmtNum(s.applicants || 0)}</td>
                    <td className="code">{DataStore.fmtNum(s.feeI)}/{DataStore.fmtNum(s.feeII)}</td>
                    <td>{s.venues.length}개소</td>
                    <td><Pill kind={isOpen ? 'approved' : isClosed ? 'cancel' : 'applied'}>{isOpen ? '접수중' : isClosed ? '마감' : '예정'}</Pill></td>
                    <td>
                      <div className="row-actions">
                        <button className="ibtn" onClick={() => setEdit({ id: s.id })}><I.Edit style={{ width: 12, height: 12 }}/> 수정</button>
                        <button className="ibtn" onClick={() => duplicate(s)}><I.Copy style={{ width: 12, height: 12 }}/> 복제</button>
                        <button className="ibtn danger" onClick={() => setDelId(s.id)}><I.Trash style={{ width: 12, height: 12 }}/></button>
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      </div>

      {edit && <SessionEditLP edit={edit} onClose={() => setEdit(null)} onSave={save}/>}
      {delId && (
        <Modal open onClose={() => setDelId(null)} title="회차 폐지" danger
          footer={<>
            <button className="btn btn-secondary" onClick={() => setDelId(null)}>취소</button>
            <button className="btn btn-danger" onClick={remove}>폐지</button>
          </>}>
          <div>회차를 폐지하시겠습니까? <b>접수자 정보는 유지</b>되며 회차는 비공개로 전환됩니다(soft-delete 권장).</div>
        </Modal>
      )}
    </>
  );
}

function SessionEditLP({ edit, onClose, onSave }) {
  const state = useStore();
  const existing = edit.id ? state.sessions.find(s => s.id === edit.id) : null;
  const [f, setF] = useState(existing ? { ...existing } : {
    no: (Math.max(...state.sessions.map(s => s.no)) + 1),
    name: '',
    applyStart: '', applyEnd: '', examDate: '', resultDate: '',
    cap: 1000, feeI: 12000, feeII: 15000, venues: [], status: 'planned'
  });

  useEffect(() => { if (!f.name && !existing) setF(s => ({ ...s, name: `제${s.no}회 TOPIK` })); }, []);

  const set = (k, v) => setF(s => ({ ...s, [k]: v }));
  const toggleVenue = (vid) => set('venues', f.venues.includes(vid) ? f.venues.filter(x => x !== vid) : [...f.venues, vid]);
  const valid = f.name && f.applyStart && f.applyEnd && f.examDate && f.resultDate && f.cap > 0 && f.feeI > 0 && f.feeII > 0 && f.venues.length > 0
    && f.applyStart < f.applyEnd && f.applyEnd < f.examDate && f.examDate < f.resultDate;

  return (
    <LP open title={existing ? `회차 수정 — ${existing.name}` : '회차 등록'} sub={existing ? `회차 ID ${existing.id}` : '신규 회차'}
      onClose={onClose}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className="btn btn-primary" disabled={!valid} onClick={() => onSave(f)}>{existing ? '저장' : '등록'}</button>
      </>}>
      <FieldSet legend="기본 정보" cols={2}>
        <FormRow label="회차 번호" required>
          <input type="number" className="input" value={f.no} onChange={e => set('no', parseInt(e.target.value||'0'))}/>
        </FormRow>
        <FormRow label="회차명" required>
          <input className="input" value={f.name} onChange={e => set('name', e.target.value)}/>
        </FormRow>
        <FormRow label="상태">
          <select className="select" value={f.status} onChange={e => set('status', e.target.value)}>
            <option value="planned">예정</option>
            <option value="open">접수중</option>
            <option value="closed">마감</option>
          </select>
        </FormRow>
        <FormRow label="정원" required>
          <input type="number" className="input" value={f.cap} onChange={e => set('cap', parseInt(e.target.value||'0'))}/>
        </FormRow>
      </FieldSet>

      <FieldSet legend="일정" cols={2}>
        <FormRow label="접수 시작일" required><input type="date" className="input" value={f.applyStart} onChange={e => set('applyStart', e.target.value)}/></FormRow>
        <FormRow label="접수 마감일" required><input type="date" className="input" value={f.applyEnd} onChange={e => set('applyEnd', e.target.value)}/></FormRow>
        <FormRow label="시험일" required><input type="date" className="input" value={f.examDate} onChange={e => set('examDate', e.target.value)}/></FormRow>
        <FormRow label="합격발표일" required><input type="date" className="input" value={f.resultDate} onChange={e => set('resultDate', e.target.value)}/></FormRow>
      </FieldSet>

      <FieldSet legend="응시료(MMK)" cols={2}>
        <FormRow label="TOPIK Ⅰ" required><input type="number" step="500" className="input" value={f.feeI} onChange={e => set('feeI', parseInt(e.target.value||'0'))}/></FormRow>
        <FormRow label="TOPIK Ⅱ" required><input type="number" step="500" className="input" value={f.feeII} onChange={e => set('feeII', parseInt(e.target.value||'0'))}/></FormRow>
      </FieldSet>

      <FieldSet legend="시험장 다중 선택">
        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 8 }}>
          {state.venues.filter(v => v.active).map(v => (
            <label key={v.id} className="kv" style={{ cursor: 'pointer', flexDirection: 'row', alignItems: 'center', gap: 10, padding: '10px 12px' }}>
              <input type="checkbox" checked={f.venues.includes(v.id)} onChange={() => toggleVenue(v.id)}/>
              <div>
                <div className="k">{v.region} · 코드 {v.code}</div>
                <div className="v" style={{ fontSize: 13, fontWeight: 500 }}>{v.nameKo}</div>
              </div>
            </label>
          ))}
        </div>
        <div style={{ marginTop: 8, fontSize: 12, color: 'var(--text-3)' }}>※ 활성 시험장만 선택할 수 있습니다.</div>
      </FieldSet>

      {!valid && (
        <div style={{ padding: 10, background: 'var(--st-photo-bg)', color: 'var(--st-photo)', borderRadius: 6, fontSize: 12.5 }}>
          ※ 모든 필수 항목 입력 + 일정 순서(접수시작 &lt; 접수마감 &lt; 시험일 &lt; 발표일) + 시험장 1개 이상 선택이 필요합니다.
        </div>
      )}
    </LP>
  );
}

window.SessionsPanel = SessionsPanel;

</script>

function RefundDetailLP({ id, onClose }) {
  const state = useStore();
  const r = state.refunds.find(x => x.id === id);

  const [replyPublic, setReplyPublic] = useState(false);

  // 열람 이력 기록 (비밀글)

    DataStore.addAudit({ type: '환불·정정', targetId: id, action: '수정', memo: '비밀글 열람' });
    DataStore.notify();
  }, [id]);

  if (!r) return null;

  const submitReply = () => {
    if (!reply.trim()) { toastErr('답변 내용을 입력해주세요.'); return; }
    const before = { hasAnswer: r.hasAnswer, status: r.status };
    r.hasAnswer = true;
    r.assignee = state.me?.id || 'admin01';
    r.status = status;
    r.comments.push({ author: state.me?.id, body: reply, public: replyPublic, ts: new Date().toISOString().slice(0,16).replace('T',' '), kind: 'reply' });
    DataStore.addAudit({ type: '환불·정정', targetId: id, action: '수정', before, after: { hasAnswer: true, status }, memo: `답변 등록(${replyPublic ? '공개' : '비공개'})` });
    DataStore.notify();
    setReply('');
    toastOk('답변이 등록되었습니다. 작성자에게 이메일이 발송됩니다.');
  };

  const addComment = () => {
    if (!comment.trim()) return;
    r.comments.push({ author: state.me?.id, body: comment, public: false, ts: new Date().toISOString().slice(0,16).replace('T',' '), kind: 'comment' });
    DataStore.addAudit({ type: '환불·정정', targetId: id, action: '수정', memo: '댓글 등록(비밀글—자동 비공개)' });
    DataStore.notify();
    setComment('');
    toastOk('댓글이 등록되었습니다.');
  };

  const applyMemberFix = () => {
    DataStore.addAudit({ type: '회원', targetId: '—', action: '수정', memo: `정보정정 신청 ${id} 기반 회원 정보 반영(데모)` });
    toastOk('회원 정보 정정 패널이 열립니다(데모).');

  return (

      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>닫기</button>
        <button className="btn btn-primary" onClick={submitReply} disabled={!reply.trim()}>답변 등록 · 상태 저장</button>
      </>}>
      <FieldSet legend="신청 내용" cols={1}>
        <KV k="유형" v={<span className={`pill ${r.type === '환불' ? 'pill-pay' : 'pill-applied'}`}>{r.type}</span>}/>
        <KV k="본문" v={<pre style={{ background: 'var(--bg-2)', padding: 10, borderRadius: 6, fontSize: 13, whiteSpace: 'pre-wrap', fontFamily: 'inherit', color: 'var(--text)' }}>{r.body}</pre>}/>
        <KV k="첨부" v={r.attachments.map(a => <span key={a} className="tag" style={{ marginRight: 6 }}>📎 {a}</span>)}/>
      </FieldSet>

      <FieldSet legend="처리" cols={2}>
        <FormRow label="처리 상태" required>
          <select className="select" value={status} onChange={e => setStatus(e.target.value)}>

          </select>
        </FormRow>
        <FormRow label="담당자">
          <input className="input" value={r.assignee || state.me?.id || ''} disabled/>
        </FormRow>
        {r.type === '환불' && (
          <>
            <FormRow label="환불 금액">
              <input className="input" value={refundAmount} onChange={e => setRefundAmount(e.target.value)} placeholder="예) 12,000 MMK"/>

            <FormRow label="환불 방법">

          </label>
        </FormRow>
      </FieldSet>

      <FieldSet legend={`댓글/대댓글 (${r.comments.length})`} cols={1}>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 10 }}>
          {r.comments.map((c, idx) => (
            <div key={idx} style={{ padding: 10, background: 'var(--bg-2)', borderRadius: 6, fontSize: 13 }}>

          <div style={{ display: 'flex', gap: 8 }}>

            <button className="btn btn-secondary" onClick={addComment} disabled={!comment.trim()}>등록</button>
          </div>
        </div>
      </FieldSet>
    </LP>
  );
}

function MemberEditLP({ id, onClose }) {
  const state = useStore();
  const m = state.members.find(x => x.id === id);
  const [f, setF] = useState({ ...m });
  const [reason, setReason] = useState('');
  const set = (k, v) => setF(s => ({ ...s, [k]: v }));
  const save = () => {
    if (!reason.trim()) { toastErr('수정 사유를 입력해주세요.'); return; }
    const before = { ...m };
    Object.assign(m, f);
    DataStore.addAudit({ type: '회원', targetId: id, action: '수정', before, after: { ...m }, memo: reason });
    DataStore.notify();
    toastOk('회원 정보가 수정되었습니다. 회원에게 이메일 통지가 발송됩니다.');
    onClose();
  };
  return (
    <LP open title={`회원 정보 수정 — ${m.nameKo}`} sub="신원 식별 정보 직접 수정 · 사유 필수 · 처리 이력 자동 기록" onClose={onClose}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className="btn btn-primary" onClick={save} disabled={!reason.trim()}>저장</button>
      </>}>
      <FieldSet legend="신원 정보" cols={2}>
        <FormRow label="한글 성명"><input className="input" value={f.nameKo} onChange={e => set('nameKo', e.target.value)}/></FormRow>
        <FormRow label="영문 성명"><input className="input" value={f.nameEn} onChange={e => set('nameEn', e.target.value)}/></FormRow>
        <FormRow label="이메일"><input className="input" value={f.email} onChange={e => set('email', e.target.value)}/></FormRow>
        <FormRow label="연락처"><input className="input" value={f.tel} onChange={e => set('tel', e.target.value)}/></FormRow>
        <FormRow label="국적"><input className="input" value={f.nation} onChange={e => set('nation', e.target.value)}/></FormRow>
        <FormRow label="마케팅 수신">
          <div className="seg">
            <button className={f.marketing ? 'active' : ''} onClick={() => set('marketing', true)} type="button">동의</button>
            <button className={!f.marketing ? 'active' : ''} onClick={() => set('marketing', false)} type="button">미동의</button>
          </div>
        </FormRow>
      </FieldSet>
      <FieldSet legend="수정 사유" cols={1}>
        <FormRow label="사유" required hint="이력 추적용 · 회원에게 노출되지 않음">
          <textarea className="textarea" rows="3" value={reason} onChange={e => setReason(e.target.value)} placeholder="예) 정보정정 신청 처리 — 생년월일 정정"/>
        </FormRow>
      </FieldSet>
    </LP>
  );
}

function SuspendModal({ id, onClose }) {
  const state = useStore();
  const m = state.members.find(x => x.id === id);
  const [reason, setReason] = useState('이용 약관 위반');
  const [other, setOther] = useState('');
  const final = reason === '기타' ? other : reason;
  const submit = () => {
    if (!final.trim()) { toastErr('사유를 입력해주세요.'); return; }
    const before = { status: m.status };
    m.status = 'inactive';
    m.reason = final;
    DataStore.addAudit({ type: '회원', targetId: id, action: '정지', before, after: { status: 'inactive' }, memo: final });
    DataStore.notify();
    toastOk('회원이 정지되었습니다. 활성 세션은 즉시 무효화됩니다.');
    onClose();
  };
  return (
    <Modal open onClose={onClose} title={`회원 정지 — ${m.nameKo}`} danger
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className="btn btn-danger" onClick={submit}>정지</button>
      </>}>
      <FormRow label="정지 사유" required>
        <select className="select" value={reason} onChange={e => setReason(e.target.value)}>
          {['이용 약관 위반','반복적인 부정 행위','장기 미접속','보안 위협','기타'].map(r => <option key={r}>{r}</option>)}
        </select>
      </FormRow>
      {reason === '기타' && (
        <FormRow label="상세 사유" required>
          <textarea className="textarea" rows="2" value={other} onChange={e => setOther(e.target.value)}/>
        </FormRow>
      )}
    </Modal>
  );
}

function WithdrawModal({ id, onClose }) {
  const state = useStore();
  const m = state.members.find(x => x.id === id);
  const [reason, setReason] = useState('본인 요청');
  const myApplies = state.applicants.filter(a => a.email === m.email && !['cancel','rejected'].includes(a.status));
  const submit = () => {
    if (!reason.trim()) { toastErr('사유를 입력해주세요.'); return; }
    const before = { status: m.status };
    m.status = 'withdrawn';
    m.reason = reason;
    // 진행 중 접수 자동 취소 (고객사 수정 0526)
    myApplies.forEach(a => {
      const ab = { status: a.status };
      a.status = 'cancel';
      DataStore.addAudit({ type: '접수자', targetId: a.id, action: '취소', before: ab, after: { status: 'cancel' }, memo: `회원 탈퇴(${id})에 따른 자동 취소` });
    });
    DataStore.addAudit({ type: '회원', targetId: id, action: '탈퇴', before, after: { status: 'withdrawn' }, memo: `${reason} · 진행 중 접수 ${myApplies.length}건 자동 취소` });
    DataStore.notify();
    toastOk(`회원이 탈퇴 처리되었습니다. 진행 중 접수 ${myApplies.length}건이 자동 취소되었습니다.`);
    onClose();
  };
  return (
    <Modal open onClose={onClose} title={`회원 탈퇴 — ${m.nameKo}`} danger
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>취소</button>
        <button className="btn btn-danger" onClick={submit}>탈퇴 처리</button>
      </>}>
      <div style={{ fontSize: 13, color: 'var(--text-2)', marginBottom: 12 }}>
        탈퇴 처리 시 <b>현재 진행 중인 접수 내역이 모두 취소</b>됩니다.
      </div>
      {myApplies.length > 0 && (
        <div style={{ marginBottom: 12, padding: 10, background: 'var(--st-photo-bg)', color: 'var(--st-photo)', borderRadius: 6, fontSize: 12.5 }}>
          ⚠ 진행 중인 접수 <b>{myApplies.length}건</b>이 자동 취소됩니다:
          <ul style={{ marginTop: 6, paddingLeft: 16 }}>
            {myApplies.map(a => {
              const s = state.sessions.find(x => x.id === a.sessionId);
              return <li key={a.id}>{s?.name} · TOPIK {a.level} · {DataStore.statusLabel(a.status)}</li>;
            })}
          </ul>
        </div>
      )}
      <FormRow label="탈퇴 사유" required>
        <select className="select" value={reason} onChange={e => setReason(e.target.value)}>
          {['본인 요청','장기 미접속','관리자 처리','기타'].map(r => <option key={r}>{r}</option>)}
        </select>
      </FormRow>
    </Modal>
  );
}

function PwResetLP({ id, onClose }) {
  const state = useStore();
  const m = state.members.find(x => x.id === id);
  const [issued, setIssued] = useState(false);
  const tempPw = useMemo(() => 'tpkm' + Math.random().toString(36).slice(2, 8), [id]);
  const issue = () => {
    DataStore.addAudit({ type: '회원', targetId: id, action: '비밀번호초기화', memo: `임시 비밀번호 발급 · 이메일 전송(${m.email}) · 첫 로그인 시 변경 강제` });
    DataStore.notify();
    setIssued(true);
    toastOk('임시 비밀번호가 이메일로 전송되었습니다.');
  };
  return (
    <LP open size="sm" title={`비밀번호 초기화 — ${m.nameKo}`} sub={m.email} onClose={onClose}
      footer={<>
        <button className="btn btn-secondary" onClick={onClose}>닫기</button>
        {!issued && <button className="btn btn-primary" onClick={issue}>임시 비밀번호 발급</button>}
      </>}>
      <div style={{ fontSize: 13, color: 'var(--text-2)', marginBottom: 12 }}>
        임시 비밀번호는 회원 이메일로 발송됩니다. 다음 로그인 시 변경이 강제됩니다.
      </div>
      {issued && (
        <div className="kv" style={{ background: 'var(--st-approved-bg)', borderColor: '#c8e5cd' }}>
          <span className="k">발급된 임시 비밀번호 (1회 노출)</span>
          <span className="v" style={{ fontFamily: 'Inter, monospace', color: 'var(--success)', letterSpacing: '0.04em' }}>{tempPw}</span>
        </div>
      )}
    </LP>
  );
}

<script type="text/babel">
/* panels/terms.jsx — 약관 관리 (TPKM_BO_5_2_*)
   - 버전 목록, 등록/수정/미리보기/게시/폐지/동의 이력
*/

const TERM_KINDS = ['이용약관','개인정보','마케팅'];

function TermsPanel() {
  const state = useStore();
  const [kindF, setKindF] = useState('all');
  const [edit, setEdit] = useState(null);
  const [preview, setPreview] = useState(null);
  const [publish, setPublish] = useState(null);
  const [retire, setRetire] = useState(null);
  const [consent, setConsent] = useState(false);

  const filtered = useMemo(() => {
    let r = state.terms.slice();
    if (kindF !== 'all') r = r.filter(t => t.kind === kindF);
    return r.sort((a,b) => (b.publishedAt || '').localeCompare(a.publishedAt || ''));
  }, [state.terms, kindF]);

  const save = (data) => {
    if (data.id) {
      const t = state.terms.find(x => x.id === data.id);
      if (t.status !== 'draft') { toastErr('게시된 약관은 수정할 수 없습니다. 신규 버전을 등록해주세요.'); return; }
      const before = { ...t };
      Object.assign(t, data);
      DataStore.addAudit({ type: '약관', targetId: t.id, action: '수정', before, after: { ...t }, memo: '' });
      toastOk('약관 초안이 수정되었습니다.');
    } else {
      const id = 't' + (state.terms.length + 1);
      const nw = { id, status: 'draft', author: state.me?.id || 'admin01', publishedAt: '', retiredAt: '', ...data };
      state.terms.push(nw);
      DataStore.addAudit({ type: '약관', targetId: id, action: '생성', after: { ...nw }, memo: '초안 등록' });
      toastOk('약관 초안이 등록되었습니다.');
    }
    DataStore.notify();
    setEdit(null);
  };

  const doPublish = () => {
    const t = state.terms.find(x => x.id === publish);
    // 동종 기존 게시 버전 폐지
    state.terms.forEach(x => {
      if (x.kind === t.kind && x.status === 'pub' && x.id !== t.id) {
        x.status = 'retired';
        x.retiredAt = new Date().toISOString().slice(0,10);
        DataStore.addAudit({ type: '약관', targetId: x.id, action: '폐지', memo: `신규 ${t.version} 게시에 따라 자동 폐지` });
      }
    });
    const before = { status: t.status };
    t.status = 'pub';
    t.publishedAt = new Date().toISOString().slice(0,10);
    DataStore.addAudit({ type: '약관', targetId: t.id, action: '게시', before, after: { status: 'pub' }, memo: '회원 재동의 정책: 다음 로그인 시 재동의' });
    DataStore.notify();
    setPublish(null);
    toastOk(`${t.kind} ${t.version}가 게시되었습니다.`);
  };

  const doRetire = () => {
    const t = state.terms.find(x => x.id === retire);
    const before = { status: t.status };
    t.status = 'retired';
    t.retiredAt = new Date().toISOString().slice(0,10);
    DataStore.addAudit({ type: '약관', targetId: t.id, action: '폐지', before, after: { status: 'retired' }, memo: '관리자 폐지' });
    DataStore.notify();
    setRetire(null);
    toastOk('약관이 폐지되었습니다.');
  };

  return (
    <>
      <div className="panel-head">

      toastErr('이미 사용 중인 아이디입니다.'); return;

    if (data._isNew) {
      // unique id
      if (state.admins.some(a => a.id === data.id)) { toastErr('이미 사용 중인 아이디입니다.'); return; }
      const nw = { id: data.id, name: data.name, email: data.email, role: data.role, status: 'active', lastLogin: '—', lastIp: '—', note: data.note || '' };
      state.admins.push(nw);
      DataStore.addAudit({ type: '관리자계정', targetId: nw.id, action: '생성', after: { ...nw }, memo: '계정 신규 등록 · 초기 비밀번호 첫 로그인 시 변경 강제' });
