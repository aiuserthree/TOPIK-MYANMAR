      const a = state.admins.find(x => x.id === data.id);
      const before = { ...a };
      Object.assign(a, data);
      DataStore.addAudit({ type: '관리자계정', targetId: a.id, action: '수정', before, after: { ...a }, memo: '계정 수정' });
      toastOk('관리자 계정이 수정되었습니다.');
    }

    setEdit(null);

    a.status = a.status === 'active' ? 'inactive' : 'active';
    DataStore.addAudit({ type: '관리자계정', targetId: a.id, action: '수정', before, after: { status: a.status }, memo: `${a.status === 'inactive' ? '비활성화' : '활성화'} · 사유: ${reason}` });

const ROLE_DEFS = [
  { role: 'super',   tag: 'role-super',   title: '최고관리자', en: 'super',   rec: '모든 액션 허용 (권장)' },
  { role: 'general', tag: 'role-general', title: '일반관리자', en: 'general', rec: '운영 액션 (접수·콘텐츠) 권장' },
  { role: 'viewer',  tag: 'role-viewer',  title: '조회관리자', en: 'viewer',  rec: 'read-only (조회 전용) 권장' },
];

// section-header / row checkbox supporting indeterminate
function TriCheck({ checked, indeterminate, disabled, onChange, label }) {
  const ref = useRef(null);
  useEffect(() => { if (ref.current) ref.current.indeterminate = !checked && indeterminate; }, [checked, indeterminate]);
  return (
    <label style={{ display: 'inline-flex', alignItems: 'center', gap: 6, cursor: disabled ? 'default' : 'pointer', opacity: disabled ? 0.5 : 1 }}>
      <input ref={ref} type="checkbox" checked={checked} disabled={disabled} onChange={onChange} style={{ width: 16, height: 16 }}/>
      {label && <span style={{ fontSize: 12.5, fontWeight: 600, color: 'var(--text-2)' }}>{label}</span>}
    </label>
  );
}

function PermissionsPanel() {
  const state = useStore();
  const myRole = state.me?.role || 'super';
  const canManage = myRole === 'super';

  const sections = DataStore.permSections;
  const actLabel = (a) => DataStore.permActions[a] || a;

  const [role, setRole] = useState('super');
  // working draft (deep clone of state.perms)
  const [draft, setDraft] = useState(() => JSON.parse(JSON.stringify(state.perms)));
  const cur = draft[role] || {};

  const dirty = useMemo(() => JSON.stringify(draft) !== JSON.stringify(state.perms), [draft, state.perms]);

  // counts per role (active admins)
  const roleCount = useMemo(() => {
    const c = { super: 0, general: 0, viewer: 0 };
    state.admins.forEach(a => { if (c[a.role] !== undefined && a.status === 'active') c[a.role]++; });
    return c;
  }, [state.admins]);

  const setMenuActions = (menuId, actions) => {
    setDraft(d => ({ ...d, [role]: { ...d[role], [menuId]: actions } }));
  };
  const toggleAction = (menu, act) => {
    if (!canManage) return;
    const have = cur[menu.id] || [];
    const next = have.includes(act) ? have.filter(a => a !== act) : [...have, act];
    // keep canonical order
    setMenuActions(menu.id, menu.actions.filter(a => next.includes(a)));
  };
  const toggleMenuAll = (menu, on) => {
    if (!canManage) return;
    setMenuActions(menu.id, on ? menu.actions.slice() : []);
  };
  const toggleSectionAll = (sec, on) => {
    if (!canManage) return;
    setDraft(d => {
      const r = { ...d[role] };
      sec.menus.forEach(m => { r[m.id] = on ? m.actions.slice() : []; });
      return { ...d, [role]: r };
    });
  };

  // section selection state
  const sectionState = (sec) => {
    let total = 0, on = 0;
    sec.menus.forEach(m => { total += m.actions.length; on += (cur[m.id] || []).length; });
    return { all: total > 0 && on === total, none: on === 0, some: on > 0 && on < total };
  };
  const menuState = (m) => {
    const on = (cur[m.id] || []).length, total = m.actions.length;
    return { all: total > 0 && on === total, none: on === 0, some: on > 0 && on < total };
  };

  const applyRecommended = () => {
    setDraft(d => ({ ...d, [role]: DataStore.recommendedPerms(role) }));
    toast(`${DataStore.roleLabel(role)} 권장값을 적용했습니다. 저장하면 반영됩니다.`);
  };
  const resetDraft = () => setDraft(JSON.parse(JSON.stringify(state.perms)));
  const save = () => {
    if (!canManage) return;
    // diff summary
    const before = JSON.parse(JSON.stringify(state.perms));
    state.perms = JSON.parse(JSON.stringify(draft));
    DataStore.addAudit({ type: '관리자계정', targetId: '권한매트릭스', action: '수정', before, after: state.perms, memo: '권한 매트릭스 변경 저장' });
    DataStore.notify();
    toastOk('권한 매트릭스가 저장되었습니다.', { title: '저장 완료', type: 'success' });
  };

  const exportMatrix = () => {
    DataStore.addAudit({ type: '관리자계정', targetId: '권한매트릭스', action: '게시', memo: '권한 매트릭스 내보내기(CSV)' });
    toastOk('권한 매트릭스를 CSV로 내보냈습니다.');
  };

  const totalOn = useMemo(() => {
    let n = 0; sections.forEach(s => s.menus.forEach(m => n += (cur[m.id] || []).length)); return n;
  }, [cur, sections]);

  return (
    <>
      <div className="panel-head">
        <div>
          <h1>관리자 권한 관리</h1>
          <div className="sub">등급 선택 후 각 메뉴의 권한 액션을 체크/해제하세요 · 섹션 「전체선택」으로 구분 단위 일괄 적용 · 최고관리자만 편집</div>
        </div>
        <div className="actions">
          <button className="btn btn-secondary" onClick={exportMatrix}><I.Download style={{ width: 14, height: 14 }}/> 내보내기</button>
        </div>
      </div>

      {!canManage && (
        <div style={{ padding: 14, background: 'var(--st-photo-bg)', color: 'var(--st-photo)', borderRadius: 8, marginBottom: 14, fontSize: 13 }}>
          ⓘ 최고관리자(super)만 권한을 편집할 수 있습니다. 현재 권한: <b>{DataStore.roleLabel(myRole)}</b> (조회 전용)
        </div>
      )}

      {/* 등급 선택 + 권장값 */}
      <div className="acard" style={{ marginBottom: 16 }}>
        <div className="acard-body" style={{ display: 'flex', alignItems: 'center', gap: 16, flexWrap: 'wrap' }}>
          <div className="seg">
            {ROLE_DEFS.map(r => (
              <button key={r.role} className={role === r.role ? 'active' : ''} onClick={() => setRole(r.role)}>
                {r.title} <span style={{ fontFamily: 'Inter', opacity: 0.6, marginLeft: 2 }}>{roleCount[r.role]}</span>
              </button>
            ))}
          </div>
          <div style={{ flex: 1, minWidth: 200, fontSize: 12.5, color: 'var(--text-3)' }}>
            <span className={`tag ${ROLE_DEFS.find(r => r.role === role).tag}`} style={{ marginRight: 8 }}>{DataStore.roleLabel(role)}</span>
            권장: {ROLE_DEFS.find(r => r.role === role).rec} · 현재 <b style={{ color: 'var(--text-2)', fontFamily: 'Inter' }}>{totalOn}</b>개 액션 허용
          </div>
          <button className="ibtn" disabled={!canManage} onClick={applyRecommended}><I.RefreshCcw style={{ width: 13, height: 13 }}/> 권장값 적용</button>
        </div>
      </div>

      {/* 편집 매트릭스 */}
      <div className="acard">
        <div className="acard-head">
          <h3>{DataStore.roleLabel(role)} 권한 설정</h3>
          <span className="meta">구분(섹션)별 「전체선택」 지원</span>
        </div>
        <div className="acard-body flush">
          {sections.map(sec => {
            const ss = sectionState(sec);
            return (
              <div key={sec.id} style={{ borderBottom: '1px solid var(--border)' }}>
                {/* section header */}
                <div style={{ display: 'flex', alignItems: 'center', gap: 12, padding: '10px 16px', background: '#FAFBFD' }}>
                  <TriCheck checked={ss.all} indeterminate={ss.some} disabled={!canManage}
                    onChange={() => toggleSectionAll(sec, !ss.all)}
                    label={`${sec.title}  ·  전체선택`}/>
                  <span style={{ fontSize: 11.5, color: 'var(--text-3)' }}>{sec.menus.length}개 메뉴</span>
                </div>
                {/* menu rows */}
                {sec.menus.map(m => {
                  const ms = menuState(m);
                  const have = cur[m.id] || [];
                  return (
                    <div key={m.id} style={{ display: 'grid', gridTemplateColumns: '200px 1fr', gap: 12, padding: '10px 16px', alignItems: 'center', borderTop: '1px solid var(--border)' }} className="perm-row">
                      <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                        <TriCheck checked={ms.all} indeterminate={ms.some} disabled={!canManage}
                          onChange={() => toggleMenuAll(m, !ms.all)}/>
                        <span style={{ fontSize: 13.5, fontWeight: 600, color: 'var(--text)' }}>{m.label}</span>
                      </div>
                      <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6 }}>
                        {m.actions.map(a => {
                          const on = have.includes(a);
                          return (
                            <button key={a} type="button" disabled={!canManage}
                              onClick={() => toggleAction(m, a)}
                              className="perm-chip"
                              data-on={on}>
                              <span className="bx">{on && <I.Check style={{ width: 11, height: 11 }}/>}</span>
                              {actLabel(a)}
                            </button>
                          );
                        })}
                      </div>
                    </div>
                  );
                })}
              </div>
            );
          })}
        </div>
      </div>

      {/* sticky save bar */}
      {canManage && (
        <div style={{ position: 'sticky', bottom: 0, marginTop: 16, padding: '12px 16px', background: '#fff', border: '1px solid var(--border)', borderRadius: 10, display: 'flex', alignItems: 'center', gap: 12, boxShadow: 'var(--shadow)' }}>
          <div style={{ fontSize: 13, color: dirty ? 'var(--accent)' : 'var(--text-3)' }}>
            {dirty ? '● 저장되지 않은 변경 사항이 있습니다.' : '변경 사항 없음 · 모든 변경은 처리 이력에 기록됩니다.'}
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 8 }}>
            <button className="btn btn-secondary" disabled={!dirty} onClick={resetDraft}>되돌리기</button>
            <button className="btn btn-primary" disabled={!dirty} onClick={save}>변경 사항 저장</button>
          </div>
        </div>
      )}

      <div style={{ marginTop: 16, padding: 14, background: 'var(--bg-2)', borderRadius: 8, fontSize: 12.5, color: 'var(--text-3)', lineHeight: 1.7 }}>
        등급 변경(계정별)은 <a href="#admins" style={{ color: 'var(--primary)' }}>관리자 계정 관리</a>에서 수행합니다. 권한 검증은 서버에서 강제됩니다(클라이언트 메뉴 숨김만으로 보호되지 않음). 세밀한 RBAC는 향후 확장 항목입니다.
      </div>

      <style>{`
        .perm-chip {
          display: inline-flex; align-items: center; gap: 5px;
          height: 28px; padding: 0 10px 0 6px;
          border: 1px solid var(--border-strong); border-radius: 6px;
          background: #fff; color: var(--text-3);
          font-size: 12px; font-weight: 500;
          transition: all .12s var(--ease);
        }
        .perm-chip .bx {
          width: 15px; height: 15px; border-radius: 4px;
          border: 1.5px solid var(--border-strong); background: #fff;
          display: inline-flex; align-items: center; justify-content: center;
          color: #fff; flex: 0 0 auto;
        }
        .perm-chip[data-on="true"] {
          background: var(--primary-50); border-color: var(--primary); color: var(--primary);
        }
        .perm-chip[data-on="true"] .bx { background: var(--primary); border-color: var(--primary); }
        .perm-chip:not([disabled]):hover { border-color: var(--primary); }
        .perm-chip[disabled] { cursor: default; opacity: .55; }
        .perm-row:hover { background: #FAFBFD; }
        @media (max-width: 700px) { .perm-row { grid-template-columns: 1fr !important; } }
      `}</style>
    </>
  );
}

window.PermissionsPanel = PermissionsPanel;

</script>

<script type="text/babel">
/* panels/audit.jsx — 관리자 처리 이력 (TPKM_BO_6_2_*) */

const AUDIT_TYPES = ['접수자','사진','회차','시험장','공지','FAQ','환불·정정','문의','회원','약관','관리자계정'];
const AUDIT_ACTIONS_F = ['생성','수정','삭제','승인','반려','수납','수납취소','게시','폐지','정지','탈퇴','비밀번호초기화','로그인','로그아웃','수험번호부여','취소'];

function AuditPanel() {
  const state = useStore();
  const me = state.me;
  const myRole = me?.role || 'super';
  const canSeeAll = myRole === 'super';

  // 일반/조회는 본인 이력만
  const baseLog = useMemo(() => canSeeAll ? state.audit : state.audit.filter(l => l.actor === me?.id), [state.audit, canSeeAll, me]);

  const [actorF, setActorF] = useState('all');
  const [typeF, setTypeF] = useState('all');
  const [actionF, setActionF] = useState('all');
  const [range, setRange] = useState(0); // 0=all, 7, 30
  const [targetQ, setTargetQ] = useState('');
  const [page, setPage] = useState(1);
  const PER = 25;
  const [detailId, setDetailId] = useState(null);

  const filtered = useMemo(() => {
    let r = baseLog.slice();
    if (actorF !== 'all') r = r.filter(l => l.actor === actorF);
    if (typeF !== 'all')  r = r.filter(l => l.type === typeF);
    if (actionF !== 'all') r = r.filter(l => l.action === actionF);
    if (range > 0) {
      const cutoff = new Date(); cutoff.setDate(cutoff.getDate() - range);
      const cutoffStr = cutoff.toISOString().slice(0, 10);
      r = r.filter(l => l.ts.slice(0, 10) >= cutoffStr);
    }
    if (targetQ) r = r.filter(l => l.targetId && l.targetId.includes(targetQ));
    return r;
  }, [baseLog, actorF, typeF, actionF, range, targetQ]);

  useEffect(() => setPage(1), [actorF, typeF, actionF, range, targetQ]);
  const totalPages = Math.max(1, Math.ceil(filtered.length / PER));
  const rows = filtered.slice((page-1)*PER, page*PER);

  const exportCSV = () => {
    DataStore.addAudit({ type: '관리자계정', targetId: '—', action: '게시', memo: `처리 이력 CSV 내보내기(${filtered.length}건)` });
    toastOk(`${filtered.length}건의 처리 이력 CSV를 생성했습니다.`);
  };

  return (
    <>
      <div className="panel-head">
        <div>
          <h1>관리자 처리 이력</h1>
          <div className="sub">{canSeeAll ? '모든 관리자의 처리 이력을 조회합니다.' : <span>본인 처리 이력만 조회됩니다 (권한: <b>{DataStore.roleLabel(myRole)}</b>)</span>}</div>
        </div>
        <div className="actions">
          <button className="btn btn-secondary" disabled={!canSeeAll} onClick={exportCSV}>
            <I.Download style={{ width: 14, height: 14 }}/> CSV 내보내기
          </button>
        </div>
      </div>

      <div className="filterbar">
        <div className="chips">
          <button className={`chip ${range === 0 ? 'active' : ''}`} onClick={() => setRange(0)}>전체 기간<span className="cnt">{baseLog.length}</span></button>
          <button className={`chip ${range === 7 ? 'active' : ''}`} onClick={() => setRange(7)}>최근 7일</button>
          <button className={`chip ${range === 30 ? 'active' : ''}`} onClick={() => setRange(30)}>최근 30일</button>
        </div>
        <div className="controls">
          <select className="select" value={actorF} onChange={e => setActorF(e.target.value)} disabled={!canSeeAll}>
            <option value="all">전체 처리자</option>
            {state.admins.map(a => <option key={a.id} value={a.id}>{a.id} · {a.name}</option>)}
          </select>
          <select className="select" value={typeF} onChange={e => setTypeF(e.target.value)}>
            <option value="all">전체 유형</option>
            {AUDIT_TYPES.map(t => <option key={t}>{t}</option>)}
          </select>
          <select className="select" value={actionF} onChange={e => setActionF(e.target.value)}>
            <option value="all">전체 액션</option>
            {AUDIT_ACTIONS_F.map(a => <option key={a}>{a}</option>)}
          </select>
          <input className="input search" placeholder="대상 ID 검색" value={targetQ} onChange={e => setTargetQ(e.target.value)}/>
        </div>
      </div>

      <div className="dg-wrap">
        <div className="dg-scroll">
          <table className="dg">
            <thead><tr>
              <th>시각</th><th>처리자</th><th>IP</th><th>유형</th><th>대상 ID</th>
              <th>액션</th><th>메모</th><th>상세</th>
            </tr></thead>
            <tbody>
              {rows.map(l => (
                <tr key={l.id}>
                  <td className="code">{l.ts}</td>
                  <td><code className="code-id">{l.actor}</code></td>
                  <td className="code muted">{l.ip}</td>
                  <td>{l.type}</td>
                  <td className="code">{l.targetId}</td>
                  <td><span className={`pill ${l.action === '승인' || l.action === '생성' || l.action === '수납' ? 'pill-approved' : l.action === '반려' || l.action === '삭제' || l.action === '폐지' || l.action === '취소' ? 'pill-rejected' : 'pill-applied'}`}>{l.action}</span></td>
                  <td className="muted" style={{ maxWidth: 280, overflow: 'hidden', textOverflow: 'ellipsis' }}>{l.memo || '—'}</td>
                  <td>
                    <button className="ibtn ghost" onClick={() => setDetailId(l.id)}><I.Eye style={{ width: 12, height: 12 }}/></button>
                  </td>
                </tr>
              ))}
              {!rows.length && (
                <tr><td colSpan="8"><div className="empty"><div className="ttl">조건에 맞는 이력이 없습니다</div></div></td></tr>
              )}
            </tbody>
          </table>
        </div>
        <div className="dg-foot">
          <div className="info">총 <b style={{ color: 'var(--text)', fontFamily: 'Inter' }}>{DataStore.fmtNum(filtered.length)}</b>건</div>
          <Pager page={page} total={totalPages} onPage={setPage}/>
        </div>
      </div>

      {detailId && <AuditDetailLP id={detailId} onClose={() => setDetailId(null)}/>}
    </>
  );
}

function AuditDetailLP({ id, onClose }) {
  const state = useStore();
  const l = state.audit.find(x => x.id === id);
  if (!l) return null;
  const linkHash = ({
    접수자: 'applicants', 사진: 'photos', 회차: 'sessions', 시험장: 'venues',
    공지: 'notices', FAQ: 'faq', '환불·정정': 'refunds', 문의: 'inquiries',
    회원: 'members', 약관: 'terms', 관리자계정: 'admins',
  })[l.type];
  return (
    <LP open size="wide" title={`처리 이력 상세 — ${l.action}`} sub={`${l.type} · ${l.targetId}`} onClose={onClose}
      footer={<>
        {linkHash && <a className="btn btn-secondary" href={`#${linkHash}`} onClick={onClose}>관련 화면 바로가기 →</a>}
        <button className="btn btn-primary" onClick={onClose}>닫기</button>
      </>}>
      <FieldSet legend="기본" cols={2}>
        <KV k="처리 시각" v={<code className="code-id">{l.ts}</code>}/>
        <KV k="액션" v={<span className="pill" style={{ background: 'var(--bg-3)' }}>{l.action}</span>}/>
        <KV k="처리자" v={<><code className="code-id">{l.actor}</code></>}/>
        <KV k="IP" v={<code className="code-id">{l.ip}</code>}/>
        <KV k="유형" v={l.type}/>
        <KV k="대상 ID" v={<code className="code-id">{l.targetId}</code>}/>
        <KV k="로그 ID" v={<code className="code-id">{l.id}</code>}/>
      </FieldSet>

      {l.memo && (
        <FieldSet legend="메모" cols={1}>
          <div style={{ background: 'var(--bg-2)', padding: 10, borderRadius: 6, fontSize: 13, color: 'var(--text-2)' }}>{l.memo}</div>
        </FieldSet>
      )}

      {(l.before || l.after) && (
        <FieldSet legend="변경 내용 (Diff)" cols={1}>
          <div className="diff">
            <div>
              <div className="h">Before</div>
              <pre className="before">{l.before ? JSON.stringify(l.before, null, 2) : '— 이전 값 없음'}</pre>
            </div>
            <div>
              <div className="h">After</div>
              <pre className="after">{l.after ? JSON.stringify(l.after, null, 2) : '— 이후 값 없음'}</pre>
            </div>
          </div>
        </FieldSet>
      )}

      <div style={{ fontSize: 11.5, color: 'var(--text-3)' }}>
        ※ 처리 이력은 append-only — 수정/삭제 불가. 최소 3년 보존 권장.
      </div>
    </LP>
  );
}

window.AuditPanel = AuditPanel;

</script>

<script type="text/babel">
/* ============================================================
   app.jsx — Admin shell (sidebar + topbar + router)

const NAV = [
  { section: '메인' },
  { id: 'dashboard',   label: '대시보드',       icon: 'Dashboard' },

  { section: '접수' },
  { id: 'applicants',  label: '접수자 목록',     icon: 'Users',  badge: 'unreviewed' },
  { id: 'photos',      label: '사진 심사',       icon: 'Image',  badge: 'photoWait' },

  { section: '시험 운영' },
  { id: 'sessions',    label: '회차 관리',       icon: 'Calendar' },
  { id: 'venues',      label: '시험장 관리',     icon: 'Pin' },

  { section: '콘텐츠' },
  { id: 'notices',     label: '공지사항',        icon: 'Bell' },
  { id: 'faq',         label: 'FAQ',           icon: 'Help' },
  { id: 'refunds',     label: '환불·정보정정',   icon: 'RefreshCcw', badge: 'refundNew' },
  { id: 'inquiries',   label: '문의 게시판',     icon: 'Mail',   badge: 'inquiryWait' },

  { section: '회원·약관' },
  { id: 'members',     label: '회원 관리',       icon: 'Users' },
  { id: 'terms',       label: '약관 관리',       icon: 'FileText' },

  { section: '시스템' },
  { id: 'admins',      label: '관리자 계정',     icon: 'ShieldCheck' },
  { id: 'permissions', label: '관리자 권한',     icon: 'Lock' },
  { id: 'audit',       label: '처리 이력',       icon: 'History' },
];

const PANEL_TITLE = Object.fromEntries(NAV.filter(n => n.id).map(n => [n.id, n.label]));
const CRUMB = {
  dashboard:  ['메인', '대시보드'],
  applicants: ['접수 관리', '접수자 목록'],
  photos:     ['접수 관리', '사진 심사'],
  sessions:   ['시험 관리', '회차 관리'],
  venues:     ['시험 관리', '시험장 관리'],
  notices:    ['콘텐츠 관리', '공지사항'],
  faq:        ['콘텐츠 관리', 'FAQ'],
  refunds:    ['콘텐츠 관리', '환불·정보정정'],
  inquiries:  ['콘텐츠 관리', '문의 게시판'],
  members:    ['회원·약관 관리', '회원 관리'],
  terms:      ['회원·약관 관리', '약관 관리'],
  admins:     ['시스템', '관리자 계정 관리'],
  permissions:['시스템', '관리자 권한 관리'],
  audit:      ['시스템', '처리 이력'],
};

function App() {
  // hash-based router (?#applicants)
  const initial = () => (location.hash.replace('#', '') || 'dashboard');
  const [route, setRoute] = useState(initial);
  const [sbOpen, setSbOpen] = useState(false);
  const state = useStore();

  // Boot: session check + load me into store
  useEffect(() => {
    const raw = sessionStorage.getItem('bo_session');
    if (!raw) { location.replace('admin-login.html?next=' + encodeURIComponent('admin.html')); return; }
    const me = JSON.parse(raw);
    DataStore.state.me = me;
    DataStore.notify();
    try { sessionStorage.setItem('tpkm_bo_admin', JSON.stringify({ role: me.role || 'super', name: me.name || me.id })); } catch (e) {}
    if (window.TOPIKBoCore) TOPIKBoCore.startSessionHeartbeat(me.id || me.name, me.name);
  }, []);

  useEffect(() => {
    const fn = () => setRoute(location.hash.replace('#', '') || 'dashboard');
    window.addEventListener('hashchange', fn);
    return () => window.removeEventListener('hashchange', fn);
  }, []);

  useEffect(() => { setSbOpen(false); window.scrollTo(0, 0); }, [route]);

  const navigate = useCallback((id) => { location.hash = id; }, []);
  const logout = useCallback(() => {
    if (!confirm('로그아웃 하시겠습니까?')) return;
    DataStore.addAudit({ type: '관리자계정', targetId: state.me?.id || '', action: '로그아웃', memo: '' });
    sessionStorage.removeItem('bo_session');
    location.replace('admin-login.html');
  }, [state.me]);

  const badges = DataStore.badges();
  const me = state.me;

  // session switcher (header)
  const activeSession = state.sessions.find(s => s.id === state.activeSessionId);

  // pick panel
  const PanelByRoute = {
    dashboard:  window.DashboardPanel,
    applicants: window.ApplicantsPanel,
    photos:     window.PhotosPanel,
    sessions:   window.SessionsPanel,
    venues:     window.VenuesPanel,
    notices:    window.NoticesPanel,
    faq:        window.FaqPanel,
    refunds:    window.RefundsPanel,
    inquiries:  window.InquiriesPanel,
    members:    window.MembersPanel,
    terms:      window.TermsPanel,
    admins:     window.AdminsPanel,
    permissions:window.PermissionsPanel,
    audit:      window.AuditPanel,
  };
  const Panel = PanelByRoute[route] || PanelByRoute.dashboard;

  return (
    <>
      <div className="app">
        {/* Sidebar */}
        <aside className={`sb ${sbOpen ? 'open' : ''}`}>
          <div className="sb-brand">
            <div className="mark">T</div>
            <div className="name">TOPIK Myanmar<small>ADMIN CONSOLE</small></div>
          </div>
          <nav className="sb-nav">
            {NAV.map((item, idx) => item.section
              ? <div className="sb-section-title" key={'s' + idx}>{item.section}</div>
              : (
                <button key={item.id}
                  className={`sb-link ${route === item.id ? 'active' : ''}`}
                  onClick={() => navigate(item.id)}>
                  {React.createElement(I[item.icon] || I.Dashboard, { className: 'ico' })}
                  <span className="label">{item.label}</span>
                  {item.badge && badges[item.badge] > 0 && <span className="badge-count">{badges[item.badge]}</span>}
                </button>
              )
            )}
          </nav>
          <div className="sb-foot">
            <div className="sb-user">
              <div className="avatar">{me?.name?.slice(0,1) || 'A'}</div>
              <div className="meta">
                <div className="nm">{me?.name || '관리자'}</div>
                <div className="rl">{DataStore.roleLabel(me?.role || 'super')} · {me?.id}</div>
              </div>
            </div>
            <button className="sb-logout" onClick={logout}>
              <I.LogOut style={{ width: 14, height: 14 }}/> 로그아웃
            </button>
          </div>
        </aside>
        <div className={`sb-backdrop ${sbOpen ? 'open' : ''}`} onClick={() => setSbOpen(false)}></div>

        {/* Topbar */}
        <header className="tb">
          <button className="ham" onClick={() => setSbOpen(s => !s)}><I.Menu/></button>
          <div>
            <div className="tb-crumb">
              {(CRUMB[route] || []).map((c, i, arr) => (
                <React.Fragment key={c+i}>
                  <span>{c}</span>
                  {i < arr.length - 1 && <span className="sep">›</span>}
                </React.Fragment>
              ))}
            </div>
            <div className="tb-title">{PANEL_TITLE[route] || '대시보드'}</div>
          </div>
          <div className="tb-spacer"></div>
          <div className="tb-actions">
            {/* Session switcher — context for applicant/exam panels */}
            {['dashboard','applicants','photos'].includes(route) && (
              <select
                className="select"
                style={{ height: 36, fontSize: 13, minWidth: 200 }}
                value={state.activeSessionId}
                onChange={e => DataStore.setSession(e.target.value)}>
                {state.sessions.map(s => (
                  <option key={s.id} value={s.id}>
                    {s.name} ({s.status === 'open' ? '진행중' : s.status === 'planned' ? '예정' : '종료'})
                  </option>
                ))}
              </select>
            )}
            <a className="tb-iconbtn" href="../../FO/index.html" target="_blank" rel="noopener noreferrer" title="사이트 보기(새 창)">
              <I.ExternalLink/>
            </a>
            <div className="tb-user" title={me?.id}>
              <div className="avatar">{me?.name?.slice(0,1) || 'A'}</div>
              <div className="meta">
                <div className="nm">{me?.name || '관리자'}</div>
                <div className="rl">{DataStore.roleLabel(me?.role || 'super')}</div>
              </div>
            </div>
          </div>
        </header>

        {/* Main */}
        <main className="mn" key={route}>
          {Panel ? <Panel/> : <div className="empty"><div className="ttl">패널 로드 중…</div></div>}
        </main>
      </div>

      <ToastHost/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
