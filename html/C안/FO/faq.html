<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>FAQ — 게시판 | TOPIK Myanmar</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .faq-wrap { max-width: 880px; margin: 0 auto; padding: 24px 16px 48px; }

  .faq-tools { display: flex; gap: 10px; flex-direction: column; margin-bottom: 20px; }
  .faq-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .faq-search {
    width: 100%;
    position: relative;
  }
  @media (max-width: 767px) {
    .faq-tabs {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin: 0 -16px;
      padding: 0 16px 2px;
    }
    .faq-tabs::-webkit-scrollbar { display: none; }
    .faq-tabs .chip { flex: 0 0 auto; }
  }
  .faq-search input {
    width: 100%; height: 44px;
    padding: 0 16px 0 44px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); background: #fff;
    font-size: 16px;
  }
  .faq-search input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-50); }
  .faq-search::before {
    content: ""; position: absolute; left: 16px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7588' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
    background-repeat: no-repeat;
  }

  .faq-group {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 16px;
  }
  .faq-group .group-head {
    padding: 14px 18px;
    background: var(--bg-2);
    border-bottom: 1px solid var(--border);
    font-size: 13px; font-weight: 700;
    color: var(--primary);
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .faq-group .group-head .ct {
    margin-left: 6px;
    font-size: 11px; font-weight: 600;
    color: var(--text-3);
    background: #fff; padding: 2px 8px; border-radius: 99px;
    text-transform: none; letter-spacing: 0;
  }

  .accordion details summary { padding: 18px 20px; }
  .accordion .a { padding: 0 20px 20px 44px; white-space: pre-line; }
</style>
</head>
<body>

<div id="site-header"></div>

<main class="page" role="main">

  <header class="page-head">
    <div class="container">
      <div class="crumb"><span data-i18n-content="menu.board">게시판</span><span data-i18n-content="faq.title">FAQ</span></div>
      <h1 data-i18n-content="faq.title">자주 묻는 질문</h1>
      <p class="lead" data-i18n-content="fq.lead">접수·시험·결과 관련 자주 묻는 질문을 분류별로 모아두었습니다.</p>
    </div>
  </header>

  <div class="faq-wrap">

    <div class="faq-tools">
      <div class="faq-tabs">
        <button class="chip active" data-cat="all" data-i18n-content="nt.cat_all">전체</button>
        <button class="chip" data-cat="account" data-i18n-content="fq.cat_account">계정</button>
        <button class="chip" data-cat="apply" data-i18n-content="nt.cat_apply">접수</button>
        <button class="chip" data-cat="exam" data-i18n-content="nt.cat_exam">시험</button>
        <button class="chip" data-cat="result" data-i18n-content="nt.cat_result">결과</button>
        <button class="chip" data-cat="other" data-i18n-content="qna.cat_etc">기타</button>
      </div>
      <div class="faq-search"><input type="search" id="faqSearch" placeholder="질문 검색 (예: 응시료, 수험번호, 환불…)" data-i18n-content="fq.search_ph" data-i18n-content-placeholder></div>
    </div>

    <div id="faqGroups">
      <p style="text-align:center; padding:40px 16px; color:var(--text-3); font-size:14px;" data-i18n-content="fq.loading">FAQ를 불러오는 중…</p>
    </div>

    <p id="faqEmpty" style="display:none; text-align:center; padding:40px 16px; color:var(--text-3); font-size:14px;" data-i18n-content="fq.search_none">검색 조건에 맞는 질문이 없습니다.</p>

  </div>
</main>

<div id="site-footer"></div>
<div id="site-tabbar"></div>

<script>
  window.TPKM_PAGE_I18N = {
    'fq.lead': { ko: '접수·시험·결과 관련 자주 묻는 질문을 분류별로 모아두었습니다.', my: 'လျှောက်ထားမှု·စာမေးပွဲ·ရလဒ်ဆိုင်ရာ မေးလေ့ရှိသော မေးခွန်းများကို အမျိုးအစားအလိုက် စုစည်းထားသည်။', en: 'Frequently asked questions about registration, the exam, and results, grouped by category.' },
    'fq.search_ph': { ko: '질문 검색 (예: 응시료, 수험번호, 환불…)', my: 'မေးခွန်း ရှာဖွေ (ဥပမာ - ဖြေဆိုကြေး၊ ဖြေဆိုသူနံပါတ်၊ ငွေပြန်အမ်း…)', en: 'Search questions (e.g. fee, exam number, refund…)' },
    'fq.cat_account': { ko: '계정', my: 'အကောင့်', en: 'Account' },
    'fq.loading': { ko: 'FAQ를 불러오는 중…', my: 'FAQ ဖွင့်နေသည်…', en: 'Loading FAQ…' },
    'fq.fail': { ko: 'FAQ를 불러올 수 없습니다.', my: 'FAQ ဖွင့်၍မရပါ။', en: 'Could not load FAQ.' },
    'fq.network_err': { ko: '네트워크 오류입니다.', my: 'ကွန်ရက် ချို့ယွင်းမှု ဖြစ်ပွားသည်။', en: 'A network error occurred.' },
    'fq.search_none': { ko: '검색 조건에 맞는 질문이 없습니다.', my: 'ရှာဖွေမှုနှင့် ကိုက်ညီသော မေးခွန်း မရှိပါ။', en: 'No questions match your search.' },
    'nt.cat_all': { ko: '전체', my: 'အားလုံး', en: 'All' },
    'nt.cat_apply': { ko: '접수', my: 'လျှောက်ထားမှု', en: 'Registration' },
    'nt.cat_exam': { ko: '시험', my: 'စာမေးပွဲ', en: 'Exam' },
    'nt.cat_result': { ko: '결과', my: 'ရလဒ်', en: 'Results' },
    'qna.cat_etc': { ko: '기타', my: 'အခြား', en: 'Other' }
  };
</script>
<script src="shared/api-client.js"></script>
<script src="assets/common.js"></script>
<script>
(function () {
  'use strict';

  function bt(key, fallback) {
    try { if (window.TPKMLang && TPKMLang.t) { var v = TPKMLang.t(key); if (v) return v; } } catch (e) {}
    return fallback;
  }
  var groupsEl = document.getElementById('faqGroups');
  var emptyEl = document.getElementById('faqEmpty');
  var searchEl = document.getElementById('faqSearch');
  var activeCat = 'all';
  var allGroups = [];

  // FO 필터 slug ↔ BO 한글 분류(접수 등) ↔ DB legacy 값
  var FAQ_CAT_ALIASES = {
    account: ['account', '계정'],
    apply: ['apply', 'registration', 'payment', 'photo', '접수'],
    exam: ['exam', '시험'],
    result: ['result', '결과'],
    other: ['other', 'etc', 'general', '기타']
  };

  function matchesFaqCategory(groupCategory, filterCat) {
    if (filterCat === 'all') return true;
    var cat = String(groupCategory || '');
    if (cat === filterCat) return true;
    var aliases = FAQ_CAT_ALIASES[filterCat];
    return aliases ? aliases.indexOf(cat) >= 0 : false;
  }

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function currentLang() {
    var l = (window.TPKMLang && TPKMLang.get && TPKMLang.get()) || 'KO';
    l = String(l).toLowerCase();
    return l === 'my' || l === 'en' ? l : 'ko';
  }

  function render() {
    var q = (searchEl.value || '').trim().toLowerCase();
    var visibleGroups = 0;
    var html = '';
    allGroups.forEach(function (g) {
      if (!matchesFaqCategory(g.category, activeCat)) return;
      var items = g.items.filter(function (it) {
        if (!q) return true;
        return (it.question || '').toLowerCase().indexOf(q) >= 0 ||
               (it.answer || '').toLowerCase().indexOf(q) >= 0;
      });
      if (!items.length) return;
      visibleGroups++;
      html +=
        '<div class="faq-group">' +
          '<div class="group-head">' + esc(g.category_label) +
            ' <span class="ct">' + items.length + '</span></div>' +
          '<div class="accordion">' +
            items.map(function (it) {
              return '<details' + (q ? ' open' : '') + '>' +
                '<summary><span class="q">' + esc(it.question) + '</span>' +
                '<svg class="chev" viewBox="0 0 24 24" fill="none" stroke-width="1.8" stroke-linecap="round"><path d="M6 9l6 6 6-6"/></svg>' +
                '</summary>' +
                '<div class="a">' + esc(it.answer) + '</div>' +
                '</details>';
            }).join('') +
          '</div>' +
        '</div>';
    });
    groupsEl.innerHTML = html;
    emptyEl.style.display = visibleGroups ? 'none' : '';
  }

  function load() {
    if (!window.TopikApi || !TopikApi.canUseApi()) {
      groupsEl.innerHTML = '<p style="text-align:center; padding:40px 16px; color:var(--text-3);">' + esc(bt('fq.fail', 'FAQ를 불러올 수 없습니다.')) + '</p>';
      return;
    }
    groupsEl.innerHTML = '<p style="text-align:center; padding:40px 16px; color:var(--text-3);">' + esc(bt('fq.loading', 'FAQ를 불러오는 중…')) + '</p>';
    TopikApi.getFaq({ lang: currentLang() }).then(function (res) {
      if (!res.ok) {
        groupsEl.innerHTML = '<p style="text-align:center; padding:40px 16px; color:var(--danger);">' +
          esc(TopikApi.parseError(res)) + '</p>';
        return;
      }
      allGroups = (res.body && res.body.groups) || [];
      render();
    }).catch(function () {
      groupsEl.innerHTML = '<p style="text-align:center; padding:40px 16px; color:var(--danger);">' + esc(bt('fq.network_err', '네트워크 오류입니다.')) + '</p>';
    });
  }

  document.querySelectorAll('.faq-tabs .chip').forEach(function (c) {
    c.addEventListener('click', function () {
      document.querySelectorAll('.faq-tabs .chip').forEach(function (x) { x.classList.remove('active'); });
      c.classList.add('active');
      activeCat = c.dataset.cat || 'all';
      render();
    });
  });
  searchEl.addEventListener('input', render);

  // Re-fetch localized FAQ when the language toggle changes.
  document.addEventListener('click', function (e) {
    var btn = e.target.closest && e.target.closest('.lang-toggle button');
    if (btn) setTimeout(load, 60);
  });

  load();
})();
</script>
</body>
</html>
