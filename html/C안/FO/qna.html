<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>문의게시판 — 게시판 | TOPIK Myanmar</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .board-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }

  .qna-tabs {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .qna-tabs button {
    flex: 1; max-width: 120px;
    padding: 10px 12px;
    font-size: 14px; color: var(--text-3); font-weight: 500;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .qna-tabs button.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }

  .board-tools {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .board-tools .left { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .board-tools .search { flex: 1; min-width: 160px; position: relative; }
  .board-tools .search input {
    width: 100%; height: 38px; padding: 0 14px 0 38px;
    border: 1px solid var(--border); border-radius: 99px;
    background: #fff; font-size: 13.5px;
  }
  .board-tools .search::before {
    content: ""; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7588' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
    background-repeat: no-repeat;
  }
  .board-tools .cat-select {
    height: 38px; padding: 0 32px 0 12px; font-size: 13.5px;
    background-color: #fff; border: 1px solid var(--border); border-radius: 99px;
    min-width: 110px; width: auto;
  }

  .pane { display: none; }
  .pane.active { display: block; }

  .list-view .col-num { width: 50px; text-align: center; color: var(--text-3); }
  .list-view .col-cat { width: 70px; }
  .list-view .col-author { width: 90px; color: var(--text-3); white-space: nowrap; }
  .list-view .col-date { width: 100px; text-align: right; color: var(--text-3); white-space: nowrap; }
  .list-view .col-status { width: 100px; text-align: center; white-space: nowrap; }
  .list-view .lock { font-size: 12px; color: var(--text-4); margin-right: 4px; }
  .list-view tr { cursor: pointer; }

  /* 모바일 가로 스크롤 테이블 */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .list-view .table th,
  .list-view .table td { white-space: nowrap; }
  .list-view .table td:nth-child(3) {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }

  /* Secret password modal */
  .secret-lock {
    text-align: center; padding: 16px 0;
  }
  .secret-lock .ico-lock {
    width: 56px; height: 56px;
    background: var(--bg-3); color: var(--text-3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 12px;
  }

  /* Detail */
  .write-form { max-width: 760px; margin: 0 auto; }
  .detail-card { background: #fff; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .detail-head { padding: 22px 24px; border-bottom: 1px solid var(--border); }
  .detail-head h2 { font-size: 20px; line-height: 1.4; }
  .detail-head .meta { display: flex; gap: 12px; align-items: center; margin-top: 10px; font-size: 12.5px; color: var(--text-3); flex-wrap: wrap; }
  .detail-body { padding: 24px; font-size: 14.5px; line-height: 1.8; color: var(--text-2); }
  .detail-body p { margin-bottom: 14px; }

  .reply-block {
    margin: 0 24px 24px;
    border: 1px solid #cfe0f1; border-radius: var(--radius);
    background: var(--info-50); padding: 18px 20px;
  }
  .reply-block .who {
    display: flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 600; color: var(--primary);
    margin-bottom: 8px;
  }
  .reply-block .who::before {
    content: "답변"; padding: 2px 8px;
    background: var(--primary); color: #fff;
    font-size: 11px; font-weight: 700;
    border-radius: 99px;
  }
  .reply-block .when { font-size: 12px; color: var(--text-3); margin-left: auto; font-weight: 400; }
  .reply-block .body-r { font-size: 14px; color: var(--text-2); line-height: 1.7; }

  /* Comments & Replies */
  .comments {
    margin: 0 24px 24px;
    border-top: 1px solid var(--border);
    padding-top: 20px;
  }
  .comments h4 { font-size: 14px; margin-bottom: 12px; }
  .comment {
    padding: 14px 16px;
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
  }
  .comment.reply {
    margin-left: 24px;
    background: #fff;
    border: 1px solid var(--border);
    position: relative;
  }
  .comment.reply::before {
    content: "";
    position: absolute; left: -16px; top: 22px;
    width: 12px; height: 12px;
    border-left: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
    border-radius: 0 0 0 4px;
  }
  .comment .c-head {
    display: flex; gap: 8px; align-items: center;
    font-size: 12.5px; color: var(--text-3); margin-bottom: 6px;
  }
  .comment .c-head .author { color: var(--text); font-weight: 600; }
  .comment .c-body { font-size: 13.5px; color: var(--text-2); line-height: 1.6; }
  .comment .c-actions {
    margin-top: 6px; display: flex; gap: 8px;
    font-size: 12px; color: var(--text-3);
  }
  .comment .c-actions a:hover { color: var(--primary); }

  .comment-write {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .comment-write textarea {
    flex: 1; min-height: 60px;
    padding: 10px 12px; font-size: 13.5px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); resize: vertical;
    background: #fff;
  }
  .comment-write .btn-wrap {
    display: flex; flex-direction: column; gap: 4px;
  }

  /* 인라인 대댓글 입력 폼 */
  .reply-form-wrap {
    margin-top: 8px; margin-left: 24px; display: none;
  }
  .reply-form-wrap.open { display: block; }
  .reply-form-wrap .reply-form-inner {
    display: flex; gap: 8px;
    background: #f5f8ff; border: 1px solid #cfe0f1;
    border-radius: var(--radius-sm); padding: 10px;
  }
  .reply-form-wrap .reply-form-inner textarea {
    flex: 1; min-height: 56px;
    padding: 8px 10px; font-size: 13.5px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    resize: vertical; background: #fff;
  }
  .reply-form-wrap .reply-form-inner .btn-wrap {
    display: flex; flex-direction: column; gap: 4px;
  }
</style>
</head>
<body data-require-login>

<div id="site-header"></div>

<main class="page" role="main">

  <header class="page-head">
    <div class="container">
      <div class="crumb"><span>게시판</span><span>문의게시판</span></div>
      <h1>문의게시판</h1>
      <p class="lead">접수·시험·기타 운영 관련 문의를 작성해 주세요. 일반/비밀 글로 작성 가능합니다.</p>
    </div>
  </header>

  <div class="board-wrap">

    <!-- ============ List ============ -->
    <section class="pane list-view active" id="listPane">
      <div class="qna-tabs">
        <button class="active">전체</button>
        <button>일반</button>
        <button>비밀</button>
      </div>

      <div class="board-tools">
        <div class="left">
          <select class="select cat-select">
            <option>전체 카테고리</option>
            <option>접수</option>
            <option>시험</option>
            <option>기타</option>
          </select>
          <div class="search"><input type="search" placeholder="제목·작성자 검색"></div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="show('writePane')">문의하기</button>
      </div>

      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="table-scroll">
        <table class="table">
          <thead>
            <tr>
              <th class="col-num">번호</th>
              <th class="col-cat">분류</th>
              <th>제목</th>
              <th class="col-author">작성자</th>
              <th class="col-date">작성일</th>
              <th class="col-status">상태</th>
            </tr>
          </thead>
          <tbody id="qnaListBody">
            <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-3);">불러오는 중…</td></tr>
          </tbody>
        </table>
        </div>
      </div>

      <nav class="pager" id="qnaPager"></nav>
    </section>

    <!-- ============ Write ============ -->
    <section class="pane write-form" id="writePane">
      <a href="javascript:void(0)" onclick="show('listPane')" class="btn btn-text" style="margin-bottom: 12px;">← 목록으로</a>
      <h2 class="h2" style="margin-bottom: 18px;">문의 작성</h2>

      <div class="form-row">
        <label class="label">카테고리 <span class="req">*</span></label>
        <select class="select" id="qnaCategory">
          <option value="">선택</option>
          <option>접수</option><option>시험</option><option>기타</option>
        </select>
      </div>

      <div class="form-row">
        <label class="label">공개 범위 <span class="req">*</span></label>
        <div style="display: flex; gap: 16px;">
          <label class="radio"><input type="radio" name="vis" checked><span class="box"></span><span>일반 (누구나 열람)</span></label>
          <label class="radio"><input type="radio" name="vis" id="visSecret"><span class="box"></span><span>비밀 (작성자·관리자만)</span></label>
        </div>
        <span class="hint">비밀글은 작성자 본인과 관리자만 내용·댓글을 열람할 수 있습니다.</span>
      </div>

      <div class="form-row">
        <label class="label">제목 <span class="req">*</span></label>
        <input class="input" id="qnaTitle" placeholder="제목 (100자 이내)" maxlength="100">
      </div>

      <div class="form-row">
        <label class="label">내용 <span class="req">*</span></label>
        <textarea class="textarea" id="qnaBody" rows="8" placeholder="문의 내용을 자세히 작성해 주세요."></textarea>
      </div>

      <div class="form-row">
        <label class="label">첨부파일</label>
        <div style="padding: 12px; border: 1px dashed var(--border-strong); border-radius: var(--radius-sm); background: var(--bg-2); font-size: 12.5px; color: var(--text-3); text-align: center;">
          jpg, png, pdf · 5MB 이하 · 최대 3개
          <div style="margin-top: 8px;"><button type="button" class="btn btn-secondary btn-sm">파일 선택</button></div>
        </div>
      </div>

      <div style="display: flex; gap: 8px; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="show('listPane')">취소</button>
        <button class="btn btn-primary" style="flex:1;" id="btnQnaSubmit">제출</button>
      </div>
    </section>

    <!-- ============ Detail ============ -->
    <section class="pane" id="detailPane">
      <a href="javascript:void(0)" onclick="show('listPane')" class="btn btn-text" style="margin-bottom: 12px;">← 목록으로</a>

      <article class="detail-card">
        <div class="detail-head">
          <div style="display:flex; gap: 8px; margin-bottom: 10px;">
            <span class="badge badge-outline" id="bdBadge"></span>
            <span class="status" id="bdStatus"></span>
          </div>
          <h2 id="bdTitle"></h2>
          <div class="meta" id="bdMeta"></div>
        </div>
        <div class="detail-body" id="bdBody"></div>

        <div class="reply-block" id="bdReply" style="display:none;">
          <div class="who"><span class="when" id="bdReplyWhen"></span></div>
          <div class="body-r" id="bdReplyBody"></div>
        </div>

        <div class="comments" id="bdComments"></div>
      </article>
    </section>

  </div>
</main>

<div id="site-footer"></div>
<div id="site-tabbar"></div>

<!-- 비밀글 잠금 해제 -->
<div class="modal-backdrop" id="modalSecretLock">
  <div class="modal">
    <div class="modal-head"><h3>비밀글</h3></div>
    <div class="modal-body">
      <div class="secret-lock">
        <div class="ico-lock">🔒</div>
        <p>비밀글입니다. 작성자만 열람할 수 있습니다.</p>
        <p class="body-sm" style="margin-top: 6px;">비밀번호를 입력해 주세요.</p>
      </div>
      <div class="form-row" style="margin-top: 12px;">
        <input class="input" type="password" placeholder="비밀번호">
      </div>
      <p class="body-sm" style="text-align: center; font-size: 11.5px;">최대 5회 실패 시 30분간 잠깁니다.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="TPKM.closeModal('modalSecretLock')">닫기</button>
      <button class="btn btn-primary">확인</button>
    </div>
  </div>
</div>

<script src="shared/api-client.js"></script>
<script src="assets/common.js"></script>
<script src="assets/fo-board.js"></script>
<script>
  window.show = function (id) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  // ---- 목록/상세 (API) ----
  var board = TPKMBoard.initBoard({
    boardType: 'inquiry',
    listBody: document.getElementById('qnaListBody'),
    pager: document.getElementById('qnaPager'),
    colspan: 6,
    typeCellClass: 'col-cat',
    detailPaneId: 'detailPane',
    typeCell: function (p) {
      return '<span class="badge badge-outline">' +
        (p.category ? p.category.replace(/[<>&]/g, '') : '문의') + '</span>';
    },
    detail: {
      title: document.getElementById('bdTitle'),
      badge: document.getElementById('bdBadge'),
      status: document.getElementById('bdStatus'),
      meta: document.getElementById('bdMeta'),
      body: document.getElementById('bdBody'),
      reply: document.getElementById('bdReply'),
      replyWhen: document.getElementById('bdReplyWhen'),
      replyBody: document.getElementById('bdReplyBody'),
      comments: document.getElementById('bdComments'),
    },
    show: window.show,
  });

  // ---- 필터: 탭(전체/일반/비밀) + 카테고리 + 검색 (현재 페이지 클라이언트 필터) ----
  var tabMode = 'all';
  function applyFilters() {
    var cat = document.querySelector('.cat-select').value;
    var q = (document.querySelector('.board-tools .search input').value || '').trim().toLowerCase();
    board.setFilter(function (p) {
      if (tabMode === 'normal' && p.is_secret) return false;
      if (tabMode === 'secret' && !p.is_secret) return false;
      if (cat && cat !== '전체 카테고리' && (p.category || '') !== cat) return false;
      if (q && (p.title || '').toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
  }
  document.querySelectorAll('.qna-tabs button').forEach(function (b, i) {
    b.addEventListener('click', function () {
      document.querySelectorAll('.qna-tabs button').forEach(function (x) { x.classList.remove('active'); });
      b.classList.add('active');
      tabMode = i === 1 ? 'normal' : i === 2 ? 'secret' : 'all';
      applyFilters();
    });
  });
  document.querySelector('.cat-select').addEventListener('change', applyFilters);
  document.querySelector('.board-tools .search input').addEventListener('input', applyFilters);

  TPKMBoard.wireSubmit({
    boardType: 'inquiry',
    submitBtn: document.getElementById('btnQnaSubmit'),
    titleEl: document.getElementById('qnaTitle'),
    bodyEl: document.getElementById('qnaBody'),
    categoryEl: document.getElementById('qnaCategory'),
    secretRadio: document.getElementById('visSecret'),
    onSuccess: function () { show('listPane'); board.load(1); },
  });

  // 최초 로드
  if (window.TopikApi && TopikApi.isLoggedIn()) board.load(1);
</script>
</body>
</html>
