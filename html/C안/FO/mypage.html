<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>접수 확인 — 마이페이지 | TOPIK Myanmar</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .my-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }

  .me-card {
    display: flex; gap: 16px; align-items: center;
    padding: 20px;
    background: linear-gradient(135deg, var(--primary), var(--primary-700));
    border-radius: var(--radius-lg);
    color: #fff;
    margin-bottom: 24px;
  }
  .me-card .avatar {
    width: 60px; height: 80px;
    background: rgba(255,255,255,0.15);
    border-radius: var(--radius-xs);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; color: rgba(255,255,255,0.7);
    flex: 0 0 auto;
    border: 1px solid rgba(255,255,255,0.2);
    overflow: hidden;
  }
  .me-card .avatar img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }
  .me-card .info { flex: 1; }
  .me-card h2 { color: #fff; font-size: 20px; }
  .me-card .en { font-family: 'Inter', sans-serif; font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 2px; }
  .me-card .meta { font-size: 12.5px; color: rgba(255,255,255,0.75); margin-top: 8px; }
  .me-card .edit { font-size: 12px; color: rgba(255,255,255,0.9); padding: 6px 12px; border: 1px solid rgba(255,255,255,0.3); border-radius: 99px; }
  .me-card .edit:hover { background: rgba(255,255,255,0.1); color: #fff; }

  .my-tabs { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 20px; }
  .my-tabs button {
    flex: 0 0 auto; padding: 12px 16px;
    font-size: 14px; color: var(--text-3); font-weight: 500;
    border-bottom: 2px solid transparent; margin-bottom: -1px;
  }
  .my-tabs button.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
  .my-tabs button .ct {
    display: inline-block; margin-left: 4px;
    background: var(--bg-3); color: var(--text-3);
    padding: 1px 7px; border-radius: 99px;
    font-size: 11px; font-weight: 600;
  }
  .my-tabs button.active .ct { background: var(--primary); color: #fff; }

  .app-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    margin-bottom: 14px;
    overflow: hidden;
  }
  .app-head {
    padding: 16px 18px;
    border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .app-head .lt h3 {
    font-size: 17px; letter-spacing: -0.015em;
    display: flex; align-items: center; gap: 8px;
  }
  .app-head .lt .round-n {
    font-family: 'Inter', sans-serif; font-weight: 800;
    color: var(--primary);
  }
  .app-head .lt .lvls { font-size: 14px; color: var(--text-2); font-weight: 500; }
  .app-head .lt .meta { font-size: 12.5px; color: var(--text-3); margin-top: 4px; }
  .app-head .rt { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .app-head .rt .apply-n {
    font-family: 'Inter', sans-serif; font-size: 12px; color: var(--text-3);
    font-variant-numeric: tabular-nums;
  }

  @media (max-width: 599px) {
    .app-card { position: relative; }
    .app-head { display: block; position: relative; flex-wrap: nowrap; }
    .app-head .lt { min-width: 0; padding-right: 112px; }
    .app-head .lt h3 { display: block; line-height: 1.35; }
    .app-head .rt { position: static; display: block; margin-top: 6px; }
    .app-head .rt .status {
      position: absolute; top: 16px; right: 18px; z-index: 1; white-space: nowrap;
    }
    .app-head .rt .apply-n { display: block; text-align: left; }
  }

  .app-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    padding: 16px 18px;
    gap: 12px;
  }
  .app-grid .it .l { font-size: 12px; color: var(--text-3); margin-bottom: 2px; }
  .app-grid .it .v { font-size: 14px; color: var(--text); font-weight: 600; }
  .app-grid .it .v.exam-num {
    font-family: 'Inter', sans-serif; letter-spacing: 0.04em;
    color: var(--st-number);
  }
  .app-grid .it .v.pending {
    color: var(--text-4); font-style: italic; font-weight: 500;
  }
  @media (min-width: 600px) { .app-grid { grid-template-columns: repeat(4, 1fr); } }

  .app-actions {
    padding: 12px 18px;
    background: var(--bg-2);
    border-top: 1px solid var(--border);
    display: flex; gap: 8px; flex-wrap: wrap;
  }
  .app-actions .btn { flex: 1; min-width: 110px; }
  @media (min-width: 600px) {
    .app-actions { justify-content: flex-end; }
    .app-actions .btn { flex: 0 0 auto; }
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    background: var(--bg-2);
    border-radius: var(--radius-lg);
    color: var(--text-3);
  }
  .empty h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-2); }
  .empty p { font-size: 13.5px; margin-bottom: 16px; }

  @media print {
    body.printing-confirm > *:not(#modalConfirm) { display: none !important; }
    body.printing-confirm #modalConfirm {
      position: static !important; display: block !important;
      background: #fff !important; padding: 0 !important;
    }
    body.printing-confirm #modalConfirm .modal {
      max-width: 100% !important; max-height: none !important;
      box-shadow: none !important; border: 0 !important; margin: 0 !important;
    }
    body.printing-confirm #modalConfirm .modal-head .btn-text,
    body.printing-confirm #modalConfirm .modal-foot { display: none !important; }
  }
</style>
</head>
<body data-require-login data-footer-compact>

<div id="site-header"></div>

<main class="page" role="main">
  <div class="my-wrap">

    <div class="me-card" id="meCard">
      <div class="avatar" id="meAvatar">PHOTO</div>
      <div class="info">
        <h2 id="meNameKo">—</h2>
        <div class="en" id="meNameEn">—</div>
        <div class="meta" id="meMeta">—</div>
      </div>
      <a href="mypage-profile.html" class="edit" data-i18n-content="mp.edit_profile">내정보 수정</a>
    </div>

    <div class="my-tabs">
      <button class="active" data-tab="active" type="button"><span data-i18n-content="mp.tab_active">진행 중인 접수</span> <span class="ct" id="ctActive">0</span></button>
      <button data-tab="past" type="button"><span data-i18n-content="mp.tab_past">지난 접수</span> <span class="ct" id="ctPast">0</span></button>
    </div>

    <section class="tab-pane active" data-tab="active" id="paneActive"></section>
    <section class="tab-pane" data-tab="past" id="panePast" style="display:none;"></section>

  </div>
</main>

<div id="site-footer"></div>
<div id="site-tabbar"></div>

<div class="modal-backdrop" id="modalConfirm">
  <div class="modal" style="max-width: 540px;">
    <div class="modal-head" style="display:flex; justify-content:space-between; align-items:center;">
      <h3 data-i18n-content="mp.confirm_title">접수 확인증</h3>
      <button type="button" onclick="printConfirm()" class="btn btn-text btn-sm" data-i18n-content="mp.print">인쇄</button>
    </div>
    <div class="modal-body" id="confirmBody"></div>
    <div class="modal-foot">
      <button type="button" class="btn btn-secondary" onclick="TPKM.closeModal('modalConfirm')" data-i18n-content="btn.close">닫기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modalReason">
  <div class="modal" style="max-width: 480px;">
    <div class="modal-head"><h3 data-i18n-content="mp.reason_title">반려 사유</h3></div>
    <div class="modal-body" id="reasonBody"></div>
    <div class="modal-foot">
      <button type="button" class="btn btn-secondary" onclick="TPKM.closeModal('modalReason')" data-i18n-content="btn.close">닫기</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="modalCancel">
  <div class="modal">
    <div class="modal-head"><h3 data-i18n-content="mp.cancel_q">접수를 취소하시겠습니까?</h3></div>
    <div class="modal-body">
      <p data-i18n-content="mp.cancel_desc">접수를 취소하시면 사진 심사가 중단되며, 다시 접수하시려면 처음부터 진행해야 합니다.</p>
      <div class="callout callout-warning" style="margin-top: 14px;">
        <div class="ico"></div>
        <div data-i18n-content="mp.cancel_note" data-i18n-content-html>
          <strong>취소는 오프라인 수납 전까지만 가능합니다.</strong>
          수납 완료 후에는 <a href="refund-correction.html" class="text-primary" style="text-decoration:underline;">환불·정보정정신청 게시판</a>을 이용해 주세요.
        </div>
      </div>
    </div>
    <div class="modal-foot">
      <button type="button" class="btn btn-secondary" onclick="TPKM.closeModal('modalCancel')" data-i18n-content="btn.close">닫기</button>
      <button type="button" class="btn btn-danger" id="btnConfirmCancel" data-i18n-content="mp.cancel_btn">접수 취소</button>
    </div>
  </div>
</div>

  };
</script>
<script src="shared/api-client.js?v=20260609d"></script>
<script src="assets/common.js"></script>
<script>
(function () {
  'use strict';

  function bt(key, fallback) {
    try { if (window.TPKMLang && TPKMLang.t) { var v = TPKMLang.t(key); if (v) return v; } } catch (e) {}
    return fallback;
  }

  var PHOTO_LABELS = {
    pending: { key: 'mp.photo_pending', color: 'var(--text-3)' },
    approved: { key: 'mp.photo_approved', color: 'var(--success)' },
    rejected: { key: 'mp.photo_rejected', color: 'var(--st-rejected)' }
  };
  var PAY_LABELS = {
    unpaid: { key: 'mp.pay_unpaid', color: 'var(--st-pay)' },
    paid: { key: 'mp.pay_paid', color: 'var(--success)' },
    refunded: { key: 'mp.pay_refunded', color: 'var(--text-3)' }
  };
  var REJECT_CODES = {
    not_frontal: 'mp.rj_not_frontal',
    hat_glasses: 'mp.rj_hat_glasses',
    bw_photo: 'mp.rj_bw',
    blurry: 'mp.rj_blurry',
    not_self: 'mp.rj_not_self',
    other: 'mp.rj_other'
  };

  var currentProfile = null;
  var currentItems = { active: [], past: [] };
  var avatarLoadSeq = 0;
  var pendingConfirmKey = null;

  function consumeConfirmKey() {
    try {
      var key = new URLSearchParams(location.search).get('confirm');
      if (key && history.replaceState) {
        history.replaceState(null, '', location.pathname);
      }
      return key;
    } catch (e) {
      return null;
    }
  }

  pendingConfirmKey = consumeConfirmKey();

  function tryOpenPendingConfirm() {
    if (!pendingConfirmKey) return;
    var key = pendingConfirmKey;
    pendingConfirmKey = null;
    var item = findItemByKey(key);
    if (item) openConfirmForItem(item);
  }

  function esc(s) {
    if (s == null) return '';
    return String(s)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function roundTitle(item) {
    var r = item.exam_round || {};
    if (r.title) return esc(r.title);
    if (r.round_no) return '제' + esc(r.round_no) + '회';
    return 'TOPIK';
  }

  function primaryLevel(item) {
    return (item.levels && item.levels[0]) || {};
  }

  var FALLBACK_FEES = { I: 25, II: 25 };

  function feeForItem(item) {
    if (item.fee != null) return Number(item.fee);
    var pl = primaryLevel(item);
    var level = pl.exam_level || item.exam_level || 'I';
    var r = item.exam_round || {};
    if (r.fees && r.fees[level] != null) return Number(r.fees[level]);
    if (level === 'I' && r.fee_level_i != null) return Number(r.fee_level_i);
    if (level === 'II' && r.fee_level_ii != null) return Number(r.fee_level_ii);
    return FALLBACK_FEES[level] || 25;
  }

  function formatFee(n) {
    return '$' + (Number(n) || 0).toLocaleString('en-US') + ' USD';
  }

  function feeDisplayForItem(item) {
    if (item.fee_formatted) return item.fee_formatted;
    return formatFee(feeForItem(item));
  }

  function photoCell(level) {
    var pr = PHOTO_LABELS[level.photo_review_status] || PHOTO_LABELS.pending;
    if (level.photo_review_status === 'rejected') {
      var note = level.photo_reject_code
        ? bt(REJECT_CODES[level.photo_reject_code], level.photo_reject_code)
        : bt('mp.photo_rejected', '반려');
      return '<div class="v" style="color: var(--st-rejected);">' + esc(bt('mp.photo_rejected', '반려')) + ' (' + esc(note) + ')</div>';
    }
    if (level.display_status === 'photo_review') {
      return '<div class="v" style="color: var(--st-photo);">' + esc(bt('mp.photo_review', '심사 중')) + '</div>';
    }
    return '<div class="v" style="color:' + pr.color + ';">' + esc(bt(pr.key, '')) + '</div>';
  }

  function payCell(level) {
    var p = PAY_LABELS[level.payment_status] || PAY_LABELS.unpaid;
    return '<div class="v" style="color:' + p.color + ';">' + esc(bt(p.key, '')) + '</div>';
  }

  function isExamNumberAssigned(level, item) {
    return level.status === 'exam_number_assigned' ||
      (item && item.fo_card_status === 'number');
  }

  function examNumberAwaitingText(item) {
    var at = item && item.exam_round && item.exam_round.exam_number_visible_at;
    var base = bt('mp.exam_num_awaiting', '공개 예정');
    if (!at) return base;
    var d = at.slice(0, 10).replace(/-/g, '.');
    return base + ' (' + d + ')';
  }

  function examNumCell(level, item) {
    if (level.exam_number_visible && level.exam_number) {
      return '<div class="v exam-num">' + esc(level.exam_number) + '</div>';
    }
    if (isExamNumberAssigned(level, item)) {
      return '<div class="v pending" style="color:var(--st-number);" title="' +
        esc(bt('mp.exam_num_awaiting_hint', '수험번호는 부여되었으나 공개일 전입니다. 공개일 이후 확인할 수 있습니다.')) + '">' +
        esc(examNumberAwaitingText(item)) + '</div>';
    }
    return '<div class="v pending">' + esc(bt('mp.exam_num_pending', '부여 전')) + '</div>';
  }

  function rejectionReasonText(item, level) {
    if (item.rejection_reason) return item.rejection_reason;
    var l = level || primaryLevel(item);
    if (!l) return '';
    if (l.photo_review_status === 'rejected') {
      var parts = [];
      if (l.photo_reject_code) {
        parts.push(bt(REJECT_CODES[l.photo_reject_code], l.photo_reject_code));
      }
      if (l.photo_reject_note) parts.push(l.photo_reject_note);
      if (parts.length) return parts.join(' — ');
    }
    if (l.reject_reason) return l.reject_reason;
    return '';
  }

  function findItemByKey(key) {
    if (!key) return null;
    var all = (currentItems.active || []).concat(currentItems.past || []);
    return all.find(function (i) {
      return String(i.application_id) === String(key) || String(i.submission_id) === String(key);
    }) || null;
  }

  function openReasonModal(item) {
    var reason = rejectionReasonText(item);
    document.getElementById('reasonBody').innerHTML =
      '<p style="margin:0; font-size:14px; line-height:1.6; color:var(--text); white-space:pre-wrap;">' +
      esc(reason || bt('mp.reason_title', '반려 사유')) + '</p>';
    TPKM.openModal('modalReason');
  }

  function buildCard(item) {
    var st = item.fo_card_status || 'applied';
    var lvl = item.levels_text || item.level_text || '';
    var pl = primaryLevel(item);
    var applyNo = item.application_no || pl.application_no || '';
    var itemKey = item.application_id || item.submission_id;
    var submitted = item.submitted_at_formatted || '';
    var meta = bt('mp.meta_exam_date', '시험일') + ' ' + esc(item.exam_date_formatted || '') +
      (item.venue && item.venue.name_ko ? ' · ' + esc(item.venue.name_ko) : '');

    var actions = '';
    var beforePay = ['applied', 'photo', 'pay'].indexOf(st) >= 0;
    var ticketOk = st === 'number';
    var confirmOk = ['applied', 'photo', 'pay', 'number', 'approved'].indexOf(st) >= 0;
    var photoRejected = st === 'photo_rejected';
    var appRejected = st === 'app_rejected';
    var hasReason = !!(item.rejection_reason || rejectionReasonText(item, pl));

    if (confirmOk) {
      actions += '<button type="button" class="btn btn-secondary btn-sm" data-act="confirm" data-key="' +
        esc(itemKey) + '">' + esc(bt('mp.btn_confirm', '접수 확인증')) + '</button>';
    }
    if (ticketOk) {
      actions += '<a href="ticket.html?submission=' + encodeURIComponent(item.submission_id) +
        '" class="btn btn-primary btn-sm" data-act="ticket">' + esc(bt('mp.btn_ticket', '수험표 출력')) + '</a>';
    }
    if (beforePay && !photoRejected && !appRejected && item.application_id) {
      actions +=
        '<button type="button" class="btn btn-ghost btn-sm" data-act="cancel" data-app="' +
        esc(item.application_id) +
        '">' + esc(bt('mp.cancel_btn', '접수 취소')) + '</button>';
    }
    if (photoRejected) {
      actions += '<a href="mypage-profile.html" class="btn btn-primary btn-sm" data-act="rephoto">' + esc(bt('mp.btn_rephoto', '사진 재등록')) + '</a>';
    }
    if (appRejected) {
      var reLv = pl.exam_level || item.exam_level || '';
      var reAppId = item.application_id || pl.id || '';
      actions += '<a href="register.html?reapply=1&amp;exam_round_id=' + encodeURIComponent(item.exam_round_id) +
        (reLv ? '&amp;level=' + encodeURIComponent(reLv) : '') +
        (reAppId ? '&amp;application_id=' + encodeURIComponent(reAppId) : '') +
        '" class="btn btn-primary btn-sm" data-act="reapply">' + esc(bt('mp.btn_reapply', '재접수')) + '</a>';
    }
    if ((photoRejected || appRejected) && hasReason) {
      actions += '<button type="button" class="btn btn-ghost btn-sm" data-act="reason" data-key="' +
        esc(itemKey) + '">' + esc(bt('mp.btn_reason', '사유보기')) + '</button>';
    }

    var statusClass = 'status status-' + st;
    var statusLabel = esc(item.card_status_label || (
      st === 'photo_rejected' ? bt('mp.status_photo_rejected', '사진 반려') :
      st === 'app_rejected' ? bt('mp.status_app_rejected', '반려') : ''
    ));

    return (
      '<div class="app-card" data-status="' + esc(st) + '" data-application-id="' + esc(item.application_id || '') +
        '" data-submission-id="' + esc(item.submission_id) + '">' +
        '<div class="app-head">' +
          '<div class="lt">' +
            '<h3><span class="round-n">' + roundTitle(item) + '</span> <span class="lvls">' + esc(lvl) + '</span></h3>' +
            '<div class="meta">' + meta + '</div>' +
          '</div>' +
          '<div class="rt">' +
            '<span class="' + statusClass + '">' + statusLabel + '</span>' +
            (applyNo ? '<span class="apply-n">' + esc(bt('mp.apply_no', '접수번호')) + ' ' + esc(applyNo) + '</span>' : '') +
          '</div>' +
        '</div>' +
        '<div class="app-grid">' +
          '<div class="it"><div class="l">' + esc(bt('mp.col_exam_num', '수험번호')) + '</div>' + examNumCell(pl, item) + '</div>' +
          '<div class="it"><div class="l">' + esc(bt('mp.col_photo', '사진 심사')) + '</div>' + photoCell(pl) + '</div>' +
          '<div class="it"><div class="l">' + esc(bt('mp.col_pay', '응시료 수납')) + '</div>' + payCell(pl) + '</div>' +
          '<div class="it"><div class="l">' + esc(bt('mp.col_date', '접수일')) + '</div><div class="v" style="color:var(--text-2); font-weight:500;">' + esc(submitted) + '</div></div>' +
        '</div>' +
        (actions ? '<div class="app-actions">' + actions + '</div>' : '') +
      '</div>'
    );
  }

  function emptyHtml(tab) {
    if (tab === 'past') {
      return '<div class="empty"><h3>' + esc(bt('mp.empty_past_t', '지난 접수가 없습니다')) + '</h3><p>' + esc(bt('mp.empty_past_d', '완료되거나 취소된 회차 접수가 여기에 표시됩니다.')) + '</p></div>';
    }
    return (
      '<div class="empty">' +
        '<h3>' + esc(bt('mp.empty_active_t', '진행 중인 접수가 없습니다')) + '</h3>' +
        '<p>' + esc(bt('mp.empty_active_d', '시험 접수를 진행해 주세요.')) + '</p>' +
        '<a href="register.html" class="btn btn-primary">' + esc(bt('mp.empty_active_btn', '시험 접수하기')) + '</a>' +
      '</div>'
    );
  }

  function renderLists() {
    var activeEl = document.getElementById('paneActive');
    var pastEl = document.getElementById('panePast');
    var active = currentItems.active || [];
    var past = currentItems.past || [];

    document.getElementById('ctActive').textContent = String(active.length);
    document.getElementById('ctPast').textContent = String(past.length);

    activeEl.innerHTML = active.length
      ? active.map(buildCard).join('')
      : emptyHtml('active');
    pastEl.innerHTML = past.length
      ? past.map(buildCard).join('')
      : emptyHtml('past');

    gateActions();
    bindConfirmButtons();
    bindCancelButtons();
    bindReasonButtons();
  }

  function bindCancelButtons() {
    document.querySelectorAll('[data-act="cancel"][data-app]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        cancelApplicationId = btn.getAttribute('data-app');
        TPKM.openModal('modalCancel');
      });
    });
  }

  function resetMeAvatar() {
    var el = document.getElementById('meAvatar');
    if (!el) return;
    el.textContent = bt('mp.photo_placeholder', 'PHOTO');
  }

  function consumeProfileSeed() {
    try {
      var raw = sessionStorage.getItem('tpkm_mypage_profile_seed');
      if (!raw) return null;
      sessionStorage.removeItem('tpkm_mypage_profile_seed');
      return JSON.parse(raw);
    } catch (e) {
      return null;
    }
  }

  function meAvatarHasPhoto() {
    var el = document.getElementById('meAvatar');
    return !!(el && el.querySelector('img'));
  }

  function showMeAvatar(fileId, photoUnavailable) {
    var el = document.getElementById('meAvatar');
    if (!el || !fileId || !window.TopikApi) {
      resetMeAvatar();
      return;
    }
    if (photoUnavailable && TopikApi.markFileUnavailable) {
      TopikApi.markFileUnavailable(fileId);
      resetMeAvatar();
      return;
    }
    avatarLoadSeq += 1;
    var seq = avatarLoadSeq;
    if (TopikApi.clearFileUnavailable) TopikApi.clearFileUnavailable(fileId);
    if (el.dataset.avatarBlobUrl) {
      try { URL.revokeObjectURL(el.dataset.avatarBlobUrl); } catch (e) { /* ignore */ }
      delete el.dataset.avatarBlobUrl;
    }
    var url = TopikApi.fileUrl ? TopikApi.fileUrl(fileId) : '';
    if (!url) {
      resetMeAvatar();
      return;
    }
    el.textContent = '';
    var img = document.createElement('img');
    img.alt = '';
    img.onload = function () {
      if (seq !== avatarLoadSeq) return;
    };
    img.onerror = function (ev) {
      // 이전(showMeAvatar) 요청의 늦은 onerror가 성공한 사진을 지우지 않도록 세대 가드.
      if (seq !== avatarLoadSeq) return;
      if (TopikApi.imgFileOnError) {
        TopikApi.imgFileOnError(fileId, function () {
          if (seq !== avatarLoadSeq) return;
          resetMeAvatar();
        })(ev);
      } else {
        resetMeAvatar();
      }
    };
    img.src = url;
    el.appendChild(img);
  }

  function scheduleMeAvatarRetry() {
    var u = currentProfile;
    if (!u || !u.photo_file_id) return;
    [300, 900].forEach(function (delay) {
      setTimeout(function () {
        if (meAvatarHasPhoto()) return;
        if (TopikApi.clearFileUnavailable) TopikApi.clearFileUnavailable(u.photo_file_id);
        showMeAvatar(u.photo_file_id, u.photo_unavailable);
      }, delay);
    });
  }

  function fillProfile(user, opts) {
    opts = opts || {};
    if (!user) return;
    currentProfile = user;
    document.getElementById('meNameKo').textContent = user.name_ko || user.name || '—';
    document.getElementById('meNameEn').textContent = user.name_en || '—';
    var meta = [];
    if (user.phone) meta.push(user.phone);
    if (user.email) meta.push(user.email);
    document.getElementById('meMeta').textContent = meta.join(' · ') || '—';
    if (opts.skipPhoto) return;
    if (user.photo_file_id) showMeAvatar(user.photo_file_id, user.photo_unavailable);
    else resetMeAvatar();
  }

  function fillProfileFromAuth() {
    var u = window.TPKMAuth && TPKMAuth.user;
    if (u) {
      fillProfile({
        name_ko: u.name,
        name_en: '',
        phone: '',
        email: u.email
      });
    }
  }

  function openConfirmForItem(item) {
    var pl = primaryLevel(item);
    var levelText = item.levels_text || item.level_text ||
      (pl.exam_level === 'II' ? 'TOPIK Ⅱ' : 'TOPIK Ⅰ');
    var payDone = pl.payment_status === 'paid';
    var u = currentProfile || {};
    var birth = u.birth_date;
    if (birth && birth.length === 8) {
      birth = birth.slice(0, 4) + '-' + birth.slice(4, 6) + '-' + birth.slice(6, 8);
    }
    document.getElementById('confirmBody').innerHTML =
      '<table class="table" style="margin: 0;"><tbody style="font-size: 13.5px;">' +
        '<tr><th style="width:110px;">' + esc(bt('mp.t_round', '회차')) + '</th><td>' + roundTitle(item) + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.apply_no', '접수번호')) + '</th><td style="font-family:Inter,sans-serif;">' + esc(pl.application_no) + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.col_exam_num', '수험번호')) + '</th><td style="font-family:Inter,sans-serif;">' +
          (pl.exam_number_visible && pl.exam_number
            ? esc(pl.exam_number)
            : isExamNumberAssigned(pl, item)
              ? esc(examNumberAwaitingText(item))
              : esc(bt('mp.exam_num_pending', '부여 전'))) + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.t_level', '응시 급수')) + '</th><td>' + esc(levelText) + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.t_fee', '응시료')) + '</th><td style="font-family:Inter,sans-serif; font-weight:600; color:var(--primary);">' +
          esc(feeDisplayForItem(item)) + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.col_date', '접수일')) + '</th><td>' + esc(item.submitted_at_formatted) + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.t_applicant', '응시자')) + '</th><td>' + esc(u.name_ko || '') + ' / ' + esc(u.name_en || '') + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.t_birth', '생년월일')) + '</th><td>' + esc(birth || '—') + '</td></tr>' +
        '<tr><th>' + esc(bt('mp.t_pay_status', '수납 상태')) + '</th><td><span class="status ' +
          (payDone ? 'status-approved">' + esc(bt('mp.pay_paid', '완료')) : 'status-pay">' + esc(bt('mp.pay_unpaid', '대기'))) + '</span></td></tr>' +
      '</tbody></table>';
    TPKM.openModal('modalConfirm');
  }

  function bindConfirmButtons() {
    document.querySelectorAll('[data-act="confirm"][data-key]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var item = findItemByKey(btn.getAttribute('data-key'));
        if (item) openConfirmForItem(item);
      });
    });
  }

  function bindReasonButtons() {
    document.querySelectorAll('[data-act="reason"][data-key]').forEach(function (btn) {
      btn.addEventListener('click', function () {
        var item = findItemByKey(btn.getAttribute('data-key'));
        if (item) openReasonModal(item);
      });
    });
  }

  function gateActions() {
    document.querySelectorAll('.app-card[data-status]').forEach(function (card) {
      var st = card.dataset.status;
      var beforePay = ['applied', 'photo', 'pay'].indexOf(st) >= 0;
      var ticketOk = st === 'number';
      var confirmOk = ['applied', 'photo', 'pay', 'number', 'approved'].indexOf(st) >= 0;
      var rejected = st === 'photo_rejected' || st === 'app_rejected';
      card.querySelectorAll('[data-act="cancel"]').forEach(function (b) {
        b.style.display = (beforePay && !rejected) ? '' : 'none';
      });
      card.querySelectorAll('[data-act="ticket"]').forEach(function (b) {
        b.style.display = ticketOk ? '' : 'none';
      });
      card.querySelectorAll('[data-act="confirm"]').forEach(function (b) {
        b.style.display = confirmOk ? '' : 'none';
      });
      card.querySelectorAll('[data-act="rephoto"]').forEach(function (b) {
        b.style.display = st === 'photo_rejected' ? '' : 'none';
      });
      card.querySelectorAll('[data-act="reapply"]').forEach(function (b) {
        b.style.display = st === 'app_rejected' ? '' : 'none';
      });
    });
  }

  function applyApiPayload(body) {
    var items = body.items || [];
    currentItems.active = body.active || items.filter(function (i) { return i.tab === 'active'; });
    currentItems.past = body.past || items.filter(function (i) { return i.tab === 'past'; });
    renderLists();
  }

  var cancelApplicationId = null;

  function showLoadError(msg) {
    var html =
      '<div class="empty"><h3>' + esc(bt('mp.load_fail_t', '접수 내역을 불러올 수 없습니다')) + '</h3><p>' +
      esc(msg) +
      '</p><button type="button" class="btn btn-secondary" onclick="location.reload()">' + esc(bt('mp.retry', '다시 시도')) + '</button></div>';
    document.getElementById('paneActive').innerHTML = html;
    document.getElementById('panePast').innerHTML = html;
    document.getElementById('ctActive').textContent = '0';
    document.getElementById('ctPast').textContent = '0';
  }

  function loadApplications() {
    var useApi = window.TopikApi && TopikApi.useApi && TopikApi.baseUrl &&
      TopikApi.isLoggedIn() && TopikApi.getAccessToken() !== 'demo-local';

    if (!useApi) {
      if (!window.TPKMAuth || !TPKMAuth.isLoggedIn()) {
        location.href = 'login.html?next=' + encodeURIComponent('mypage.html');
        return;
      }
      showLoadError(bt('mp.api_off', 'API가 연결되지 않았습니다. 로그인 후 다시 시도해 주세요.'));
      return;
    }

    document.getElementById('paneActive').innerHTML =
      '<p style="text-align:center;padding:32px;color:var(--text-3);">' + esc(bt('mp.loading', '접수 내역을 불러오는 중…')) + '</p>';

    TopikApi.getMyApplications().then(function (res) {
      if (res.ok && res.body) {
        applyApiPayload(res.body);
        return;
      }
      showLoadError(TopikApi.parseError(res));
    }).catch(function () {
      showLoadError(bt('mp.network_err', '네트워크 오류입니다.'));
    });
  }

  document.getElementById('btnConfirmCancel').addEventListener('click', function () {
    var btn = this;
    if (!cancelApplicationId) {
      TPKM.closeModal('modalCancel');
      return;
    }
    btn.disabled = true;
    btn.textContent = bt('mp.processing', '처리 중…');
    TopikApi.cancelApplication(cancelApplicationId).then(function (res) {
      btn.disabled = false;
      btn.textContent = bt('mp.cancel_btn', '접수 취소');
      TPKM.closeModal('modalCancel');
      if (!res.ok) {
        alert(TopikApi.parseError(res));
        return;
      }
      cancelApplicationId = null;
      loadApplications();
    }).catch(function () {
      btn.disabled = false;
      btn.textContent = bt('mp.cancel_btn', '접수 취소');
      TPKM.closeModal('modalCancel');
      alert(bt('mp.network_err', '네트워크 오류입니다.'));
    });
  });

  function loadMe() {
    if (!window.TopikApi || !TopikApi.useApi || !TopikApi.baseUrl || !TopikApi.isLoggedIn()) {
      fillProfileFromAuth();
      return Promise.resolve();
    }
    if (TopikApi.getAccessToken() === 'demo-local') {
      fillProfileFromAuth();
      return Promise.resolve();
    }
    return TopikApi.getMe().then(function (res) {
      if (res.ok && res.body && res.body.user) fillProfile(res.body.user);
      else fillProfileFromAuth();
    }).catch(fillProfileFromAuth);
  }

  function loadPage() {
    var useApi = window.TopikApi && TopikApi.useApi && TopikApi.baseUrl &&
      TopikApi.isLoggedIn() && TopikApi.getAccessToken() !== 'demo-local';

    if (!useApi) {
      if (!window.TPKMAuth || !TPKMAuth.isLoggedIn()) {
        location.href = 'login.html?next=' + encodeURIComponent('mypage.html');
        return;
      }
      fillProfileFromAuth();
      showLoadError(bt('mp.api_off', 'API가 연결되지 않았습니다. 로그인 후 다시 시도해 주세요.'));
      return;
    }

    var profileSeed = consumeProfileSeed();
    if (profileSeed) fillProfile(profileSeed, { skipPhoto: true });

    document.getElementById('paneActive').innerHTML =
      '<p style="text-align:center;padding:32px;color:var(--text-3);">' + esc(bt('mp.loading', '접수 내역을 불러오는 중…')) + '</p>';

    // 접수 목록 API가 토큰 갱신을 먼저 끝낸 뒤 프로필·증명사진을 불러 타이밍 이슈를 줄임.
    TopikApi.getMyApplications().then(function (appsRes) {
      return TopikApi.getMe().then(function (meRes) {
        return { appsRes: appsRes, meRes: meRes };
      });
    }).then(function (payload) {
      var meRes = payload.meRes;
      var appsRes = payload.appsRes;
      if (meRes.ok && meRes.body && meRes.body.user) fillProfile(meRes.body.user);
      else if (!profileSeed) fillProfileFromAuth();
      if (appsRes.ok && appsRes.body) {
        applyApiPayload(appsRes.body);
      } else {
        showLoadError(TopikApi.parseError(appsRes));
      }
      scheduleMeAvatarRetry();
      tryOpenPendingConfirm();
    }).catch(function () {
      if (!profileSeed) fillProfileFromAuth();
      showLoadError(bt('mp.network_err', '네트워크 오류입니다.'));
    });
  }

  document.querySelectorAll('.my-tabs button').forEach(function (b) {
    b.addEventListener('click', function () {
      document.querySelectorAll('.my-tabs button').forEach(function (x) {
        x.classList.remove('active');
      });
      b.classList.add('active');
      document.querySelectorAll('.tab-pane').forEach(function (p) {
        p.style.display = p.dataset.tab === b.dataset.tab ? '' : 'none';
      });
    });
  });

  window.printConfirm = function () {
    document.body.classList.add('printing-confirm');
    window.print();
  };
  window.addEventListener('afterprint', function () {
    document.body.classList.remove('printing-confirm');
  });

  document.addEventListener('tpkm:langchange', function () {
    if (currentItems.active.length || currentItems.past.length) {
      renderLists();
    }
  });

  window.addEventListener('pageshow', function (ev) {
    if (ev.persisted) loadPage();
  });

  loadPage();
})();
</script>
</body>
</html>
