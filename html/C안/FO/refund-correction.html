<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>환불·정보정정신청 — 게시판 | TOPIK Myanmar</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .board-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
  .board-tools {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
    margin-bottom: 16px;
  }
  .board-tools .filters { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
  .board-tools .search { flex: 1; min-width: 180px; position: relative; }
  .board-tools .search input {
    width: 100%; height: 38px; padding: 0 14px 0 38px;
    border: 1px solid var(--border); border-radius: 99px;
    background: #fff; font-size: 13.5px;
  }
  .board-tools .search::before {
    content: ""; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7588' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
    background-repeat: no-repeat;
  }
  .board-tools .write { flex: 0 0 auto; }

  /* List */
  .pane { display: none; }
  .pane.active { display: block; }
  .list-view .col-num { width: 50px; text-align: center; color: var(--text-3); }
  .list-view .col-type { width: 80px; }
  .list-view .col-author { width: 90px; color: var(--text-3); white-space: nowrap; }
  .list-view .col-date { width: 100px; text-align: right; color: var(--text-3); white-space: nowrap; }
  .list-view .col-status { width: 90px; text-align: center; white-space: nowrap; }
  .list-view .lock { font-size: 12px; color: var(--text-4); margin-right: 4px; }
  .list-view tr { cursor: pointer; }

  /* 모바일 가로 스크롤 테이블 */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .list-view .table th,
  .list-view .table td { white-space: nowrap; }
  .list-view .table td:nth-child(3) {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .badge-type-rfd { background: #fff4e3; color: #b86e00; border: 1px solid #f1d9aa; }
  .badge-type-cor { background: #eaf2fb; color: var(--primary); border: 1px solid #cfe0f1; }

  /* Secret password modal */
  .secret-lock { text-align: center; padding: 16px 0; }
  .secret-lock .ico-lock {
    width: 56px; height: 56px;
    background: var(--bg-3); color: var(--text-3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 12px;
  }

  /* Write form */
  .write-form { max-width: 760px; margin: 0 auto; }
  .file-list {
    padding: 12px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-2);
    font-size: 12.5px;
    color: var(--text-3);
    text-align: center;
  }

  /* Detail */
  .detail-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .detail-head { padding: 22px 24px; border-bottom: 1px solid var(--border); }
  .detail-head h2 { font-size: 20px; line-height: 1.4; }
  .detail-head .meta {
    display: flex; gap: 12px; align-items: center; margin-top: 10px;
    font-size: 12.5px; color: var(--text-3); flex-wrap: wrap;
  }
  .detail-body { padding: 24px; font-size: 14.5px; line-height: 1.8; color: var(--text-2); }
  .detail-body p { margin-bottom: 14px; }

  .reply-block {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--info-50);
    padding: 18px 20px;
  }
  .reply-block .who {
    display: flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 600; color: var(--primary);
    margin-bottom: 8px;
  }
  .reply-block .who::before {
    content: "관리자 답변"; padding: 2px 8px;
    background: var(--primary); color: #fff;
    font-size: 11px; font-weight: 700;
    border-radius: 99px;
  }
  .reply-block .when { font-size: 12px; color: var(--text-3); margin-left: auto; font-weight: 400; }
  .reply-block .body-r { font-size: 14px; color: var(--text-2); line-height: 1.7; }

  /* Comments */
  .comments {
    margin-top: 24px;
    border-top: 1px solid var(--border);
    padding: 20px 0;
  }
  .comments h4 { font-size: 14px; margin-bottom: 12px; }
  .comment {
    padding: 14px 16px;
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
  }
  .comment.reply {
    margin-left: 24px; background: #fff; border: 1px solid var(--border);
    position: relative;
  }
  .comment.reply::before {
    content: "";
    position: absolute; left: -16px; top: 22px;
    width: 12px; height: 12px;
    border-left: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
    border-radius: 0 0 0 4px;
  }
  .comment .c-head {
    display: flex; gap: 8px; align-items: center;
    font-size: 12.5px; color: var(--text-3); margin-bottom: 6px;
  }
  .comment .c-head .author { color: var(--text); font-weight: 600; }
  .comment .c-head .lock { font-size: 11px; }
  .comment .c-body { font-size: 13.5px; color: var(--text-2); line-height: 1.6; }
  .comment .c-actions {
    margin-top: 6px; display: flex; gap: 8px;
    font-size: 12px; color: var(--text-3);
  }
  .comment .c-actions a:hover { color: var(--primary); }

  .comment-write {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .comment-write textarea {
    flex: 1; min-height: 60px;
    padding: 10px 12px; font-size: 13.5px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); resize: vertical;
    background: #fff;
  }
  .comment-write .btn-wrap {
    display: flex; flex-direction: column; gap: 4px;
  }

  /* 인라인 대댓글 입력 폼 */
  .reply-form-wrap {
    margin-top: 8px; margin-left: 24px; display: none;
  }
  .reply-form-wrap.open { display: block; }
  .reply-form-wrap .reply-form-inner {
    display: flex; gap: 8px;
    background: #f5f8ff; border: 1px solid #cfe0f1;
    border-radius: var(--radius-sm); padding: 10px;
  }
  .reply-form-wrap .reply-form-inner textarea {
    flex: 1; min-height: 56px;
    padding: 8px 10px; font-size: 13.5px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    resize: vertical; background: #fff;
  }
  .reply-form-wrap .reply-form-inner .btn-wrap {
    display: flex; flex-direction: column; gap: 4px;
  }

  .status-step {
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    margin-bottom: 16px;
  }
  .status-step .l { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
  .status-bar {
    display: flex; gap: 4px;
  }
  .status-bar .seg {
    flex: 1; height: 4px; border-radius: 2px; background: var(--border);
  }
  .status-bar .seg.done { background: var(--primary); }
  .status-step .steps-row {
    display: flex; justify-content: space-between; margin-top: 10px;
    font-size: 11.5px; color: var(--text-3);
  }
  .status-step .steps-row .cur { color: var(--primary); font-weight: 700; }
</style>
</head>
<body data-require-login>

<div id="site-header"></div>

<main class="page" role="main">

  <header class="page-head">
    <div class="container">
      <div class="crumb"><span>게시판</span><span>환불·정보정정신청</span></div>
      <h1>환불·정보정정신청</h1>
      <p class="lead">응시료 환불 또는 회원 본인 정보 정정을 신청하는 게시판입니다.</p>
    </div>
  </header>

  <div class="board-wrap">

    <!-- ============ List ============ -->
    <section class="pane list-view active" id="listPane">
      <div class="board-tools">
        <div class="filters">
          <button class="chip active">전체</button>
          <button class="chip">환불</button>
          <button class="chip">정보정정</button>
        </div>
        <div class="search"><input type="search" placeholder="제목·작성자 검색"></div>
        <button class="btn btn-primary btn-sm write" onclick="show('writePane')">글쓰기</button>
      </div>

      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="table-scroll">
        <table class="table">
          <thead>
            <tr>
              <th class="col-num">번호</th>
              <th class="col-type">유형</th>
              <th>제목</th>
              <th class="col-author">작성자</th>
              <th class="col-date">작성일</th>
              <th class="col-status">상태</th>
            </tr>
          </thead>
          <tbody id="rfdListBody">
            <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-3);">불러오는 중…</td></tr>
          </tbody>
        </table>
        </div>
      </div>

      <nav class="pager" id="rfdPager"></nav>
    </section>

    <!-- ============ Write ============ -->
    <section class="pane write-form" id="writePane">
      <a href="javascript:void(0)" onclick="show('listPane')" class="btn btn-text" style="margin-bottom: 12px;">← 목록으로</a>

      <h2 class="h2" style="margin-bottom: 18px;">새 글 작성</h2>

      <div class="form-row">
        <label class="label">유형 <span class="req">*</span></label>
        <div style="display: flex; gap: 16px;">
          <label class="radio"><input type="radio" name="type" checked><span class="box"></span><span>환불</span></label>
          <label class="radio"><input type="radio" name="type"><span class="box"></span><span>정보정정</span></label>
        </div>
      </div>

      <div class="form-row">
        <label class="label">제목 <span class="req">*</span></label>
        <input class="input" id="rfdTitle" placeholder="제목 (100자 이내)" maxlength="100">
      </div>

      <div class="form-row">
        <label class="label">내용 <span class="req">*</span></label>
        <textarea class="textarea" id="rfdBody" rows="8" placeholder="환불·정정 사유, 접수번호, 회차 등을 자세히 작성해 주세요."></textarea>
      </div>

      <div class="form-row">
        <label class="label">첨부파일</label>
        <div class="file-list">
          영수증·신분증 사본 등 (jpg, png, pdf · 5MB 이하 · 최대 5개)
          <div style="margin-top: 8px;"><button type="button" class="btn btn-secondary btn-sm">파일 선택</button></div>
        </div>
      </div>

      <div class="form-row">
        <div class="file-list" style="text-align:left;">
          🔒 환불·정보정정 신청 글은 모두 <strong>비밀글</strong>로 등록됩니다.
          작성자 본인과 관리자만 내용·댓글을 열람할 수 있습니다.
        </div>
      </div>

      <div class="form-row">
        <label class="check"><input type="checkbox"><span class="box"></span><span><span class="req">[필수]</span> 개인정보 처리에 동의합니다 (정정 신청 시 신원 식별 정보 처리 동의)</span></label>
      </div>

      <div style="display: flex; gap: 8px; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="show('listPane')">취소</button>
        <button class="btn btn-primary" style="flex:1;" id="btnRefundSubmit">제출</button>
      </div>
    </section>

    <!-- ============ Detail ============ -->
    <section class="pane" id="detailPane">
      <a href="javascript:void(0)" onclick="show('listPane')" class="btn btn-text" style="margin-bottom: 12px;">← 목록으로</a>

      <article class="detail-card">
        <div class="detail-head">
          <div style="display:flex; gap: 8px; margin-bottom: 10px;">
            <span class="badge badge-type-rfd" id="bdBadge"></span>
            <span class="status" id="bdStatus"></span>
          </div>
          <h2 id="bdTitle"></h2>
          <div class="meta" id="bdMeta"></div>
        </div>

        <div class="detail-body" id="bdBody"></div>

        <div style="padding: 0 24px 24px;">
          <div class="reply-block" id="bdReply" style="display:none;">
            <div class="who"><span class="when" id="bdReplyWhen"></span></div>
            <div class="body-r" id="bdReplyBody"></div>
          </div>
        </div>

        <div style="padding: 0 24px 24px;">
          <div class="comments" id="bdComments"></div>
        </div>
      </article>
    </section>

  </div>
</main>

<div id="site-footer"></div>
<div id="site-tabbar"></div>

<!-- 비밀글 잠금 해제 -->
<div class="modal-backdrop" id="modalSecretLock">
  <div class="modal">
    <div class="modal-head"><h3>비밀글</h3></div>
    <div class="modal-body">
      <div class="secret-lock">
        <div class="ico-lock">🔒</div>
        <p>비밀글입니다. 작성자·관리자만 열람할 수 있습니다.</p>
        <p class="body-sm" style="margin-top: 6px;">비밀번호를 입력해 주세요.</p>
      </div>
      <div class="form-row" style="margin-top: 12px;">
        <input class="input" type="password" id="secretPw" placeholder="비밀번호">
        <span class="hint" id="secretPwErr" style="display:none; color: var(--danger);"></span>
      </div>
      <p class="body-sm" style="text-align: center; font-size: 11.5px;">최대 5회 실패 시 30분간 잠깁니다.</p>
    </div>
    <div class="modal-foot">
      <button class="btn btn-secondary" onclick="TPKM.closeModal('modalSecretLock')">닫기</button>
      <button class="btn btn-primary" id="btnSecretUnlock">확인</button>
    </div>
  </div>
</div>

<script src="shared/api-client.js"></script>
<script src="assets/common.js"></script>
<script src="assets/fo-board.js"></script>
<script>
  window.show = function (id) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }
  // ---- 목록/상세 (API) ----
  function rfdBadge(p) {
    var cat = p.category || '';
    if (cat === '정보정정') return '<span class="badge badge-type-cor">정보정정</span>';
    if (cat === '환불') return '<span class="badge badge-type-rfd">환불</span>';
    return '<span class="badge badge-type-rfd">' + (cat ? cat.replace(/[<>&]/g, '') : '신청') + '</span>';
  }
  var board = TPKMBoard.initBoard({
    boardType: 'refund_correction',
    listBody: document.getElementById('rfdListBody'),
    pager: document.getElementById('rfdPager'),
    colspan: 6,
    typeCellClass: 'col-type',
    detailPaneId: 'detailPane',
    typeCell: rfdBadge,
    detailBadgeClass: function (p) {
      return (p.category === '정보정정') ? 'badge badge-type-cor' : 'badge badge-type-rfd';
    },
    detail: {
      title: document.getElementById('bdTitle'),
      badge: document.getElementById('bdBadge'),
      status: document.getElementById('bdStatus'),
      meta: document.getElementById('bdMeta'),
      body: document.getElementById('bdBody'),
      reply: document.getElementById('bdReply'),
      replyWhen: document.getElementById('bdReplyWhen'),
      replyBody: document.getElementById('bdReplyBody'),
      comments: document.getElementById('bdComments'),
    },
    show: window.show,
  });

  // ---- 필터: 전체/환불/정보정정 + 검색 ----
  var typeFilter = 'all';
  function applyFilters() {
    var q = (document.querySelector('.board-tools .search input').value || '').trim().toLowerCase();
    board.setFilter(function (p) {
      if (typeFilter === '환불' && (p.category || '') !== '환불') return false;
      if (typeFilter === '정보정정' && (p.category || '') !== '정보정정') return false;
      if (q && (p.title || '').toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
  }
  document.querySelectorAll('.filters .chip').forEach(function (c, i) {
    c.addEventListener('click', function () {
      document.querySelectorAll('.filters .chip').forEach(function (x) { x.classList.remove('active'); });
      c.classList.add('active');
      typeFilter = i === 1 ? '환불' : i === 2 ? '정보정정' : 'all';
      applyFilters();
    });
  });
  document.querySelector('.board-tools .search input').addEventListener('input', applyFilters);

  TPKMBoard.wireSubmit({
    boardType: 'refund_correction',
    submitBtn: document.getElementById('btnRefundSubmit'),
    titleEl: document.getElementById('rfdTitle'),
    bodyEl: document.getElementById('rfdBody'),
    forceSecret: true,
    resolveCategory: function () {
      var radios = document.getElementsByName('type');
      return (radios[0] && radios[0].checked) ? '환불' : '정보정정';
    },
    onSuccess: function () { show('listPane'); board.load(1); },
  });

  // 최초 로드
  if (window.TopikApi && TopikApi.isLoggedIn()) board.load(1);
</script>
</body>
</html>
