<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>환불·정보정정신청 — 게시판 | TOPIK Myanmar</title>
<link rel="stylesheet" href="assets/styles.css">
<style>
  .board-wrap { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
  .board-tools {
    display: flex;
    flex-direction: column;
    gap: 10px;
    align-items: stretch;
    margin-bottom: 16px;
  }
  .board-tools .filters { display: flex; gap: 6px; flex-wrap: wrap; }
  .board-tools-row {
    display: flex;
    gap: 8px;
    align-items: center;
    width: 100%;
  }
  .board-tools .search { flex: 1; min-width: 0; position: relative; }
  .board-tools .search input {
    width: 100%; height: 38px; padding: 0 14px 0 38px;
    border: 1px solid var(--border); border-radius: 99px;
    background: #fff; font-size: 16px;
  }
  .board-tools .search::before {
    content: ""; position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
    width: 14px; height: 14px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%236B7588' stroke-width='2' stroke-linecap='round'><circle cx='11' cy='11' r='7'/><path d='M21 21l-4.3-4.3'/></svg>");
    background-repeat: no-repeat;
  }
  .board-tools .write { flex: 0 0 auto; }
  @media (max-width: 767px) {
    .board-tools .filters {
      flex-wrap: nowrap;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      margin: 0 -16px;
      padding: 0 16px 2px;
    }
    .board-tools .filters::-webkit-scrollbar { display: none; }
    .board-tools .filters .chip { flex: 0 0 auto; }
  }

  /* List */
  .pane { display: none; }
  .pane.active { display: block; }
  .list-view .col-num { width: 50px; text-align: center; color: var(--text-3); }
  .list-view .col-type { width: 80px; }
  .list-view .col-author { width: 90px; color: var(--text-3); white-space: nowrap; }
  .list-view .col-date { width: 100px; text-align: right; color: var(--text-3); white-space: nowrap; }
  .list-view .col-status { width: 90px; text-align: center; white-space: nowrap; }
  .list-view .lock { font-size: 12px; color: var(--text-4); margin-right: 4px; }
  .list-view tr { cursor: pointer; }

  /* 모바일 가로 스크롤 테이블 */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .list-view .table th,
  .list-view .table td { white-space: nowrap; }
  .list-view .table td:nth-child(3) {
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 180px;
  }
  .badge-type-rfd { background: #fff4e3; color: #b86e00; border: 1px solid #f1d9aa; }
  .badge-type-cor { background: #eaf2fb; color: var(--primary); border: 1px solid #cfe0f1; }

  /* Secret password modal */
  .secret-lock { text-align: center; padding: 16px 0; }
  .secret-lock .ico-lock {
    width: 56px; height: 56px;
    background: var(--bg-3); color: var(--text-3);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; margin: 0 auto 12px;
  }

  /* Write form */
  .write-form { max-width: 760px; margin: 0 auto; }
  .file-list {
    padding: 12px;
    border: 1px dashed var(--border-strong);
    border-radius: var(--radius-sm);
    background: var(--bg-2);
    font-size: 12.5px;
    color: var(--text-3);
    text-align: center;
  }

  /* Detail */
  .detail-card {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .detail-head { padding: 22px 24px; border-bottom: 1px solid var(--border); }
  .detail-head-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 10px;
  }
  .detail-head-top .status { flex-shrink: 0; }
  .detail-actions-bar { display: flex; gap: 8px; padding: 0 24px 16px; }
  .detail-head h2 { font-size: 20px; line-height: 1.4; }
  .detail-head .meta {
    display: flex; gap: 12px; align-items: center; margin-top: 10px;
    font-size: 12.5px; color: var(--text-3); flex-wrap: wrap;
  }
  .detail-body { padding: 24px; font-size: 14.5px; line-height: 1.8; color: var(--text-2); }
  .detail-body p { margin-bottom: 14px; }

  .reply-history { margin-top: 12px; display: flex; flex-direction: column; gap: 10px; }
  .reply-block {
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--info-50);
    padding: 18px 20px;
  }
  .reply-block .who {
    display: flex; align-items: center; gap: 8px;
    font-size: 13.5px; font-weight: 600; color: var(--primary);
    margin-bottom: 8px;
  }
  .reply-block .reply-badge {
    padding: 2px 8px; background: var(--primary); color: #fff;
    font-size: 11px; font-weight: 700; border-radius: 99px;
  }
  .reply-block .when { font-size: 12px; color: var(--text-3); margin-left: auto; font-weight: 400; }
  .reply-block .body-r { font-size: 14px; color: var(--text-2); line-height: 1.7; }

  /* Comments */
  .comments {
    margin-top: 24px;
    border-top: 1px solid var(--border);
    padding: 20px 0;
  }
  .comments h4 { font-size: 14px; margin-bottom: 12px; }
  .comment {
    padding: 14px 16px;
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    margin-bottom: 8px;
  }
  .comment.reply {
    margin-left: 24px; background: #fff; border: 1px solid var(--border);
    position: relative;
  }
  .comment.reply::before {
    content: "";
    position: absolute; left: -16px; top: 22px;
    width: 12px; height: 12px;
    border-left: 2px solid var(--border);
    border-bottom: 2px solid var(--border);
    border-radius: 0 0 0 4px;
  }
  .comment .c-head {
    display: flex; gap: 8px; align-items: center;
    font-size: 12.5px; color: var(--text-3); margin-bottom: 6px;
  }
  .comment .c-head .author { color: var(--text); font-weight: 600; }
  .comment .c-head .lock { font-size: 11px; }
  .comment .c-body { font-size: 13.5px; color: var(--text-2); line-height: 1.6; }
  .comment .c-actions {
    margin-top: 6px; display: flex; gap: 8px;
    font-size: 12px; color: var(--text-3);
  }
  .comment .c-actions a:hover { color: var(--primary); }

  .comment-write {
    display: flex; gap: 8px; margin-top: 12px;
  }
  .comment-write textarea {
    flex: 1; min-height: 60px;
    padding: 10px 12px; font-size: 16px;
    border: 1px solid var(--border-strong);
    border-radius: var(--radius-sm); resize: vertical;
    background: #fff;
  }
  .comment-write .btn-wrap {
    display: flex; flex-direction: column; gap: 4px;
  }

  /* 인라인 대댓글 입력 폼 */
  .reply-form-wrap {
    margin-top: 8px; margin-left: 24px; display: none;
  }
  .reply-form-wrap.open { display: block; }
  .reply-form-wrap .reply-form-inner {
    display: flex; gap: 8px;
    background: #f5f8ff; border: 1px solid #cfe0f1;
    border-radius: var(--radius-sm); padding: 10px;
  }
  .reply-form-wrap .reply-form-inner textarea {
    flex: 1; min-height: 56px;
    padding: 8px 10px; font-size: 16px;
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    resize: vertical; background: #fff;
  }
  .reply-form-wrap .reply-form-inner .btn-wrap {
    display: flex; flex-direction: column; gap: 4px;
  }

  .status-step {
    background: var(--bg-2);
    border-radius: var(--radius-sm);
    padding: 14px 18px;
    margin-bottom: 16px;
  }
  .status-step .l { font-size: 12px; color: var(--text-3); margin-bottom: 8px; }
  .status-bar {
    display: flex; gap: 4px;
  }
  .status-bar .seg {
    flex: 1; height: 4px; border-radius: 2px; background: var(--border);
  }
  .status-bar .seg.done { background: var(--primary); }
  .status-step .steps-row {
    display: flex; justify-content: space-between; margin-top: 10px;
    font-size: 11.5px; color: var(--text-3);
  }
  .status-step .steps-row .cur { color: var(--primary); font-weight: 700; }
</style>
</head>
<body data-require-login>

<div id="site-header"></div>

<main class="page" role="main">

  <header class="page-head">
    <div class="container">
      <div class="crumb"><span data-i18n-content="menu.board">게시판</span><span data-i18n-content="board.refund_title">환불·정보정정신청</span></div>
      <h1 data-i18n-content="board.refund_title">환불·정보정정신청</h1>
      <p class="lead" data-i18n-content="rfd.lead">응시료 환불 또는 회원 본인 정보 정정을 신청하는 게시판입니다.</p>
    </div>
  </header>

  <div class="board-wrap">

    <!-- ============ List ============ -->
    <section class="pane list-view active" id="listPane">
      <div class="board-tools">
        <div class="filters">
          <button class="chip active" data-i18n-content="qna.tab_all">전체</button>
          <button class="chip" data-i18n-content="rfd.type_refund">환불</button>
          <button class="chip" data-i18n-content="rfd.type_correction">정보정정</button>
        </div>
        <div class="board-tools-row">
          <div class="search"><input type="search" placeholder="제목·작성자 검색" data-i18n-content="qna.search_ph" data-i18n-content-placeholder></div>
          <button class="btn btn-primary btn-sm write" onclick="openRfdWritePane()" data-i18n-content="btn.write">글쓰기</button>
        </div>
      </div>

      <div class="card" style="padding: 0; overflow: hidden;">
        <div class="table-scroll">
        <table class="table">
          <thead>
            <tr>
              <th class="col-num" data-i18n-content="tbl.no">번호</th>
              <th class="col-type" data-i18n-content="rfd.col_type">유형</th>
              <th data-i18n-content="tbl.title">제목</th>
              <th class="col-author" data-i18n-content="tbl.author">작성자</th>
              <th class="col-date" data-i18n-content="tbl.date">작성일</th>
              <th class="col-status" data-i18n-content="tbl.status">상태</th>
            </tr>
          </thead>
          <tbody id="rfdListBody">
            <tr><td colspan="6" style="text-align:center;padding:32px;color:var(--text-3);" data-i18n-content="board.loading">불러오는 중…</td></tr>
          </tbody>
        </table>
        </div>
      </div>

      <nav class="pager" id="rfdPager"></nav>
    </section>

    <!-- ============ Write ============ -->
    <section class="pane write-form" id="writePane">
      <a href="javascript:void(0)" onclick="show('listPane')" class="btn btn-text" style="margin-bottom: 12px;" data-i18n-content="btn.list">← 목록으로</a>

      <h2 class="h2" style="margin-bottom: 18px;" data-i18n-content="rfd.write_title">새 글 작성</h2>

      <div class="form-row">
        <label class="label"><span data-i18n-content="rfd.col_type">유형</span> <span class="req">*</span></label>
        <div style="display: flex; gap: 16px;">
          <label class="radio"><input type="radio" name="type" checked><span class="box"></span><span data-i18n-content="rfd.type_refund">환불</span></label>
          <label class="radio"><input type="radio" name="type"><span class="box"></span><span data-i18n-content="rfd.type_correction">정보정정</span></label>
        </div>
      </div>

      <div class="form-row">
        <label class="label"><span data-i18n-content="form.title">제목</span> <span class="req">*</span></label>
        <input class="input" id="rfdTitle" placeholder="제목 (100자 이내)" maxlength="100" data-i18n-content="qna.title_ph" data-i18n-content-placeholder>
      </div>

      <div class="form-row">
        <label class="label"><span data-i18n-content="form.content">내용</span> <span class="req">*</span></label>
        <textarea class="textarea" id="rfdBody" rows="8" placeholder="환불·정정 사유, 접수번호, 회차 등을 자세히 작성해 주세요." data-i18n-content="rfd.body_ph" data-i18n-content-placeholder></textarea>
      </div>

      <div class="form-row">
        <label class="label"><span data-i18n-content="rfd.f_secret_pw">비밀글 비밀번호</span> <span class="req">*</span></label>
        <input class="input" type="password" id="rfdSecretPw" placeholder="4자 이상 (열람 시 필요)" maxlength="20" autocomplete="new-password" data-i18n-content="qna.secret_pw_ph" data-i18n-content-placeholder>
        <span class="hint" data-i18n-content="qna.secret_pw_hint">다른 사용자가 이 글을 열람할 때 입력해야 하는 비밀번호입니다.</span>
      </div>

      <div class="form-row">
        <label class="label" data-i18n-content="board.attachments">첨부파일</label>
        <div class="attach-zone">
          <div class="attach-hint" data-i18n-content="rfd.attach_hint">영수증·신분증 사본 등 (jpg, png, pdf · 5MB 이하 · 최대 5개)</div>
          <div class="attach-actions">
            <input type="file" id="rfdFileInput" accept="image/jpeg,image/png,application/pdf,.jpg,.jpeg,.png,.pdf" multiple hidden>
            <button type="button" class="btn btn-secondary btn-sm" onclick="document.getElementById('rfdFileInput').click()" data-i18n-content="board.file_select">파일 선택</button>
          </div>
          <div class="attach-list" id="rfdFileList"></div>
        </div>
      </div>

      <div class="form-row">
        <div class="file-list" style="text-align:left;" data-i18n-content="rfd.secret_notice" data-i18n-content-html>
          🔒 환불·정보정정 신청 글은 모두 <strong>비밀글</strong>로 등록됩니다.
          작성자 본인과 관리자만 내용·댓글을 열람할 수 있습니다.
        </div>
      </div>

      <div class="form-row">
        <label class="check"><input type="checkbox" id="rfdAgree"><span class="box"></span><span><span class="req">[필수]</span> <span data-i18n-content="rfd.agree">개인정보 처리에 동의합니다 (정정 신청 시 신원 식별 정보 처리 동의)</span></span></label>
      </div>

      <div style="display: flex; gap: 8px; margin-top: 20px;">
        <button class="btn btn-secondary" onclick="show('listPane')" data-i18n-content="btn.cancel">취소</button>
        <button class="btn btn-primary" style="flex:1;" id="btnRefundSubmit" data-i18n-content="btn.submit">제출</button>
      </div>
    </section>

    <!-- ============ Detail ============ -->
    <section class="pane" id="detailPane">
      <a href="javascript:void(0)" onclick="show('listPane')" class="btn btn-text" style="margin-bottom: 12px;">← 목록으로</a>

      <article class="detail-card">
        <div class="detail-head">
          <div class="detail-head-top">
            <span class="badge badge-type-rfd" id="bdBadge"></span>
            <span class="status" id="bdStatus"></span>
          </div>
          <h2 id="bdTitle"></h2>
          <div class="meta" id="bdMeta"></div>
        </div>

        <div class="detail-body" id="bdBody"></div>
        <div class="detail-actions-bar" id="bdActions" style="display:none;"></div>

        <div style="padding: 0 24px 24px;">
          <div class="reply-history" id="bdReply" style="display:none;"></div>
        </div>

        <div style="padding: 0 24px 24px;">
          <div class="comments" id="bdComments"></div>
        </div>
      </article>
    </section>

  </div>
</main>

<div id="site-footer"></div>
<div id="site-tabbar"></div>

<!-- 비밀글 안내 (작성자·관리자 외 열람 불가) -->
<div class="modal-backdrop" id="modalSecretLock">
  <div class="modal">
    <div class="modal-head"><h3 data-i18n-content="board.secret_label">비밀글</h3></div>
    <div class="modal-body">
      <div class="secret-lock">
        <div class="ico-lock">🔒</div>
        <p data-i18n-content="board.locked_msg">비밀글입니다. 작성자·관리자만 열람할 수 있습니다.</p>
      </div>
    </div>
    <div class="modal-foot">
      <button class="btn btn-primary" onclick="TPKM.closeModal('modalSecretLock')" data-i18n-content="btn.confirm">확인</button>
    </div>
  </div>
</div>

<script>
  window.TPKM_PAGE_I18N = {
    'rfd.lead': { ko: '응시료 환불 또는 회원 본인 정보 정정을 신청하는 게시판입니다.', my: 'ဖြေဆိုကြေး ပြန်အမ်းခြင်း သို့မဟုတ် အဖွဲ့ဝင် ကိုယ်ရေးအချက်အလက် ပြင်ဆင်ခြင်း လျှောက်ထားရန် ဘုတ်ဖြစ်သည်။', en: 'Board for requesting a fee refund or correcting your member information.' },
    'rfd.type_refund': { ko: '환불', my: 'ငွေပြန်အမ်း', en: 'Refund' },
    'rfd.type_correction': { ko: '정보정정', my: 'အချက်အလက်ပြင်ဆင်', en: 'Correction' },
    'rfd.col_type': { ko: '유형', my: 'အမျိုးအစား', en: 'Type' },
    'rfd.write_title': { ko: '새 글 작성', my: 'ပို့စ်အသစ် ရေးသားရန်', en: 'New request' },
    'rfd.body_ph': { ko: '환불·정정 사유, 접수번호, 회차 등을 자세히 작성해 주세요.', my: 'ငွေပြန်အမ်း·ပြင်ဆင်ရသည့် အကြောင်းရင်း၊ လျှောက်လွှာနံပါတ်၊ အကြိမ်ရေ စသည်တို့ကို အသေးစိတ် ရေးပါ။', en: 'Describe the refund/correction reason, application number, session, etc.' },
    'rfd.f_secret_pw': { ko: '비밀글 비밀번호', my: 'လျှို့ဝှက်ပို့စ် စကားဝှက်', en: 'Secret-post password' },
    'rfd.attach_hint': { ko: '영수증·신분증 사본 등 (jpg, png, pdf · 5MB 이하 · 최대 5개)', my: 'ပြေစာ·မှတ်ပုံတင် မိတ္တူ စသည် (jpg, png, pdf · 5MB အောက် · အများဆုံး ၅ ခု)', en: 'Receipt / ID copy, etc. (jpg, png, pdf · ≤ 5MB · up to 5 files)' },
    'rfd.secret_notice': { ko: '🔒 환불·정보정정 신청 글은 모두 <strong>비밀글</strong>로 등록됩니다. 작성자 본인과 관리자만 내용·댓글을 열람할 수 있습니다.', my: '🔒 ငွေပြန်အမ်း·အချက်အလက်ပြင်ဆင် လျှောက်လွှာများအားလုံးကို <strong>လျှို့ဝှက်ပို့စ်</strong>အဖြစ် မှတ်တမ်းတင်သည်။ ရေးသားသူနှင့် စီမံခန့်ခွဲသူသာ ကြည့်ရှုနိုင်သည်။', en: '🔒 All refund/correction requests are saved as <strong>secret posts</strong>. Only the author and admin can view the content and comments.' },
    'rfd.agree': { ko: '개인정보 처리에 동의합니다 (정정 신청 시 신원 식별 정보 처리 동의)', my: 'ကိုယ်ရေးအချက်အလက် ကိုင်တွယ်ခြင်းကို သဘောတူသည် (ပြင်ဆင်ရာတွင် အထောက်အထား စိစစ်ခြင်း သဘောတူ)', en: 'I agree to the processing of personal data (identity verification for corrections).' },
    'rfd.agree_required': { ko: '개인정보 처리에 동의해 주세요.', my: 'ကိုယ်ရေးအချက်အလက် ကိုင်တွယ်ခြင်းကို သဘောတူပါ။', en: 'Please agree to the processing of personal data.' },
    'qna.search_ph': { ko: '제목·작성자 검색', my: 'ခေါင်းစဉ်·ရေးသားသူ ရှာဖွေ', en: 'Search title / author' },
    'qna.tab_all': { ko: '전체', my: 'အားလုံး', en: 'All' },
    'qna.title_ph': { ko: '제목 (100자 이내)', my: 'ခေါင်းစဉ် (၁၀၀ လုံးအတွင်း)', en: 'Title (within 100 chars)' },
    'qna.secret_pw_ph': { ko: '4자 이상 (열람 시 필요)', my: 'အနည်းဆုံး ၄ လုံး (ကြည့်ရှုရန် လို)', en: 'At least 4 chars (needed to view)' },
    'qna.secret_pw_hint': { ko: '다른 사용자가 이 글을 열람할 때 입력해야 하는 비밀번호입니다.', my: 'အခြားသူများ ဤပို့စ်ကို ကြည့်ရှုသည့်အခါ ထည့်ရမည့် စကားဝှက်ဖြစ်သည်။', en: 'Others must enter this password to view the post.' },
    'form.title': { ko: '제목', my: 'ခေါင်းစဉ်', en: 'Title' },

    'tbl.no': { ko: '번호', my: 'နံပါတ်', en: 'No.' },
    'tbl.title': { ko: '제목', my: 'ခေါင်းစဉ်', en: 'Title' },
    'tbl.author': { ko: '작성자', my: 'ရေးသားသူ', en: 'Author' },
    'tbl.date': { ko: '작성일', my: 'ရက်စွဲ', en: 'Date' },

    'board.unlock_warn': { ko: '최대 5회 실패 시 일시적으로 잠깁니다.', my: 'အကြိမ် ၅ ကြိမ် မှားပါက ယာယီ ပိတ်သွားမည်။', en: 'After 5 failed attempts it locks temporarily.' }
  };
</script>
<script src="shared/api-client.js"></script>
<script src="assets/common.js"></script>
<script src="assets/fo-board.js?v=20260612"></script>
<script>
  window.show = function (id) {
    document.querySelectorAll('.pane').forEach(p => p.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function resetRfdWriteForm() {
    editingPostId = null;
    var title = document.getElementById('rfdTitle');
    var body = document.getElementById('rfdBody');
    var secretPw = document.getElementById('rfdSecretPw');
    var agree = document.getElementById('rfdAgree');
    if (title) title.value = '';
    if (body) body.value = '';
    if (secretPw) secretPw.value = '';
    if (agree) agree.checked = false;
    var radios = document.getElementsByName('type');
    if (radios[0]) radios[0].checked = true;
    if (radios[1]) radios[1].checked = false;
    if (typeof rfdAttach !== 'undefined' && rfdAttach && rfdAttach.reset) rfdAttach.reset();
    var heading = document.querySelector('#writePane .h2');
    if (heading) {
      heading.textContent = (window.TPKMLang && TPKMLang.t('rfd.write_title')) || '새 글 작성';
    }
  }

  function openRfdWritePane() {
    resetRfdWriteForm();
    show('writePane');
  }
  function rfdBt(key, fallback) {
    try { if (window.TPKMBt && TPKMBt.bt) return TPKMBt.bt(key, fallback); } catch (e) {}
    try { if (window.TPKMLang && TPKMLang.t) { var v = TPKMLang.t(key); if (v) return v; } } catch (e2) {}
    return fallback;
  }
  // ---- 목록/상세 (API) ----
  function rfdBadge(p) {
    var cat = p.category || '';
    if (cat === '정보정정') return '<span class="badge badge-type-cor">' + rfdBt('rfd.badge_correction', '정보정정') + '</span>';
    if (cat === '환불') return '<span class="badge badge-type-rfd">' + rfdBt('rfd.badge_refund', '환불') + '</span>';
    return '<span class="badge badge-type-rfd">' + (cat ? cat.replace(/[<>&]/g, '') : rfdBt('rfd.badge_default', '신청')) + '</span>';
  }
  var editingPostId = null;
  var board = TPKMBoard.initBoard({
    boardType: 'refund_correction',
    listBody: document.getElementById('rfdListBody'),
    pager: document.getElementById('rfdPager'),
    colspan: 6,
    typeCellClass: 'col-type',
    detailPaneId: 'detailPane',
    typeCell: rfdBadge,
    detailBadgeClass: function (p) {
      return (p.category === '정보정정') ? 'badge badge-type-cor' : 'badge badge-type-rfd';
    },
    detail: {
      title: document.getElementById('bdTitle'),
      badge: document.getElementById('bdBadge'),
      status: document.getElementById('bdStatus'),
      meta: document.getElementById('bdMeta'),
      body: document.getElementById('bdBody'),
      reply: document.getElementById('bdReply'),
      comments: document.getElementById('bdComments'),
      actions: document.getElementById('bdActions'),
    },
    onEdit: function (p) {
      editingPostId = p.id;
      document.getElementById('rfdTitle').value = p.title || '';
      document.getElementById('rfdBody').value = p.body || '';
      var radios = document.getElementsByName('type');
      if (radios[0] && radios[1]) {
        radios[0].checked = (p.category || '') !== '정보정정';
        radios[1].checked = (p.category || '') === '정보정정';
      }
      document.getElementById('rfdSecretPw').value = '';
      var agree = document.getElementById('rfdAgree');
      if (agree) agree.checked = false;
      rfdAttach.reset();
      document.querySelector('#writePane .h2').textContent =
        (window.TPKMLang && TPKMLang.t('board.edit_title')) || '글 수정';
      show('writePane');
    },
    show: window.show,
  });

  // ---- 필터: 전체/환불/정보정정 + 검색 ----
  var typeFilter = 'all';
  function applyFilters() {
    var q = (document.querySelector('.board-tools .search input').value || '').trim().toLowerCase();
    board.setFilter(function (p) {
      if (typeFilter === '환불' && (p.category || '') !== '환불') return false;
      if (typeFilter === '정보정정' && (p.category || '') !== '정보정정') return false;
      if (q && (p.title || '').toLowerCase().indexOf(q) === -1) return false;
      return true;
    });
  }
  document.querySelectorAll('.filters .chip').forEach(function (c, i) {
    c.addEventListener('click', function () {
      document.querySelectorAll('.filters .chip').forEach(function (x) { x.classList.remove('active'); });
      c.classList.add('active');
      typeFilter = i === 1 ? '환불' : i === 2 ? '정보정정' : 'all';
      applyFilters();
    });
  });
  document.querySelector('.board-tools .search input').addEventListener('input', applyFilters);

  // 첨부파일 (선택 즉시 업로드)
  var rfdAttach = TPKMBoard.bindAttachments({
    input: document.getElementById('rfdFileInput'),
    listEl: document.getElementById('rfdFileList'),
    max: 5,
  });

  var rfdSubmit = document.getElementById('btnRefundSubmit');
  // 개인정보 처리 동의 확인 (작성·수정 공통) — wireSubmit 실행 전에 가로채기
  rfdSubmit.addEventListener('click', function (e) {
    var agree = document.getElementById('rfdAgree');
    if (agree && !agree.checked) {
      e.stopImmediatePropagation();
      var msg = (window.TPKMLang && TPKMLang.t('rfd.agree_required')) || '개인정보 처리에 동의해 주세요.';
      alert(msg);
    }
  }, true);

  TPKMBoard.wireSubmit({
    boardType: 'refund_correction',
    submitBtn: rfdSubmit,
    titleEl: document.getElementById('rfdTitle'),
    bodyEl: document.getElementById('rfdBody'),
    forceSecret: true,
    secretPwEl: document.getElementById('rfdSecretPw'),
    attachmentCtrl: rfdAttach,
    resolveCategory: function () {
      var radios = document.getElementsByName('type');
      return (radios[0] && radios[0].checked) ? '환불' : '정보정정';
    },
    getEditingId: function () { return editingPostId; },
    clearEditing: function () {
      var agree = document.getElementById('rfdAgree');
      if (agree) agree.checked = false;
      editingPostId = null;
      document.querySelector('#writePane .h2').textContent =
        (window.TPKMLang && TPKMLang.t('rfd.write_title')) || '새 글 작성';
    },
    onSuccess: function () {
      show('listPane');
      board.load(1);
    },
  });

  // 최초 로드
  if (window.TopikApi && TopikApi.isLoggedIn()) board.load(1);
</script>
</body>
</html>
